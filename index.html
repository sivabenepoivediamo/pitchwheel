<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pitchweel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #15171c;
    --ink-raised: #1c1f26;
    --ink-line: #2a2e37;
    --paper: #f2efe9;
    --paper-dim: #9a9a93;
    --amber: #d98e48;
    --amber-dim: #6b4f2e;
    --blue: #5b8db8;
    --blue-dim: #2e3f4d;
    --chrome: #3a3f4b;
    --red: #b85b5b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 1080px;
    margin: 0 auto;
    padding: 20px 24px 40px;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .wordmark {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--paper);
  }
  .wordmark span { color: var(--amber); }

  .subtitle {
    font-size: 13px;
    color: var(--paper-dim);
    font-family: var(--mono);
  }

  /* ---------- Unified two-column layout ---------- */
  .unified-lab {
    display: grid;
    grid-template-columns: 1fr 2px 1fr;
    align-items: start;
    gap: 0;
  }
  .unified-col:first-child { padding-right: 22px; }
  .unified-col:last-child  { padding-left:  22px; }
  .unified-divider {
    background: var(--ink-line);
    align-self: stretch;
    min-height: 200px;
    width: 2px;
  }
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--ink-line);
  }
  @media (max-width: 900px) {
    .unified-lab { grid-template-columns: 1fr; }
    .unified-divider { display: none; }
    .unified-col:first-child { padding-right: 0; }
    .unified-col:last-child  { padding-left: 0; margin-top: 32px; }
  }

  .card {
    background: var(--ink-raised);
    border: 1px solid var(--ink-line);
    border-radius: 10px;
    padding: 14px 18px;
  }
  .card + .card { margin-top: 12px; }

  .card h3 {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--paper-dim);
    margin: 0 0 12px 0;
    font-weight: 500;
  }

  /* ---------- Form controls ---------- */
  .field {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
    min-width: 0;
  }
  .field label {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--paper);
    flex-shrink: 0;
  }
  .field .hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--paper-dim);
    display: block;
    margin-top: 1px;
  }

  input[type="text"], input[type="number"], select {
    background: var(--ink);
    border: 1px solid var(--chrome);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 10px;
    border-radius: 6px;
    width: 140px;
    transition: border-color 0.15s ease;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    outline: none;
    border-color: var(--amber);
  }
  input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--amber);
  }

  input[type="range"] {
    flex: 1 1 0;
    min-width: 60px;
    max-width: 180px;
    accent-color: var(--amber);
  }

  .range-row { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .range-val {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--amber);
    width: 28px;
    text-align: right;
  }

  button.go, button.action {
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: 0.03em;
    background: var(--amber);
    color: var(--ink);
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  button.go:hover, button.action:hover { filter: brightness(1.1); }
  button.go:active, button.action:active { transform: scale(0.97); }

  button.ghost {
    font-family: var(--mono);
    font-size: 12px;
    background: transparent;
    border: 1px solid var(--chrome);
    color: var(--paper-dim);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  button.ghost:hover { border-color: var(--paper-dim); color: var(--paper); }

  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* ---------- Data readout ---------- */
  .readout {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--paper);
    background: var(--ink);
    border: 1px solid var(--ink-line);
    border-radius: 8px;
    padding: 12px 14px;
    word-break: break-word;
    line-height: 1.6;
  }
  .readout .label { color: var(--paper-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .readout .val { color: var(--amber); }
  .readout .val.blue { color: var(--blue); }

  /* ---------- degree chips (chord builder) ---------- */
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .chip {
    font-family: var(--mono);
    font-size: 12.5px;
    background: var(--ink);
    border: 1px solid var(--chrome);
    color: var(--paper-dim);
    padding: 5px 10px;
    border-radius: 14px;
    cursor: pointer;
    user-select: none;
    transition: all 0.12s ease;
  }
  .chip.active {
    background: var(--amber-dim);
    border-color: var(--amber);
    color: var(--amber);
  }

  .footnote {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--paper-dim);
    margin-top: 18px;
    line-height: 1.5;
  }

  /* ---------- Transform chain (drag-reorder) ---------- */
  .chain-wrap { display: flex; flex-direction: column; gap: 5px; position: relative; }
  .chain-step {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--ink); border: 1px solid var(--ink-line);
    border-left: 3px solid transparent; border-radius: 6px;
    padding: 9px 12px; transition: border-left-color .15s, background .15s, opacity .15s;
  }
  .chain-step.off { opacity: .55; }
  .chain-step.on  { border-color: var(--ink-line); border-left-color: var(--amber); background: var(--amber-light, #2a2113); }
  .chain-step.drag-over { background: var(--blue-dim); border-color: var(--blue); }
  .chain-step.is-dragging { opacity: .25; border-style: dashed; }
  .drag-handle {
    color: var(--paper-dim); cursor: grab; font-size: 14px; padding: 0 2px;
    touch-action: none; flex-shrink: 0; user-select: none;
  }
  .drag-handle:hover { color: var(--paper); }
  .drag-handle:active { cursor: grabbing; }
  .op-toggle {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
    padding: 4px 10px; border-radius: 4px; min-width: 36px; text-align: center;
    flex-shrink: 0; text-transform: uppercase; border: 1px solid var(--chrome);
    background: transparent; color: var(--paper-dim); cursor: pointer;
  }
  .op-toggle.on { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
  .chain-step .step-name {
    font-family: var(--mono);
    font-size: 13px; color: var(--paper); flex: 1 1 auto; min-width: 90px;
  }
  .chain-step input[type="number"] { width: 60px; padding: 5px 8px; flex-shrink: 0; }
  .chain-step label.inline-check {
    display: flex; align-items: center; gap: 4px; font-family: var(--mono);
    font-size: 10px; color: var(--paper-dim); white-space: nowrap; cursor: pointer; user-select: none;
  }

  /* ---------- Scale folders / search ---------- */
  .scale-search-wrap { position: relative; margin-bottom: 10px; }
  .scale-search {
    font-family: var(--mono); font-size: 12.5px; width: 100%;
    background: var(--ink); border: 1px solid var(--chrome); color: var(--paper);
    border-radius: 6px; padding: 7px 10px;
  }
  .scale-search:focus { outline: none; border-color: var(--amber); }
  .scale-search::placeholder { color: var(--paper-dim); }
  .scale-folders { display: flex; flex-direction: column; gap: 3px; }
  .scale-folder-hdr {
    display: flex; align-items: center; gap: 7px; padding: 7px 10px; cursor: pointer;
    border-radius: 6px; user-select: none; background: var(--ink);
    border: 1px solid var(--ink-line); transition: background .1s, border-color .1s;
  }
  .scale-folder-hdr:hover { background: var(--blue-dim); border-color: var(--blue); }
  .scale-folder.open .scale-folder-hdr {
    background: var(--blue-dim); border-color: var(--blue); border-radius: 6px 6px 0 0; border-bottom: none;
  }
  .folder-arrow { font-family: var(--mono); font-size: 9px; color: var(--paper-dim); transition: transform .18s; display: inline-block; flex-shrink: 0; }
  .scale-folder.open .folder-arrow { transform: rotate(90deg); }
  .folder-name { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--paper); letter-spacing: .03em; flex: 1; }
  .scale-folder.open .folder-name { color: var(--blue); }
  .folder-count {
    font-family: var(--mono); font-size: 9px; color: var(--paper-dim);
    background: var(--ink-raised); border: 1px solid var(--chrome);
    border-radius: 10px; padding: 1px 6px; flex-shrink: 0;
  }
  .scale-folder.open .folder-count { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
  .scale-folder-body {
    display: none; flex-wrap: wrap; gap: 5px; padding: 9px 10px 11px;
    background: var(--blue-dim); border: 1px solid var(--blue); border-top: none; border-radius: 0 0 6px 6px;
  }
  .scale-folder.open .scale-folder-body { display: flex; }
  .scale-folders.searching .scale-folder:not(.search-hidden) .scale-folder-body { display: flex; }
  .scale-folder.search-hidden { display: none; }
  .scale-pill {
    font-family: var(--mono); font-size: 11px; letter-spacing: .02em;
    padding: 5px 10px; border-radius: 14px; cursor: pointer;
    border: 1px solid var(--chrome); background: var(--ink-raised); color: var(--paper-dim);
    transition: all .1s; white-space: nowrap;
  }
  .scale-pill:hover { border-color: var(--blue); color: var(--blue); }
  .scale-pill.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
  .scale-pill.search-match { border-color: var(--blue); color: var(--blue); }
  .scale-pill.active.search-match { color: var(--amber); }
  .scale-pill.search-hidden { display: none; }


  /* ---------- Criterion toggle ---------- */
  .criterion-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .criterion-toggle {
    display: flex;
    background: var(--ink);
    border: 1px solid var(--chrome);
    border-radius: 6px;
    padding: 2px;
    flex-shrink: 0;
  }
  .ctab {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    background: transparent;
    border: none;
    color: var(--paper-dim);
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .ctab.active {
    background: var(--amber-dim);
    color: var(--amber);
  }
  .ctab:not(.active):hover {
    color: var(--paper);
  }
  .criterion-input-field input {
    width: 100% !important;
  }
  ::selection { background: var(--amber-dim); }

  /* ---------- Tooltips ---------- */
  /* Handled by JS tooltip system — works on <input> elements and inside
     overflow:hidden containers (e.g. .helix-card). The CSS ::after approach
     doesn't work on replaced elements like <input>, and position:absolute
     tooltips get clipped by ancestor overflow:hidden. */

  /* ---------- Scale Analysis panel ---------- */
  .analysis-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    background: none;
    border: none;
    color: var(--paper-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0;
    margin-bottom: 0;
    transition: color 0.15s;
    width: 100%;
    text-align: left;
  }
  .analysis-toggle:hover { color: var(--amber); }
  .analysis-toggle .arrow {
    font-size: 9px;
    display: inline-block;
    transition: transform 0.18s;
    color: var(--paper-dim);
  }
  .analysis-toggle.open .arrow { transform: rotate(90deg); color: var(--amber); }
  .analysis-toggle.open { color: var(--amber); }

  .analysis-body { display: none; margin-top: 16px; }
  .analysis-body.open { display: block; }

  /* Section headers inside analysis */
  .asection {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin: 18px 0 8px 0;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--ink-line);
  }
  .asection:first-child { margin-top: 0; }

  /* Two-column stat grid */
  .astat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  @media (max-width: 480px) { .astat-grid { grid-template-columns: 1fr; } }

  .astat {
    background: var(--ink);
    border: 1px solid var(--ink-line);
    border-radius: 6px;
    padding: 9px 11px;
  }
  .astat.full { grid-column: 1 / -1; }
  .astat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--paper-dim);
    margin-bottom: 5px;
  }
  .astat-val {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--amber);
    word-break: break-all;
    line-height: 1.4;
  }
  .astat-val.blue  { color: var(--blue); }
  .astat-val.green { color: #6dbf8a; }
  .astat-val.dim   { color: var(--paper-dim); }
  .astat-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--paper-dim);
    margin-top: 3px;
    line-height: 1.4;
  }
  /* inline sub-label inside a stat */
  .astat-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--paper-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: block;
    margin-top: 7px;
    margin-bottom: 2px;
  }

  /* Badge row for boolean flags */
  .abadge-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .abadge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 12px;
    border: 1px solid var(--chrome);
    color: var(--paper-dim);
    background: var(--ink-raised);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .abadge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--chrome); flex-shrink: 0; }
  .abadge.on  { border-color: #6dbf8a; color: #6dbf8a; background: rgba(109,191,138,0.07); }
  .abadge.on::before { background: #6dbf8a; }
  .abadge.off { opacity: 0.55; }

  /* Distances / occurrences pill list */
  .adist-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .adist-pill {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--ink-raised);
    border: 1px solid var(--ink-line);
    border-radius: 6px;
    padding: 4px 10px;
    display: flex;
    gap: 4px;
    align-items: baseline;
  }
  .adist-pill .dp-dist { color: var(--amber); }
  .adist-pill .dp-x    { color: var(--paper-dim); font-size: 10px; }
  .adist-pill .dp-cnt  { color: var(--paper); }

  /* Spectra table */
  .spectra-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  .spectra-table tr + tr td { border-top: 1px solid var(--ink-line); }
  .spectra-table td {
    padding: 5px 8px 5px 0;
    vertical-align: middle;
  }
  .spectra-table td:first-child {
    color: var(--paper-dim);
    white-space: nowrap;
    padding-right: 12px;
    font-size: 11px;
    width: 36px;
  }
  .spectra-table .st-set  { color: var(--amber); }
  .spectra-table .st-w    { color: var(--blue); font-size: 10px; margin-left: 6px; }
  .spectra-table .st-myhill { color: #6dbf8a; font-size: 10px; margin-left: 4px; }



  .gen-tabs {
    display: flex;
    background: var(--ink);
    border: 1px solid var(--chrome);
    border-radius: 6px;
    padding: 2px;
    margin-bottom: 12px;
  }
  .gen-tab {
    flex: 1;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    background: transparent;
    border: none;
    color: var(--paper-dim);
    padding: 5px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
    text-align: center;
  }
  .gen-tab.active {
    background: var(--amber-dim);
    color: var(--amber);
  }
  .gen-tab:not(.active):hover { color: var(--paper); }
  .gen-panel { display: none; }
  .gen-panel.active { display: block; }
  .gen-readout {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--paper-dim);
    background: var(--ink);
    border: 1px solid var(--ink-line);
    border-radius: 6px;
    padding: 7px 10px;
    margin-bottom: 10px;
    word-break: break-word;
    min-height: 28px;
  }
  .gen-readout .val { color: var(--amber); }

  /* ---------- Helix (3D comprehensive view) ---------- */
  .helix-section {
    margin-bottom: 20px;
  }
  .helix-card {
    background: var(--ink-raised);
    border: 1px solid var(--ink-line);
    border-radius: 10px;
    overflow: hidden;
  }
  .helix-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 9px 16px;
    border-bottom: 1px solid var(--ink-line);
  }
  .helix-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .helix-controls input[type="range"] {
    width: 80px;
    min-width: unset;
    max-width: unset;
    flex: none;
  }
  .helix-speed-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--paper-dim);
    white-space: nowrap;
  }
  .helix-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--paper-dim);
  }
  .helix-legend span { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .helix-swatch { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .helix-swatch.root { background: #f2b66b; box-shadow: 0 0 6px #f2b66b; }
  .helix-swatch.scale { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
  .helix-swatch.chord { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .helix-swatch.anchor { background: var(--red); box-shadow: 0 0 6px var(--red); }

  #helix-container {
    width: 100%;
    height: 480px;
    touch-action: none;
    cursor: grab;
    position: relative;
  }
  #helix-container:active { cursor: grabbing; }
  #helix-container canvas { display: block; }

  .helix-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 16px 10px;
  }
  .helix-caption {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--paper-dim);
  }
  .helix-caption .val { color: var(--paper); }
  .helix-hint {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--paper-dim);
    opacity: 0.7;
  }

  @media (max-width: 640px) {
    #helix-container { height: 380px; }
  }

  /* ---------- Input engine panel ---------- */
  .input-section { margin-bottom: 20px; }
  .input-card {
    background: var(--ink-raised);
    border: 1px solid var(--ink-line);
    border-radius: 10px;
    padding: 16px 18px 18px;
  }
  .input-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 14px;
  }
  .mode-toggle {
    display: flex;
    background: var(--ink);
    border: 1px solid var(--chrome);
    border-radius: 7px;
    padding: 2px;
    flex-shrink: 0;
  }
  .mode-tab {
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.03em;
    background: transparent;

// music++ - Porting from C++ primitives

// IntervalVector: cyclic interval/step sequences with an offset

function euclideanDivision(dividend, divisor) {
  let quotient = Math.trunc(dividend / divisor);
  let remainder = dividend - quotient * divisor;
  if (remainder < 0) {
    quotient -= 1;
    remainder += divisor;
  }
  return { quotient, remainder };
}

function gcd(a, b) {
  a = Math.abs(a);
  b = Math.abs(b);
  while (b !== 0) {
    [a, b] = [b, a % b];
  }
  return a;
}

function lcm(values) {
  if (values.length === 0) return 1;
  if (values.length === 1) return Math.abs(values[0]);
  let result = Math.abs(values[0]);
  for (let i = 1; i < values.length; i++) {
    const g = gcd(result, values[i]);
    result = (result * Math.abs(values[i])) / g;
  }
  return result;
}

class PositionVector {
  constructor(data = [0], mod = 12, userRange = 0, rangeUpdate = true, user = false) {
    this.data = [...data];
    this.mod = mod;
    this.userRange = userRange > 0 ? userRange : mod;
    this.rangeUpdate = rangeUpdate;
    this.user = user;
    this.range = 0;
    this.range = this._initializeRange();
  }

  _rangeCalculation() {
    const modulo = this.user ? this.userRange : this.mod;
    if (this.data.length === 0) return modulo;
    const maxValue = Math.max(...this.data);
    const minValue = Math.min(...this.data);
    const span = maxValue - minValue;
    const { quotient } = euclideanDivision(span, modulo);
    return modulo * (quotient + 1);
  }

  _initializeRange() {
    return this.rangeUpdate ? this._rangeCalculation() : (this.user ? this.userRange : this.mod);
  }

  _updateRangeIfNeeded() {
    if (this.rangeUpdate) this.range = this._rangeCalculation();
  }

  size() { return this.data.length; }
  getData() { return [...this.data]; }
  getMod() { return this.mod; }
  getUserRange() { return this.userRange; }
  getRange() { return this.range; }
  getRangeUpdate() { return this.rangeUpdate; }
  getUser() { return this.user; }

  setMod(m) { this.mod = m; this._updateRangeIfNeeded(); }
  setUserRange(r) { this.userRange = r; this._updateRangeIfNeeded(); }
  setRange(r) { this.range = r; }
  setRangeUpdate(b) { this.rangeUpdate = b; this._updateRangeIfNeeded(); }
  setUser(b) { this.user = b; this._updateRangeIfNeeded(); }

  element(index) {
    const size = this.data.length;
    if (size === 0) return 0;
    const div = euclideanDivision(index, size);
    const cycles = (index - div.remainder) / size;
    const effectiveRange = this.getRange();
    return this.data[div.remainder] + Math.abs(effectiveRange) * cycles;
  }

  get(index) { return this.element(index); }

  // operator+ / operator- with a scalar: shift every element
  plusScalar(n) {
    return new PositionVector(this.data.map(v => v + n), this.mod, this.userRange, this.rangeUpdate, this.user);
  }
  minusScalar(n) {
    return this.plusScalar(-n);
  }

  rotoTranslate(startOffset, length = 0) {
    const outLength = length === 0 ? this.data.length : Math.abs(length);
    const newData = new Array(outLength);
    for (let i = 0; i < outLength; i++) newData[i] = this.element(startOffset + i);
    return new PositionVector(newData, this.mod, this.userRange, this.rangeUpdate, this.user);
  }

  complement() {
    const effectiveRange = this.getRange();
    if (this.data.length === 0) {
      const universe = [];
      for (let i = 0; i < effectiveRange; i++) universe.push(i);
      return new PositionVector(universe, this.mod, this.userRange, this.rangeUpdate, this.user);
    }
    const minValue = Math.min(...this.data);
    const normalized = this.minusScalar(minValue);
    const normalizedSet = new Set(normalized.data);
    const complementData = [];
    for (let i = 0; i < effectiveRange; i++) {
      if (!normalizedSet.has(i)) complementData.push(i);
    }
    return new PositionVector(complementData, this.mod, this.userRange, this.rangeUpdate, this.user).plusScalar(minValue);
  }

  inversion(axisIndex, sortOutput = true) {
    if (this.data.length === 0) return this;
    const size = this.data.length;
    const normalizedAxisIndex = euclideanDivision(axisIndex, size).remainder;
    const axisValue = this.data[normalizedAxisIndex];
    let invertedData = this.data.map(v => 2 * axisValue - v);
    if (sortOutput) invertedData = [...invertedData].sort((a, b) => a - b);
    return new PositionVector(invertedData, this.mod, this.userRange, this.rangeUpdate, this.user);
  }

  // "negative" — reflection through an axis position without the forced sort,
  // used by Chord transforms as a distinct option from inversion.
  negative(axisIndex = 0) {
    return this.inversion(axisIndex, false);
  }

  static adaptToLCM(vectors) {
    if (vectors.length === 0) return [];
    const uniqueModulos = [...new Set(vectors.map(v => v.mod))];
    if (uniqueModulos.length === 1) return vectors;
    const l = lcm(uniqueModulos);
    return vectors.map(pv => {
      const scaleFactor = l / pv.mod;
      const scaledData = pv.data.map(v => v * scaleFactor);
      const scaledUserRange = pv.userRange * scaleFactor;
      const scaledRange = pv.range * scaleFactor;
      const adapted = new PositionVector(scaledData, l, scaledUserRange, false, pv.user);
      adapted.setRange(scaledRange);
      return adapted;
    });
  }
}

// ------------------------------------------------------------
// IntervalVector
// ------------------------------------------------------------
class IntervalVector {
  constructor(data = [0], offset = 0, mod = 12) {
    this.data = [...data];
    this.offset = offset;
    this.mod = mod;
  }

  size() { return this.data.length; }
  getData() { return [...this.data]; }
  getOffset() { return this.offset; }
  getMod() { return this.mod; }
  setOffset(o) { this.offset = o; }
  setMod(m) { this.mod = m; }

  element(i) {
    if (this.data.length === 0) return 0;
    const size = this.data.length;
    const div = euclideanDivision(i, size);
    return this.data[div.remainder];
  }

  get(index) { return this.element(index); }

  rotate(r, n = 0) {
    n = Math.abs(n);
    if (n === 0) n = this.data.length;
    const out = new Array(n);
    for (let i = 0; i < n; i++) out[i] = this.element(r + i);
    return new IntervalVector(out, this.offset, this.mod);
  }

  rotoTranslate(r, n = 0) {
    n = Math.abs(n);
    const dataSize = this.data.length;
    if (n === 0) n = dataSize;
    const out = new Array(n);
    for (let i = 0; i < n; i++) out[i] = this.element(r + i);

    let sum = 0;
    if (Math.abs(r) < dataSize) {
      if (r >= 0) {
        for (let i = 0; i < r; i++) sum += this.element(i);
      } else {
        for (let i = 0; i < -r; i++) sum -= this.element(dataSize - 1 - i);
      }
    } else {
      const div = euclideanDivision(r, dataSize);
      if (r >= 0) {
        for (let i = 0; i < dataSize; i++) {
          const mult = i < div.remainder ? div.quotient + 1 : div.quotient;
          sum += this.element(i) * mult;
        }
      } else {
        const thresh = dataSize + div.remainder;
        for (let i = 0; i < dataSize; i++) {
          const mult = i >= thresh ? div.quotient - 1 : div.quotient;
          sum += this.element(i) * mult;
        }
      }
    }
    return new IntervalVector(out, this.offset + sum, this.mod);
  }

  reverse() {
    const out = new Array(this.data.length);
    for (let i = 0; i < this.data.length; i++) out[i] = this.data[this.data.length - 1 - i];
    return new IntervalVector(out, this.offset, this.mod);
  }

  inversion(axisIndex = 0) {
    if (this.data.length === 0) return this;
    const size = this.data.length;
    const div = euclideanDivision(axisIndex, size + 1);
    const normalizedAxis = div.remainder;
    const result = [...this.data];

    for (let i = 0; i < Math.floor(normalizedAxis / 2); i++) {
      [result[i], result[normalizedAxis - 1 - i]] = [result[normalizedAxis - 1 - i], result[i]];
    }
    const start = normalizedAxis;
    const end = size;
    const len = end - start;
    for (let i = 0; i < Math.floor(len / 2); i++) {
      [result[start + i], result[end - 1 - i]] = [result[end - 1 - i], result[start + i]];
    }
    return new IntervalVector(result, this.offset, this.mod);
  }

  singleMirror(position, left) {
    const out = [...this.data];
    const length = out.length;
    if (position < 0 || position > length) return this;

    if (left) {
      for (let i = 0; i < Math.floor(position / 2); i++) {
        [out[i], out[position - 1 - i]] = [out[position - 1 - i], out[i]];
      }
    } else {
      const end = position + Math.floor((length - position) / 2);
      for (let i = position; i < end; i++) {
        [out[i], out[length - 1 - (i - position)]] = [out[length - 1 - (i - position)], out[i]];
      }
    }
    return new IntervalVector(out, this.offset, this.mod);
  }

  static adaptToLCM(vectors) {
    if (vectors.length === 0) return [];
    const uniqueModulos = [...new Set(vectors.map(v => v.mod).filter(m => m !== 0))];
    if (uniqueModulos.length === 0 || uniqueModulos.length === 1) return vectors;
    const l = lcm(uniqueModulos);
    return vectors.map(iv => {
      if (iv.mod === 0) return iv;
      const scaleFactor = l / iv.mod;
      const scaledData = iv.data.map(v => v * scaleFactor);
      const scaledOffset = iv.offset * scaleFactor;
      return new IntervalVector(scaledData, scaledOffset, l);
    });
  }
}

// ------------------------------------------------------------
// Conversions between positions and intervals
// ------------------------------------------------------------
function positionsToIntervals(positions) {
  const mod = positions.getMod();
  if (positions.size() === 0) return new IntervalVector([], 0, mod);
  const posData = positions.getData();
  const intervalData = [];
  if (posData.length > 1) {
    for (let i = 0; i < posData.length; i++) {
      intervalData.push(positions.get(i + 1) - positions.get(i));
    }
  }
  return new IntervalVector(intervalData, positions.get(0), mod);
}

function intervalsToPositions(intervals) {
  const mod = intervals.getMod();
  const intervalData = intervals.getData();
  if (intervalData.length === 0) return new PositionVector([0], mod, 0, true, false);

  const posData = [];
  let currentPos = intervals.getOffset();
  posData.push(currentPos);
  for (let i = 0; i < intervalData.length - 1; i++) {
    currentPos += intervalData[i];
    posData.push(currentPos);
  }
  return new PositionVector(posData, mod, 0, true, false);
}

// ------------------------------------------------------------
// select() — 4 overloads dispatched by argument type
// ------------------------------------------------------------
function selectPosPos(source, criterion, criterionRotation = 0, voices = 0) {
  const sourceData = source.getData();
  const criterionModulo = sourceData.length;
  const actualCriterion = new PositionVector(criterion.getData(), criterionModulo);
  actualCriterion.setMod(source.size());
  const rotatedCriterion = criterionRotation !== 0
    ? actualCriterion.rotoTranslate(criterionRotation, voices)
    : actualCriterion;

  const outLength = voices > 0 ? voices : rotatedCriterion.size();
  const result = new Array(outLength);
  for (let k = 0; k < outLength; k++) result[k] = source.get(rotatedCriterion.get(k));

  return new PositionVector(result, source.getMod(), source.getUserRange(), source.getRangeUpdate(), source.getUser());
}

function selectPosInt(source, criterion, criterionRotation = 0, voices = 0) {
  let actualCriterion = criterion;
  actualCriterion.setMod(source.size());
  const rotatedCriterion = criterionRotation !== 0
    ? actualCriterion.rotate(criterionRotation, voices)
    : actualCriterion;

  const outLength = voices > 0 ? voices : rotatedCriterion.size();
  const result = new Array(outLength);
  let cumulativePosition = rotatedCriterion.getOffset();
  for (let k = 0; k < outLength; k++) {
    result[k] = source.get(cumulativePosition);
    cumulativePosition += rotatedCriterion.get(k);
  }

  return new PositionVector(result, source.getMod(), source.getUserRange(), source.getRangeUpdate(), source.getUser());
}

function selectIntInt(source, indices, criterionRotation = 0, voices = 0) {
  let actualCriterion = indices;
  actualCriterion.setMod(source.size());
  const rotatedCriterion = criterionRotation !== 0
    ? actualCriterion.rotate(criterionRotation, voices)
    : actualCriterion;

  const sourceOffset = source.getOffset();
  const criterionOffset = rotatedCriterion.getOffset();

  let sOut = sourceOffset;
  for (let j = 0; j < criterionOffset; j++) sOut += source.get(j);

  const outLength = voices > 0 ? voices : rotatedCriterion.size();
  const result = new Array(outLength);
  let cumulativeIndex = criterionOffset;
  for (let k = 0; k < outLength; k++) {
    let sum = 0;
    const spanLength = rotatedCriterion.get(k);
    for (let j = 0; j < spanLength; j++) sum += source.get(cumulativeIndex + j);
    result[k] = sum;
    cumulativeIndex += spanLength;
  }

  return new IntervalVector(result, sOut, source.getMod());
}

function selectIntPos(source, criterion, criterionRotation = 0, voices = 0) {
  const off = source.getOffset();
  const criterionModulo = source.getData().length;
  let actualCriterion = criterion;
  actualCriterion.setMod(source.size());
  const rotatedCriterion = criterionRotation !== 0
    ? actualCriterion.rotoTranslate(criterionRotation, voices)
    : actualCriterion;

  if (rotatedCriterion.size() === 0) return new IntervalVector([], source.getOffset(), source.getMod());

  const outLength = voices > 0 ? voices : rotatedCriterion.size();
  const result = new Array(outLength);
  const n = source.size();

  for (let k = 0; k < outLength; k++) {
    const p_k = rotatedCriterion.get(k);
    const p_next = rotatedCriterion.get(k + 1);
    let delta_k = p_next - p_k;
    if (delta_k <= 0) delta_k += n;
    let sum = 0;
    for (let j = 0; j < delta_k; j++) sum += source.get(p_k + j);
    result[k] = sum;
  }

  let sOut = off;
  if (criterion.get(0) >= 0) {
    for (let j = 0; j < criterion.get(0); j++) sOut += source.get(j);
  } else {
    for (let j = criterion.get(0); j < 0; j++) sOut -= source.get(j);
  }

  return new IntervalVector(result, sOut, source.getMod());
}

// Generic dispatcher mirroring the C++ overload resolution
function select(source, criterion, criterionRotation = 0, voices = 0) {
  const srcIsPos = source instanceof PositionVector;
  const critIsPos = criterion instanceof PositionVector;
  if (srcIsPos && critIsPos) return selectPosPos(source, criterion, criterionRotation, voices);
  if (srcIsPos && !critIsPos) return selectPosInt(source, criterion, criterionRotation, voices);
  if (!srcIsPos && critIsPos) return selectIntPos(source, criterion, criterionRotation, voices);
  return selectIntInt(source, criterion, criterionRotation, voices);
}

// ------------------------------------------------------------
// Scale
// ------------------------------------------------------------
class Scale {
  constructor(generator, params = {}) {
    this.params = {
      root: 0, mode: 0, degree: 0,
      invert: false, inversionAxis: 0,
      mirror: false, mirrorAxis: 0,
      ...params,
    };
    if (generator instanceof PositionVector) {
      this.generator = positionsToIntervals(generator);
      this.isFromPositions = true;
    } else {
      this.generator = generator;
      this.isFromPositions = false;
    }
    this._applyTransformations();
  }

  _applyTransformations() {
    let intervals = new IntervalVector(this.generator.getData(), this.generator.getOffset(), this.generator.getMod());
    intervals.setOffset(this.params.root);
    intervals = intervals.rotate(this.params.mode);
    if (this.params.invert) intervals = intervals.inversion(this.params.inversionAxis);
    if (this.params.mirror) intervals = intervals.singleMirror(this.params.mirrorAxis, true);
    this.intervals = intervals;
  }

  toPositions() { return intervalsToPositions(this.intervals); }
  toIntervals() { return this.intervals; }
  getGenerator() { return this.generator; }
  getGeneratorAsPositions() { return intervalsToPositions(this.generator); }

  setParams(newParams) {
    this.params = { ...this.params, ...newParams };
    this._applyTransformations();
  }
}

// ------------------------------------------------------------
// Chord
// ------------------------------------------------------------
class Chord {
  constructor(scale, criterion, params = {}) {
    this.params = {
      shift: 0, rotationOrRototrans: 0, preVoices: 0, position: 0,
      invert: false, axis: 0, negativeOrMirror: false, negativeOrMirrorPos: 0,
      ...params,
    };
    this.scaleIsPositions = scale instanceof PositionVector;
    this.criterionIsPositions = criterion instanceof PositionVector;
    this.scale = scale;
    this.criterion = criterion;
    this._generate();
  }

  _generate() {
    const p = this.params;
    if (this.scaleIsPositions && this.criterionIsPositions) {
      const offsetDegrees = this.criterion.plusScalar(p.shift);
      let result = select(this.scale, offsetDegrees, p.rotationOrRototrans, p.preVoices);
      if (p.invert) result = result.inversion(p.axis, true);
      if (p.negativeOrMirror) result = result.negative(p.negativeOrMirrorPos);
      result = result.rotoTranslate(p.position);
      this.isResultPositions = true;
      this.resultPositions = result;
    } else if (this.scaleIsPositions && !this.criterionIsPositions) {
      const offsetIntervals = new IntervalVector(this.criterion.getData(), p.shift, this.criterion.getMod());
      let result = select(this.scale, offsetIntervals, p.rotationOrRototrans, p.preVoices);
      if (p.invert) result = result.inversion(p.axis, true);
      if (p.negativeOrMirror) result = result.negative(p.negativeOrMirrorPos);
      result = result.rotoTranslate(p.position);
      this.isResultPositions = true;
      this.resultPositions = result;
    } else if (!this.scaleIsPositions && this.criterionIsPositions) {
      const offsetDegrees = this.criterion.plusScalar(p.shift);
      let tempResult = select(this.scale, offsetDegrees, p.rotationOrRototrans, p.preVoices);
      let result = tempResult.rotoTranslate(p.position);
      if (p.invert) result = result.inversion(p.axis);
      if (p.negativeOrMirror) result = result.singleMirror(p.negativeOrMirrorPos, true);
      this.isResultPositions = false;
      this.resultIntervals = result;
    } else {
      const off = this.criterion.getOffset();
      const offsetIntervals = new IntervalVector(this.criterion.getData(), p.shift + off, this.criterion.getMod());
      let tempResult = select(this.scale, offsetIntervals, p.rotationOrRototrans, p.preVoices);
      let result = tempResult.rotoTranslate(p.position);
      if (p.invert) result = result.inversion(p.axis);
      if (p.negativeOrMirror) result = result.singleMirror(p.negativeOrMirrorPos, true);
      this.isResultPositions = false;
      this.resultIntervals = result;
    }
  }

  toPositions() {
    return this.isResultPositions ? this.resultPositions : intervalsToPositions(this.resultIntervals);
  }
  toIntervals() {
    return this.isResultPositions ? positionsToIntervals(this.resultPositions) : this.resultIntervals;
  }

  setParams(newParams) {
    this.params = { ...this.params, ...newParams };
    this._generate();
  }
}

// Standalone functional chord() helper, mirroring the free functions
function chord(scale, criterion, opts = {}) {
  const c = new Chord(scale, criterion, {
    shift: opts.shift ?? 0,
    rotationOrRototrans: opts.rotation ?? opts.rototranslation ?? 0,
    preVoices: opts.preVoices ?? 0,
    position: opts.position ?? 0,
    invert: opts.invert ?? false,
    axis: opts.axis ?? 0,
    negativeOrMirror: opts.negative ?? opts.mirror ?? false,
    negativeOrMirrorPos: opts.negativePos ?? opts.mirrorPos ?? 0,
  });
  return scale instanceof PositionVector ? c.toPositions() : c.toIntervals();
}


// ===== app logic =====

// ============================================================
// Audio — simple Web Audio sine synth
// ============================================================
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Convert a step in `mod`-edo to Hz, anchored so that step 0 = C0 (16.35 Hz)
// and one full octave (mod steps) = double the frequency.
// This matches the helix, where position 0 is the bottom ring.
// e.g. mod=12: step 60 = middle C (C4); mod=31: step 0 is still C0.
function noteToFreq(n, mod) {
  const C0 = 16.3516;
  return C0 * Math.pow(2, n / mod);
}

function playTone(freq, startTime, duration, gainPeak = 0.18) {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gainNode.gain.setValueAtTime(0, startTime);
  gainNode.gain.linearRampToValueAtTime(gainPeak, startTime + 0.015);
  gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  osc.connect(gainNode);
  gainNode.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
}

function playSequence(notes, mod, { gap = 0.32, dur = 0.38 } = {}) {
  const ctx = getCtx();
  const now = ctx.currentTime + 0.05;
  notes.forEach((n, i) => playTone(noteToFreq(n, mod), now + i * gap, dur));
}

function playChordTones(notes, mod, { dur = 1.1 } = {}) {
  const ctx = getCtx();
  const now = ctx.currentTime + 0.05;
  notes.forEach(n => playTone(noteToFreq(n, mod), now, dur, 0.13));
}

// ------------------------------------------------------------
// Sustained voices — note-on/note-off engine for live playing
// (MIDI keyboards, PC keyboard, and the keyboard visualizer).
// Distinct from the fire-and-decay one-shots above: a voice holds
// at a sustain level until explicitly released, exactly like a
// real synth responding to a held key.
// ------------------------------------------------------------
const liveVoices = new Map(); // voiceId -> { osc, gainNode, releasing }

function liveNoteOn(voiceId, freq, gainPeak = 0.16) {
  liveNoteOff(voiceId, 0.01); // safety: clear any stuck voice with the same id
  const ctx = getCtx();
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gainNode.gain.setValueAtTime(0, now);
  gainNode.gain.linearRampToValueAtTime(gainPeak, now + 0.012);
  osc.connect(gainNode);
  gainNode.connect(ctx.destination);
  osc.start(now);
  liveVoices.set(voiceId, { osc, gainNode, releasing: false });
}

function liveNoteOff(voiceId, release = 0.18) {
  const voice = liveVoices.get(voiceId);
  if (!voice || voice.releasing) return;
  voice.releasing = true;
  const ctx = getCtx();
  const now = ctx.currentTime;
  try {
    voice.gainNode.gain.cancelScheduledValues(now);
    voice.gainNode.gain.setValueAtTime(Math.max(voice.gainNode.gain.value, 0.0001), now);
    voice.gainNode.gain.exponentialRampToValueAtTime(0.0001, now + release);
    voice.osc.stop(now + release + 0.03);
  } catch (e) { /* already stopped */ }
  liveVoices.delete(voiceId);
}

function liveNoteOffAll() {
  [...liveVoices.keys()].forEach(id => liveNoteOff(id));
}

// ============================================================
// INPUT ENGINE — unifies MIDI keyboards, the PC keyboard, and
// clicks on the on-screen keyboard visualizer into one note
// on/off pipeline, then dispatches each note through whichever
// of the three modes is active:
//   Root   — note sets the scale root, plays the current chord
//   Degree — note sets the chord's anchor degree, plays the current chord
//   Direct — note plays exactly as struck (note-in = note-out)
// Root and Degree never sound the raw note or the scale — only the
// resulting chord. Only Direct plays the literal pitch you pressed.
//
// All input is monophonic with last-note priority, across every source
// (MIDI, PC keyboard, on-screen clicks) and every mode: physically-held
// keys are tracked as an ordered stack, but only the most recently
// pressed one ever plays. Releasing the playing key pops back to
// whatever is still held underneath (and re-plays it); releasing a
// key that wasn't on top silently drops out of the stack with no
// audible change. This applies identically whether the stack holds
// MIDI notes (Root/Direct) or abstract degree numbers (Degree).
//
// All incoming notes are standard MIDI note numbers (60 = C4),
// regardless of source. They get converted into the app's native
// `mod`-edo step space only at the point of use, via the same
// ratio used elsewhere in the app (step = round(midiNote * mod/12)).
// ============================================================
const InputEngine = (() => {
  let mode = 'root'; // 'root' | 'degree' | 'direct'
  let midiAccess = null;
  let activeMidiInput = null;

  // ---- generic monophonic last-note-priority stack -----------------------
  // A tiny reusable helper: tracks an ordered stack of physically-held
  // identities (ids can be MIDI notes or degree numbers — the stack
  // doesn't care) and calls onTopChanged(newTopId | null, oldTopId | null)
  // only when the *playing* identity actually changes, never on every
  // press/release.
  function makeMonoStack(onTopChanged) {
    const stack = []; // ordered oldest -> newest
    function top() { return stack.length ? stack[stack.length - 1] : null; }
    function press(id) {
      if (stack.includes(id)) return; // already held — ignore retrigger/key-repeat
      const oldTop = top();
      stack.push(id);
      const newTop = top(); // the just-pressed id, always becomes top
      if (newTop !== oldTop) onTopChanged(newTop, oldTop);
    }
    function release(id) {
      const idx = stack.indexOf(id);
      if (idx === -1) return; // not held — ignore
      const oldTop = top();
      stack.splice(idx, 1);
      const newTop = top();
      if (newTop !== oldTop) onTopChanged(newTop, oldTop);
    }
    function clear() {
      const oldTop = top();
      stack.length = 0;
      if (oldTop !== null) onTopChanged(null, oldTop);
    }
    function list() { return [...stack]; }
    return { press, release, clear, list, top };
  }

  // ---- PC keyboard layout -------------------------------------------
  // Lower row starts at C4 (60), upper row starts one octave higher (72).
  // Used by Root and Direct modes, where keys represent actual pitches.
  const PC_KEY_MAP = {
    // lower octave: Z S X D C V G B H N J M  →  C C# D D# E F F# G G# A A# B
    'z': 60, 's': 61, 'x': 62, 'd': 63, 'c': 64, 'v': 65,
    'g': 66, 'b': 67, 'h': 68, 'n': 69, 'j': 70, 'm': 71,
    // upper octave: Q 2 W 3 E R 5 T 6 Y 7 U  →  C C# D D# E F F# G G# A A# B
    'q': 72, '2': 73, 'w': 74, '3': 75, 'e': 76, 'r': 77,
    '5': 78, 't': 79, '6': 80, 'y': 81, '7': 82, 'u': 83,
  };

  // Degree mode's three-row layout, spanning three octaves of degrees:
  // one octave BELOW 0 (bottom row), then 0's own octave (middle row),
  // then one octave ABOVE that (top row). Defined by PHYSICAL key
  // position (KeyboardEvent.code), not by the character a key produces —
  // this keeps it identical across keyboard layouts/languages, since
  // e.g. the keys after L/P differ by locale. Each row's pool is its
  // maximum physical extent; only the first N keys of each row are
  // actually mapped, where N = current scale length, so a pentatonic
  // scale only needs 5 keys per row while a 7-note scale needs 7, etc.
  // Degree numbering: bottom row = -N..-1, middle row = 0..N-1 (this is
  // the row where '0' lives), top row = N..2N-1.
  const DEGREE_ROW_POOLS = [
    ['KeyZ', 'KeyX', 'KeyC', 'KeyV', 'KeyB', 'KeyN', 'KeyM', 'Comma', 'Period', 'Slash'],
    ['KeyA', 'KeyS', 'KeyD', 'KeyF', 'KeyG', 'KeyH', 'KeyJ', 'KeyK', 'KeyL', 'Semicolon', 'Quote', 'Backslash'],
    ['KeyQ', 'KeyW', 'KeyE', 'KeyR', 'KeyT', 'KeyY', 'KeyU', 'KeyI', 'KeyO', 'KeyP', 'BracketLeft'],
  ];
  const DEGREE_ROW_OFFSET_MULTIPLIER = [-1, 0, 1]; // bottom, middle, top — multiplied by N
  // Builds { code -> degree } fresh from the current scale length. Cheap
  // enough to rebuild on every keydown rather than caching/invalidating.
  function degreeKeyMapForCurrentScale() {
    const n = Math.max(0, lastScalePositions.length);
    const map = {};
    DEGREE_ROW_POOLS.forEach((pool, rowIndex) => {
      const used = pool.slice(0, Math.min(n, pool.length));
      const rowStart = DEGREE_ROW_OFFSET_MULTIPLIER[rowIndex] * n;
      used.forEach((code, posInRow) => { map[code] = rowStart + posInRow; });
    });
    return map;
  }

  // trackKey -> identity (MIDI note for Root/Direct, degree number for
  // Degree). A Map, not a Set, because keyup/blur need to recover the
  // identity to release — trackKey alone isn't enough for that.
  const heldPcKeys = new Map();

  // ---- mode helpers ---------------------------------------------------
  function pcModToStep(midiNote, mod) {
    return Math.round(midiNote * mod / 12);
  }

  // The MIDI note that counts as degree 0 in Degree mode. Derived from
  // the Chord Builder's Octave slider (chord-octave, 0–9, default 5):
  // each +1 step of that slider shifts the anchor up one MIDI octave,
  // with the default (5) anchoring at C4 (MIDI 60) — so the anchor
  // tracks whatever octave the chord is currently set to play in.
  function degreeAnchorNote() {
    const slider = document.getElementById('chord-octave');
    const sliderVal = slider ? (parseInt(slider.value, 10) || 0) : 5;
    return 60 + (sliderVal - 5) * 12;
  }

  const WHITE_KEY_PCS = [0, 2, 4, 5, 7, 9, 11]; // C D E F G A B
  function isWhiteKeyNote(midiNote) {
    return WHITE_KEY_PCS.includes(((midiNote % 12) + 12) % 12);
  }
  // Index of a white key in the white-key-only sequence, counting from
  // the current degree-0 anchor (anchor = 0, next white key up = 1,
  // next white key down = -1, etc.). Returns null for black keys —
  // those are ignored entirely in Degree mode. The anchor itself moves
  // with the chord-octave slider (see degreeAnchorNote); the counting
  // logic here is otherwise unchanged.
  function whiteKeyIndex(midiNote) {
    if (!isWhiteKeyNote(midiNote)) return null;
    const anchor = degreeAnchorNote();
    const octave = Math.floor((midiNote - anchor) / 12);
    const pc = ((midiNote % 12) + 12) % 12;
    const posInOctave = WHITE_KEY_PCS.indexOf(pc);
    return octave * 7 + posInOctave;
  }

  // Root mode side-effect: pitch-class of the incoming note (in current
  // mod-space) becomes the scale's transposition. Reuses the Scale
  // transform chain's "Root" step so it stays fully consistent with
  // manual edits. This does NOT affect what gets played for this key —
  // it only changes what subsequent scale/chord parameters mean.
  function applyRootMode(midiNote) {
    const mod = currentScaleMod();
    const step = pcModToStep(midiNote, mod);
    const pc = ((step % mod) + mod) % mod;
    setScaleRootStep(pc);
  }

  function setScaleRootStep(step) {
    const input = document.getElementById('scale-tx-root');
    if (!input) return;
    if (scaleChainEnabled && !scaleChainEnabled.root) {
      // Turn the Root step on so the incoming note actually takes effect.
      const toggleBtn = document.querySelector('#scale-chain-wrap .op-toggle[data-op="root"]');
      if (toggleBtn) toggleBtn.click();
    }
    input.value = step;
    input.dispatchEvent(new Event('input', { bubbles: true }));
  }

  function setChordShiftDegree(degree) {
    const slider = document.getElementById('chord-shift');
    if (!slider) return;
    const min = parseInt(slider.min, 10);
    const max = parseInt(slider.max, 10);
    slider.value = Math.max(min, Math.min(max, degree));
    slider.dispatchEvent(new Event('input', { bubbles: true }));
  }

  // ---- Root/Direct mono stack ---------------------------------------------
  // Top-of-stack is always a real MIDI pitch here, so it DOES get
  // highlighted in the keyboard visualizer.
  const pitchStack = makeMonoStack((newTop, oldTop) => {
    if (mode === 'direct') {
      if (oldTop !== null) liveNoteOff('direct-' + oldTop);
      if (newTop !== null) {
        const mod = currentScaleMod();
        const step = pcModToStep(newTop, mod);
        liveNoteOn('direct-' + newTop, noteToFreq(step, mod));
      }
    } else if (mode === 'root') {
      if (newTop !== null) {
        applyRootMode(newTop);
        soundCurrentChordSustained();
      } else {
        liveNoteOffAll();
      }
    }
    refreshKeyboardViz();
    updateInputReadout();
  });

  function noteOn(midiNote, source) {
    if (mode === 'degree') { noteOnDegree(whiteKeyIndex(midiNote), source); return; }
    pitchStack.press(midiNote);
  }
  function noteOff(midiNote, source) {
    if (mode === 'degree') { noteOffDegree(whiteKeyIndex(midiNote), source); return; }
    pitchStack.release(midiNote);
  }

  // ---- Degree mono stack — Degree mode only --------------------------------
  // Degree-mode "keys" are abstract selectors, not pitches: the top of this
  // stack sets the chord's anchor degree and plays the resulting chord.
  // Tracked in its own identity space (degree number; null = ignored, e.g.
  // a MIDI black key) and intentionally NEVER reflected in the keyboard
  // visualizer's held/highlight state, since a degree doesn't correspond
  // to an actual note.
  const degreeStack = makeMonoStack((newTop, oldTop) => {
    if (newTop !== null) {
      setChordShiftDegree(newTop);
      soundCurrentChordSustained();
    } else {
      liveNoteOffAll();
    }
    updateDegreeReadout();
  });

  function noteOnDegree(degree, source) {
    if (degree === null || degree === undefined) return; // e.g. a black key in Degree mode — ignored
    degreeStack.press(degree);
  }
  function noteOffDegree(degree, source) {
    if (degree === null || degree === undefined) return;
    degreeStack.release(degree);
  }
  function updateDegreeReadout() {
    const el = document.getElementById('kbviz-readout');
    if (!el) return;
    const heldList = degreeStack.list();
    const top = degreeStack.top();
    el.innerHTML = heldList.length
      ? `<span class="label">degree</span> <span class="val">${top}</span> <span class="label">(playing) — held stack: ${heldList.join(', ')}</span>`
      : `<span class="label">no input</span> (degree)`;
  }

  // plays the current chord result as sustained voices — used by Root
  // and Degree modes only. Never plays the scale. Re-voices from
  // scratch each call, which is simplest and keeps it perfectly in sync
  // with whatever the scale/chord engine just produced.
  function soundCurrentChordSustained() {
    liveNoteOffAll();
    const mod = currentScaleMod();
    const notes = lastChordResultHeard || [];
    notes.forEach((n, i) => liveNoteOn('chord-' + i, noteToFreq(n, mod), 0.11));
  }

  function updateInputReadout() {
    const el = document.getElementById('kbviz-readout');
    if (!el) return;
    const heldList = pitchStack.list();
    const top = pitchStack.top();
    const modeLabel = mode === 'root' ? 'root' : 'direct';
    el.innerHTML = heldList.length
      ? `<span class="label">${midiNoteName(top)}</span> <span class="label">(playing, ${modeLabel}) — held stack: ${heldList.map(midiNoteName).join(', ')}</span>`
      : `<span class="label">no input</span> (${modeLabel})`;
  }

  // ---- mode switching ---------------------------------------------------
  function setMode(newMode) {
    mode = newMode;
    pitchStack.clear();
    degreeStack.clear();
    liveNoteOffAll(); // belt-and-suspenders: guarantees silence on mode switch
    refreshKeyboardViz();
  }
  function getMode() { return mode; }
  function getHeld() { return pitchStack.list(); }
  function getHeldDegrees() { return degreeStack.list(); }

  // ---- PC keyboard wiring ------------------------------------------------
  // On by default; toggled by the user via setPcKeyboardEnabled(). Also
  // suppressed while focus is in a text field (search box, number input,
  // etc.), which is a separate concern from the user-facing toggle.
  //
  // Root/Direct use the chromatic PC_KEY_MAP, keyed by e.key (character
  // produced) — fine there since those are fixed mnemonic letters, not
  // tied to scale length. Degree mode is keyed by e.code (physical key
  // position) via degreeKeyMapForCurrentScale(), since that mapping must
  // stay identical across keyboard layouts/languages and adapts to the
  // current scale length on every press.
  let pcKeyboardEnabled = true;
  function setPcKeyboardEnabled(v) {
    pcKeyboardEnabled = v;
    if (!v) {
      // Release anything currently held so disabling never leaves a stuck note.
      heldPcKeys.forEach(identity => pcKeyUp(identity));
      heldPcKeys.clear();
    }
  }
  function getPcKeyboardEnabled() { return pcKeyboardEnabled; }
  function isTypingTarget(el) {
    if (!el) return false;
    const tag = el.tagName;
    return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || el.isContentEditable;
  }
  function pcKeyDown(identity) {
    if (mode === 'degree') noteOnDegree(identity, 'pc');
    else noteOn(identity, 'pc');
  }
  function pcKeyUp(identity) {
    if (mode === 'degree') noteOffDegree(identity, 'pc');
    else noteOff(identity, 'pc');
  }
  // Resolves a raw keyboard event to { trackKey, identity } in the
  // currently-active mapping, or null if the event doesn't map to
  // anything right now. trackKey is what heldPcKeys uses for dedup
  // (must stay stable across down/up for the same physical key even
  // if the mapping were to change mid-hold); identity is what gets
  // passed to noteOn/noteOff or noteOnDegree/noteOffDegree.
  function resolvePcEvent(e) {
    if (mode === 'degree') {
      const map = degreeKeyMapForCurrentScale();
      if (!(e.code in map)) return null;
      return { trackKey: 'code:' + e.code, identity: map[e.code] };
    }
    const key = e.key.toLowerCase();
    if (!(key in PC_KEY_MAP)) return null;
    return { trackKey: 'key:' + key, identity: PC_KEY_MAP[key] };
  }
  function setupPcKeyboard() {
    window.addEventListener('keydown', e => {
      if (!pcKeyboardEnabled) return;
      if (isTypingTarget(document.activeElement)) return;
      const resolved = resolvePcEvent(e);
      if (!resolved) return;
      if (heldPcKeys.has(resolved.trackKey)) return; // ignore OS key-repeat
      heldPcKeys.set(resolved.trackKey, resolved.identity);
      e.preventDefault();
      pcKeyDown(resolved.identity);
    });
    window.addEventListener('keyup', e => {
      const resolved = resolvePcEvent(e);
      if (!resolved) return;
      if (!heldPcKeys.has(resolved.trackKey)) return;
      heldPcKeys.delete(resolved.trackKey);
      pcKeyUp(resolved.identity);
    });
    // Releasing focus/visibility loss shouldn't leave stuck notes.
    window.addEventListener('blur', () => {
      heldPcKeys.forEach(identity => pcKeyUp(identity));
      heldPcKeys.clear();
    });
  }

  // ---- Web MIDI wiring ----------------------------------------------------
  function attachInputListeners(input) {
    input.onmidimessage = (msg) => {
      const [status, note, velocity] = msg.data;
      const command = status & 0xf0;
      if (command === 0x90 && velocity > 0) noteOn(note, 'midi');
      else if (command === 0x80 || (command === 0x90 && velocity === 0)) noteOff(note, 'midi');
    };
  }
  function detachAll() {
    if (!midiAccess) return;
    for (const input of midiAccess.inputs.values()) input.onmidimessage = null;
  }
  function populateDeviceList() {
    const select = document.getElementById('midi-device-select');
    if (!select || !midiAccess) return;
    const inputs = [...midiAccess.inputs.values()];
    select.innerHTML = '';
    if (inputs.length === 0) {
      select.innerHTML = '<option value="">No MIDI inputs found</option>';
      activeMidiInput = null;
      return;
    }
    const allOpt = document.createElement('option');
    allOpt.value = '__all__';
    allOpt.textContent = 'All connected devices';
    select.appendChild(allOpt);
    inputs.forEach(inp => {
      const opt = document.createElement('option');
      opt.value = inp.id;
      opt.textContent = inp.name || ('Input ' + inp.id);
      select.appendChild(opt);
    });
    select.value = '__all__';
    selectMidiInput('__all__');
  }
  function selectMidiInput(value) {
    detachAll();
    if (!midiAccess) return;
    const inputs = [...midiAccess.inputs.values()];
    if (value === '__all__') {
      inputs.forEach(attachInputListeners);
      activeMidiInput = '__all__';
    } else {
      const found = inputs.find(i => i.id === value);
      if (found) attachInputListeners(found);
      activeMidiInput = value;
    }
  }
  async function enableMidi() {
    const dot = document.getElementById('midi-status-dot');
    if (!navigator.requestMIDIAccess) {
      if (dot) { dot.classList.add('warn'); dot.title = 'Web MIDI is not supported in this browser.'; }
      const select = document.getElementById('midi-device-select');
      if (select) select.innerHTML = '<option value="">Web MIDI unsupported in this browser</option>';
      return;
    }
    try {
      midiAccess = await navigator.requestMIDIAccess();
      if (dot) { dot.classList.remove('warn'); dot.classList.add('live'); dot.title = 'MIDI access granted.'; }
      populateDeviceList();
      midiAccess.onstatechange = populateDeviceList;
    } catch (err) {
      if (dot) { dot.classList.add('warn'); dot.title = 'MIDI access was denied: ' + err.message; }
    }
  }

  return {
    setMode, getMode, getHeld, getHeldDegrees, noteOn, noteOff,
    noteOnDegree, noteOffDegree,
    getplayingNote: () => pitchStack.top(),
    setupPcKeyboard, setPcKeyboardEnabled, getPcKeyboardEnabled,
    enableMidi, selectMidiInput,
  };
})();

// MIDI note number → name, e.g. 60 -> "C4"
function midiNoteName(n) {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const pc = ((n % 12) + 12) % 12;
  const octave = Math.floor(n / 12) - 1;
  return names[pc] + octave;
}

// ============================================================
// KEYBOARD VISUALIZER — an on-screen piano showing a 3-octave
// window anchored to the scale's root note (not always C), so the
// keys stay small enough to view without lateral scrolling. Shows,
// within that window:
//   - every scale tone (blue)
//   - the current chord tones, at their actual sounded octave (amber)
//   - whatever is currently held — MIDI, PC keys, or clicks (red ring)
// Doubles as an input device: clicking/dragging a key fires the same
// InputEngine.noteOn/noteOff pipeline as MIDI and PC keys.
//
// The window is [root, root+12, root+24] — root is always the LOWEST
// note shown — and can be nudged up/down an octave at a time with the
// +/- buttons (kbvizOctaveOffset). That offset is a pure view setting:
// it does not move the scale root, transpose anything, or affect
// audio. It persists across root changes (window = new root + offset)
// rather than resetting, so once a user has navigated to a register
// they want to watch, further scale edits don't yank the view away.
//
// Only handles mod === 12 (standard piano layout). For other moduli
// we show a placeholder — see the project notes for next steps there.
// ============================================================
const KBVIZ_WHITE_PCS = [0, 2, 4, 5, 7, 9, 11];
const KBVIZ_BLACK_PCS = [1, 3, 6, 8, 10];
// Black keys are sized/positioned as a fraction of a white key's width,
// in percent, so the whole keyboard scales to fill its container instead
// of using fixed pixel widths (which forced horizontal scrolling).
const KBVIZ_BLACK_WIDTH_RATIO = 0.62;

function isBlackPc(pc) { return KBVIZ_BLACK_PCS.includes(pc); }

// View-only state: how many octaves the visible window is shifted
// from its root-anchored default. Persists across root/scale changes.
let kbvizOctaveOffset = 0;

// The scale root's pitch class, taken from lastScalePositions[0] (the
// app's existing convention for "the root" — see the Helix module).
// Only meaningful at mod===12, which is the only case this visualizer
// handles at all.
function kbvizRootPitchClass() {
  const mod = currentScaleMod();
  const rootStep = (lastScalePositions && lastScalePositions.length) ? lastScalePositions[0] : 0;
  return ((rootStep % mod) + mod) % mod;
}

// The lowest MIDI note of the visible 3-octave window. The window always
// starts on a C, spanning three full octaves C→C→C→C (no shifting based
// on the scale root's pitch class). N is the chord octave slider's target
// octave; the window starts one octave BELOW that (N-1), so for the
// default slider value it opens at C3, showing C3-C4, C4-C5, C5-C6.
// The user's +/- offset shifts the whole window further up or down.
function kbvizWindowLow() {
  const sliderEl = document.getElementById('chord-octave');
  const sliderVal = sliderEl ? (parseInt(sliderEl.value, 10) || 0) : 5;
  const chordOctaveC = 60 + (sliderVal - 5) * 12; // the C note of the selected octave (N)
  return chordOctaveC - 12 + kbvizOctaveOffset * 12; // window starts one octave below N (N-1), always on a C
}
function kbvizWindowHigh() {
  return kbvizWindowLow() + 36; // 3 full octaves: low, low+12, low+24, low+36
}

function buildKeyboardViz() {
  const host = document.getElementById('kbviz-host');
  if (!host) return;
  const mod = currentScaleMod();

  if (mod !== 12) {
    host.innerHTML = `<div class="kbviz-unsupported">
      Keyboard view only supports 12-tone scales. Mod is set to <span class="val">${mod}</span>.
    </div>`;
    return;
  }

  const low = kbvizWindowLow();
  const high = kbvizWindowHigh();

  // Build static DOM for the current window; refreshKeyboardViz() repaints
  // colors on top, and is also called whenever just the window's contents
  // need recoloring without a full rebuild.
  const whiteKeys = [];
  for (let n = low; n <= high; n++) {
    const pc = ((n % 12) + 12) % 12;
    if (!isBlackPc(pc)) whiteKeys.push(n);
  }

  // Label the root note specifically (every octave of it within the
  // window), rather than hardcoding "C" — the window isn't always
  // C-anchored anymore.
  const rootPc = kbvizRootPitchClass();
  const whiteHTML = whiteKeys.map(n => {
    const pc = ((n % 12) + 12) % 12;
    const label = (pc === rootPc) ? midiNoteName(n) : '';
    return `<div class="kbviz-white" data-note="${n}"><span class="kbviz-label">${label}</span></div>`;
  }).join('');

  // Position black keys relative to white-key index.
  const blackOffsetAfterWhiteIndex = []; // [{ note, whiteIndexBefore }]
  let wi = -1;
  for (let n = low; n <= high; n++) {
    const pc = ((n % 12) + 12) % 12;
    if (!isBlackPc(pc)) { wi++; continue; }
    blackOffsetAfterWhiteIndex.push({ note: n, whiteIndexBefore: wi });
  }
  // White keys are laid out with flex, each taking an equal share of the
  // container width, so black-key position/width is computed in percent
  // of that same container rather than fixed pixels.
  const whiteWidthPct = 100 / whiteKeys.length;
  const blackWidthPct = whiteWidthPct * KBVIZ_BLACK_WIDTH_RATIO;
  const blackHTML = blackOffsetAfterWhiteIndex.map(({ note, whiteIndexBefore }) => {
    const leftPct = (whiteIndexBefore + 1) * whiteWidthPct - blackWidthPct / 2;
    return `<div class="kbviz-black" data-note="${note}" style="left:${leftPct}%; width:${blackWidthPct}%;"></div>`;
  }).join('');

  host.innerHTML = `<div class="kbviz-scroll"><div class="kbviz-keys">${whiteHTML}${blackHTML}</div></div>`;

  // Wire pointer interaction — press to noteOn, release/leave to noteOff.
  host.querySelectorAll('.kbviz-white, .kbviz-black').forEach(keyEl => {
    const note = parseInt(keyEl.dataset.note, 10);
    const press = (e) => { e.preventDefault(); InputEngine.noteOn(note, 'click'); };
    const release = () => InputEngine.noteOff(note, 'click');
    keyEl.addEventListener('mousedown', press);
    keyEl.addEventListener('mouseup', release);
    keyEl.addEventListener('mouseleave', release);
    keyEl.addEventListener('touchstart', press, { passive: false });
    keyEl.addEventListener('touchend', release);
  });

  updateKbvizNavLabel();
  refreshKeyboardViz();
}

// Updates the "3 octaves from <root note>" label and enables/disables
// nothing (the +/- buttons always work — there's no upper/lower bound
// on the octave offset beyond what MIDI note numbers can represent).
function updateKbvizNavLabel() {
  const label = document.getElementById('kbviz-nav-label');
  if (!label) return;
  const mod = currentScaleMod();
  if (mod !== 12) { label.innerHTML = ''; return; }
  const low = kbvizWindowLow();
  label.innerHTML = `3 octaves from <span class="val">${midiNoteName(low)}</span>`;
}

// Repaints key colors/held-state without rebuilding the DOM. Cheap
// enough to call on every note on/off and every scale/chord update —
// but does NOT detect window changes (root pitch-class or +/- offset);
// callers that may have changed the window must call buildKeyboardViz()
// instead, which rebuilds the DOM and then calls this anyway.
function refreshKeyboardViz() {
  const host = document.getElementById('kbviz-host');
  if (!host) return;
  const mod = currentScaleMod();
  if (mod !== 12) return; // unsupported-mod placeholder is already shown

  const scalePcs = new Set((lastScalePositions || []).map(n => ((n % mod) + mod) % mod));
  // Chord tones are shown at their actual sounded octave (post-octave-shift),
  // matching the helix's treatment of chord tones vs. the always-pitch-class scale ring.
  const chordNoteSet = new Set(lastChordResultHeard || []);
  // Held-key highlighting only makes sense for real pitches (Root/Direct),
  // and only for whichever single note is actually playing right now —
  // input is monophonic with last-note priority, so highlighting the whole
  // physically-held stack would misleadingly suggest several notes sound
  // at once. Degree mode's keys are abstract selectors, not notes, so
  // nothing is ever highlighted there.
  const isDegreeMode = InputEngine.getMode && InputEngine.getMode() === 'degree';
  const playingNote = (!isDegreeMode && InputEngine.getplayingNote) ? InputEngine.getplayingNote() : null;
  const heldSet = playingNote !== null ? new Set([playingNote]) : new Set();

  host.querySelectorAll('.kbviz-white, .kbviz-black').forEach(keyEl => {
    const note = parseInt(keyEl.dataset.note, 10);
    const pc = ((note % 12) + 12) % 12;
    keyEl.classList.remove('scale-tone', 'chord-tone', 'held');
    if (scalePcs.has(pc)) keyEl.classList.add('scale-tone');
    if (chordNoteSet.has(note)) keyEl.classList.add('chord-tone');
    if (heldSet.has(note)) keyEl.classList.add('held');
  });
}

// ============================================================
// HELIX — 3D comprehensive view (Three.js)
//
// A pitch helix: pitch-class position (angle) × octave (height).
// Renders live state from both Scale Lab and Chord Builder at once:
//   - every scale tone (blue)
//   - the scale root, i.e. positions[0] (bright amber, larger)
//   - the criterion/anchor degree that defines the chord (red)
//   - every chord tone, connected into a closed polygon (amber)
// No controls of its own — it mirrors whatever the two columns produce.
// Ported from a standalone prototype; recolored to the Pitchwheel
// ink/amber/blue/red token system instead of the prototype's own palette.
// ============================================================
const Helix = (() => {
  let scene, camera, renderer, container;
  let spheres = [];
  let chordLines = [];
  let mod = 12;
  let maxLayer = 1;
  const ringRadius = 5;
  const layerHeight = 0.85;
  const TARGET_OCTAVES = 10; // always show this many full octave rings regardless of modulus
  let autoRotate = true;
  let userPaused = false;
  let rotationSpeed = 1;
  let lastInteraction = 0;
  let ready = false;

  // ---- Orbit-camera state ----------------------------------------------
  // The camera's orientation is tracked as an accumulated quaternion rather
  // than a pair of stacked angles (azimuth/elevation). Stacked angles need
  // a fixed "up" reference and a clamp at ±90° to avoid gimbal lock — which
  // is exactly what stops you from ever turning the view upside down.
  // A quaternion has no such reference: each drag composes a small rotation
  // expressed in the camera's *own* current axes onto whatever orientation
  // it already has, so "up" rotates along with the camera instead of being
  // pinned to world-Y. That means there's no pole to get stuck at — you can
  // drag straight through the top, keep going, and land upside down, then
  // keep going further back to right-side up, all with the same smooth
  // motion in every direction.
  const orbit = {
    target: null,
    distance: 10,
    quaternion: null,        // THREE.Quaternion — current camera orientation
  };
  // The camera sits at target + quaternion·(0,0,distance) and looks toward
  // target, i.e. orientation is defined relative to "parked behind target
  // looking down -Z", the same convention THREE.Camera.lookAt produces.

  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

  // Colors — drawn from the page's own CSS variables so the helix always
  // matches the active theme rather than hardcoding hex values twice.
  function cssVar(name, fallback) {
    const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
  }
  function hexNum(cssHex) {
    return parseInt(cssHex.replace('#', ''), 16);
  }
  const COLOR = {
    idle: 0x232730,      // slightly lighter than --ink so unlit spheres read against the card
    scale: 0x5b8db8,     // --blue
    chord: 0xd98e48,     // --amber
    root: 0xf2b66b,      // brighter amber — distinct role from chord tones
    anchor: 0xb85b5b,    // --red
    ring: 0xf2efe9,      // --paper, used at low opacity
  };

  function init() {
    container = document.getElementById('helix-container');
    if (!container || typeof THREE === 'undefined') return;

    scene = new THREE.Scene();
    scene.background = null; // transparent — shows the card background through

    const aspect = container.clientWidth / Math.max(1, container.clientHeight);
    camera = new THREE.PerspectiveCamera(isMobile ? 65 : 60, aspect, 0.1, 1000);

    renderer = new THREE.WebGLRenderer({
      antialias: !isMobile,
      alpha: true,
      powerPreference: isMobile ? 'low-power' : 'high-performance',
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.65));
    const dir = new THREE.DirectionalLight(0xffffff, 0.55);
    dir.position.set(10, 10, 10);
    scene.add(dir);

    buildLattice(mod);
    resetCamera();
    setupControls();
    window.addEventListener('resize', onResize);
    ready = true;
    animate();
  }

  // Frames the camera to see the full helix (TARGET_OCTAVES rings) at once.
  // Distance is computed from vertical FOV so the helix always fits the box.
  //
  // The camera sits ABOVE the helix's vertical center and looks down at it —
  // previously the camera height matched the look-at height exactly, which
  // means every ring was viewed perfectly edge-on (flattened into a line),
  // making any two points on the same ring look collinear regardless of
  // azimuth. Elevating the camera and tilting the view down opens each ring
  // up into a visible ellipse, so points read as being arranged in a circle.
  function resetCamera() {
    const totalHeight = maxLayer * layerHeight;
    const fovRad = (isMobile ? 65 : 60) * Math.PI / 180;
    const halfFovV = Math.atan(Math.tan(fovRad / 2) / Math.max(0.5, camera.aspect));
    const halfH = totalHeight / 2;
    // Drive distance from the half-height that must fit inside the vertical FOV
    const minDist = halfH / Math.tan(halfFovV) * 1.15;
    orbit.target = new THREE.Vector3(0, totalHeight / 2, 0);
    orbit.distance = Math.max(minDist, ringRadius * 3.5);

    // Build the starting orientation using the exact same spherical
    // framing the helix always opened with (15° azimuth, 22° elevation,
    // looking down at the helix), then convert that one-time position
    // into a quaternion via a lookAt matrix. This is the only place
    // azimuth/elevation/lookAt are used — once built, the quaternion is
    // what gets incrementally rotated by drags from here on, never
    // recomputed from angles again.
    const az = 15 * Math.PI / 180;   // off-grid azimuth (avoids edge-on alignment with common scale sizes)
    const elev = 22 * Math.PI / 180; // looking down at the helix, not level with it
    const horiz = orbit.distance * Math.cos(elev);
    const startPos = new THREE.Vector3(
      orbit.target.x + horiz * Math.cos(az),
      orbit.target.y + orbit.distance * Math.sin(elev),
      orbit.target.z + horiz * Math.sin(az)
    );
    const m = new THREE.Matrix4().lookAt(startPos, orbit.target, new THREE.Vector3(0, 1, 0));
    orbit.quaternion = new THREE.Quaternion().setFromRotationMatrix(m);
    applyOrbit();
  }

  // Derives camera position/orientation from the orbit's quaternion and
  // distance. This is the single place that turns (quaternion, distance,
  // target) into a concrete camera transform, so drag/zoom/auto-rotate/
  // resize all stay perfectly consistent with each other.
  //
  // The camera is placed at target + R·(0,0,distance), i.e. "back away
  // from the target along the orientation's local +Z", and its up vector
  // is R·(0,1,0) — the orientation's own local up, NOT world-Y. That last
  // part is what lets the helix go upside down: once a drag has rotated
  // past vertical, local up points toward world-down, and the view flips
  // naturally instead of the renderer fighting to keep "up" pinned to +Y.
  function applyOrbit() {
    const offset = new THREE.Vector3(0, 0, orbit.distance).applyQuaternion(orbit.quaternion);
    camera.position.copy(orbit.target).add(offset);
    camera.up.set(0, 1, 0).applyQuaternion(orbit.quaternion);
    camera.quaternion.copy(orbit.quaternion);
  }

  function onResize() {
    if (!container || !camera || !renderer) return;
    const w = container.clientWidth, h = container.clientHeight;
    if (w === 0 || h === 0) return;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }

  // Build (or rebuild) the lattice of idle spheres + ring guides spanning
  // TARGET_OCTAVES full octaves for the current modulus. Always shows the
  // same number of octave rings regardless of EDO, so microtonal tunings
  // look as full as 12-EDO rather than compressing to fewer rings.
  // Only needs to run again when the modulus changes — scale/chord edits
  // only recolor existing spheres, they never trigger a rebuild.
  function buildLattice(newMod) {
    spheres.forEach(s => scene.remove(s));
    spheres = [];
    scene.children
      .filter(c => c.userData && c.userData.isRing)
      .forEach(r => scene.remove(r));

    mod = Math.max(1, newMod);
    maxLayer = TARGET_OCTAVES;
    const maxNote = mod * TARGET_OCTAVES - 1;
    const sphereSize = isMobile ? 0.085 : 0.11;
    const segments = isMobile ? 7 : 12;

    for (let n = 0; n <= maxNote; n++) {
      const layer = Math.floor(n / mod);
      const posInLayer = n % mod;
      const angle = (posInLayer / mod) * Math.PI * 2;
      const y = layer * layerHeight;
      const x = ringRadius * Math.cos(angle);
