// ============================================================
// SCALE ANALYSIS — JS ports of the C++ analysis functions
// ============================================================

/** Sequential differences of a plain array */
function differences(arr) {
  if (arr.length < 2) return [];
  const out = [];
  for (let i = 1; i < arr.length; i++) out.push(arr[i] - arr[i - 1]);
  return out;
}

/** Geodesic (wrap-around) distance between a and b */
function geodesicDistance(a, b, mod) {
  let d = ((b - a) % mod + mod) % mod;
  if (d > mod / 2) d = mod - d;
  return d;
}

/** All pairwise geodesic distances */
function geodesicDistances(posData, mod) {
  const out = [];
  for (let i = 0; i < posData.length; i++)
    for (let j = i + 1; j < posData.length; j++)
      out.push(geodesicDistance(posData[i], posData[j], mod));
  return out;
}

/** Map value → count */
function calculateOccurrences(arr) {
  const map = {};
  for (const v of arr) map[v] = (map[v] || 0) + 1;
  return map;
}

/** Winograd-deep: each distance 1..(k-1) appears with a unique count */
function isWinogradDeep(occurrences, k) {
  const seen = new Set();
  for (let i = 1; i < k; i++) {
    if (!(i in occurrences)) return false;
    if (seen.has(occurrences[i])) return false;
    seen.add(occurrences[i]);
  }
  return true;
}

/** Erdős-deep: every occurring distance has a unique count */
function isErdosDeep(occurrences) {
  const seen = new Set();
  for (const cnt of Object.values(occurrences)) {
    if (seen.has(cnt)) return false;
    seen.add(cnt);
  }
  return true;
}

/** Euclidean / Björklund string check via interval rotation */
function isEuclidean(posData, mod) {
  if (posData.length === 0) return false;
  const pv = new PositionVector(posData, mod);
  const iv = positionsToIntervals(pv);
  const ivals = iv.getData();
  const n = ivals.length;
  if (n === 0) return false;
  const temp = [...ivals];
  const temp2 = [...ivals];
  temp[0]++;
  temp[n - 1]--;
  for (let i = 0; i < n; i++) {
    temp.push(temp.shift()); // rotate left
    if (temp.join(',') === temp2.join(',')) return true;
  }
  return false;
}

/** Regression evenness: sum of absolute deviations from ideal uniform positions */
function calculateRegressionEvenness(posData, mod) {
  const k = posData.length;
  const ideal = mod / k;
  let sum = 0;
  for (let i = 0; i < k; i++) sum += Math.abs(posData[i] - i * ideal);
  return sum;
}

/** Rhythmic oddity: count of antipodal pairs (exactly mod/2 apart) */
function calculateRhythmicOddity(posData, mod) {
  let count = 0;
  for (let i = 0; i < posData.length; i++)
    for (let j = i + 1; j < posData.length; j++) {
      const d = ((posData[j] - posData[i]) % mod + mod) % mod;
      if (d === mod - d) count++;
    }
  return count;
}

/** Transition complexity: 0/1 flip count in the binary pitch-class string */
function computeTransitionComplexity(posData, mod) {
  const bin = new Array(mod).fill(0);
  for (const p of posData) bin[((p % mod) + mod) % mod] = 1;
  let c = 0;
  for (let i = 1; i < mod; i++) if (bin[i] !== bin[i - 1]) c++;
  return c;
}

/** Shannon entropy of the binary pitch-class vector (bits) */
function computeEntropy(posData, mod) {
  const bin = new Array(mod).fill(0);
  for (const p of posData) bin[((p % mod) + mod) % mod] = 1;
  // count frequencies of 0 and 1
  const freq = {};
  for (const b of bin) freq[b] = (freq[b] || 0) + 1;
  let entropy = 0;
  for (const cnt of Object.values(freq)) {
    const p = cnt / mod;
    entropy -= p * Math.log2(p);
  }
  return entropy;
}

/** Longest run of identical bits in the binary pitch-class vector */
function computeLongestSubsequence(posData, mod) {
  const bin = new Array(mod).fill(0);
  for (const p of posData) bin[((p % mod) + mod) % mod] = 1;
  let longest = 1, cur = 1;
  for (let i = 1; i < mod; i++) {
    if (bin[i] === bin[i - 1]) { cur++; if (cur > longest) longest = cur; }
    else cur = 1;
  }
  return longest;
}

/** Distribution spectra: for each generic interval j, the set of specific intervals */
function calculateDistributionSpectra(posData, mod) {
  const n = posData.length;
  const spectra = Array.from({ length: n - 1 }, () => new Set());
  for (let i = 0; i < n; i++)
    for (let j = 1; j < n; j++) {
      const specific = ((posData[(i + j) % n] - posData[i]) % mod + mod) % mod;
      spectra[j - 1].add(specific);
    }
  return spectra;
}

/** Width of each spectrum entry: max − min */
function calculateSpectrumWidths(spectra) {
  return spectra.map(s => {
    if (s.size === 0) return 0;
    const arr = [...s];
    return Math.max(...arr) - Math.min(...arr);
  });
}

/** Spectrum variation = mean width across all generic intervals */
function calculateSpectrumVariation(widths) {
  if (widths.length === 0) return 0;
  return widths.reduce((a, b) => a + b, 0) / widths.length;
}

/** Rotational symmetry: transpositions that map the scale onto itself */
function findRotationalSymmetryAxes(posData, mod) {
  const sorted = [...posData].sort((a, b) => a - b).map(v => ((v % mod) + mod) % mod).sort((a, b) => a - b);
  const key = sorted.join(',');
  const axes = [];
  for (let t = 1; t < mod; t++) {
    const trans = sorted.map(v => (v + t) % mod).sort((a, b) => a - b).join(',');
    if (trans === key) axes.push(t);
  }
  return axes;
}

/** Reflective symmetry: axes (including half-integer) where reflecting maps scale onto itself */
function findReflectiveSymmetryAxes(posData, mod) {
  const sorted = [...posData].map(v => ((v % mod) + mod) % mod).sort((a, b) => a - b);
  const sortedSet = new Set(sorted);
  const axes = [];
  for (let ad = 0; ad < 2 * mod; ad++) {
    const axis = ad / 2;
    let ok = true;
    for (const note of sorted) {
      const reflected = ((Math.round(2 * axis - note) % mod) + mod) % mod;
      if (!sortedSet.has(reflected)) { ok = false; break; }
    }
    if (ok) axes.push(axis);
  }
  return axes;
}

/** Palindrome = has a reflective axis at 0 */
function isPalindromeScale(posData, mod) {
  return findReflectiveSymmetryAxes(posData, mod).some(a => a === 0);
}

/** Chiral = mirror image cannot be superimposed by any transposition */
function isChiral(posData, mod) {
  const sorted = [...posData].map(v => ((v % mod) + mod) % mod).sort((a, b) => a - b);
  const key = sorted.join(',');
  const mirrored = sorted.map(v => (mod - v) % mod).sort((a, b) => a - b);
  if (mirrored.join(',') === key) return false;
  for (let t = 0; t < mod; t++) {
    const trans = mirrored.map(v => (v + t) % mod).sort((a, b) => a - b).join(',');
    if (trans === key) return false;
  }
  return true;
}

/** Balanced = centre of mass lies at the origin of the pitch-class circle */
function isBalanced(posData, mod) {
  let x = 0, y = 0;
  for (const p of posData) {
    const a = (((p % mod) + mod) % mod / mod) * 2 * Math.PI;
    x += Math.cos(a); y += Math.sin(a);
  }
  return Math.abs(x) < 1e-6 && Math.abs(y) < 1e-6;
}

/** Aksak classification based on modulus */
function isPrimeNum(n) {
  if (n < 2) return false;
  for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false;
  return true;
}
function classifyAksak(mod) {
  if (isPrimeNum(mod)) return 'Authentic aksak';
  if (mod % 2 !== 0) return 'Quasi-aksak';
  return 'Pseudo-aksak';
}

/** Generator: find m such that {i*m mod n | i=0..k-1} = scale, or null */
function findGenerator(posData, mod) {
  const sorted = [...posData].map(v => ((v % mod) + mod) % mod).sort((a, b) => a - b);
  const key = sorted.join(',');
  const k = sorted.length;
  for (let m = 1; m < mod; m++) {
    const gen = Array.from({ length: k }, (_, i) => (i * m) % mod).sort((a, b) => a - b).join(',');
    if (gen === key) return m;
  }
  return null;
}

function astat(label, valHTML, hint, full) {
  return `<div class="astat${full ? ' full' : ''}">
    <div class="astat-label">${label}</div>
    <div class="astat-val">${valHTML}</div>
    ${hint ? `<div class="astat-hint">${hint}</div>` : ''}
  </div>`;
}

function badge(label, on, title) {
  return `<span class="abadge ${on ? 'on' : 'off'}" title="${title || label}">${label}</span>`;
}

function updateScaleAnalysis(posData, mod) {
  const body = document.getElementById('analysis-body');
  if (!body) return;
  if (!posData || posData.length < 2) {
    body.innerHTML = `<div class="astat full"><div class="astat-label">Note</div><div class="astat-val dim">Need ≥ 2 positions for analysis.</div></div>`;
    return;
  }

  const k = posData.length;

  // Normalise to pitch classes for all calculations
  const pcs = posData.map(v => ((v % mod) + mod) % mod);

  // --- compute ---
  const distances  = geodesicDistances(pcs, mod);
  const occ        = calculateOccurrences(distances);
  const winDeep    = isWinogradDeep(occ, k);
  const erdDeep    = isErdosDeep(occ);
  const eucl       = isEuclidean(pcs, mod);
  const evenness   = calculateRegressionEvenness(posData, mod);
  const oddity     = calculateRhythmicOddity(pcs, mod);
  const entropy    = computeEntropy(pcs, mod);
  const txc        = computeTransitionComplexity(pcs, mod);
  const lseq       = computeLongestSubsequence(pcs, mod);
  const spectra    = calculateDistributionSpectra(pcs, mod);
  const widths     = calculateSpectrumWidths(spectra);
  const variation  = calculateSpectrumVariation(widths);
  const rotAxes    = findRotationalSymmetryAxes(pcs, mod);
  const refAxes    = findReflectiveSymmetryAxes(pcs, mod);
  const palindrome = isPalindromeScale(pcs, mod);
  const chiral     = isChiral(pcs, mod);
  const balanced   = isBalanced(pcs, mod);
  const aksak      = classifyAksak(mod);
  const gen        = findGenerator(pcs, mod);

  const fmtAxes = arr => arr.length
    ? arr.map(a => a % 1 ? a.toFixed(1) : String(a)).join(', ')
    : '—';

  // Geodesic distance pills
  const distPillsHTML = Object.entries(occ)
    .sort((a, b) => +a[0] - +b[0])
    .map(([d, c]) =>
      `<span class="adist-pill"><span class="dp-dist">${d}</span><span class="dp-x">×</span><span class="dp-cnt">${c}</span></span>`
    ).join('');

  // Spectra table
  // Myhill property: every generic interval has exactly 2 specific sizes (width 1).
  // Strictly proper: every generic interval has exactly 1 specific size (width 0).
  const spectraRows = spectra.map((s, i) => {
    const vals = [...s].sort((a, b) => a - b).join(', ');
    const w = widths[i];
    const mark = w === 0
      ? `<span class="st-myhill">strict</span>`
      : w === 1
        ? `<span class="st-myhill" style="color:var(--blue)">Myhill</span>`
        : '';
    return `<tr>
      <td>&lt;${i + 1}&gt;</td>
      <td><span class="st-set">{${vals}}</span><span class="st-w">w=${w}</span>${mark}</td>
    </tr>`;
  }).join('');

  const html = `
    <div class="asection">Properties</div>
    <div class="abadge-row">
      ${badge('Euclidean', eucl,
        'Notes are distributed as evenly as possible across mod steps (Björklund/Euclidean rhythm)')}
      ${badge('Winograd-deep', winDeep,
        'Every distance 1…k−1 appears, each a different number of times')}
      ${badge('Erdős-deep', erdDeep,
        'No two distinct distances appear the same number of times')}
      ${badge('Palindrome', palindrome,
        'The interval sequence reads identically forwards and backwards')}
      ${badge('Balanced', balanced,
        'The pitch classes sum to zero as unit-circle vectors (equal pull in all directions)')}
      ${badge('Chiral', chiral,
        'The scale and its mirror image are not related by any transposition')}
    </div>

    <div class="asection">Distances</div>
    <div class="astat-grid">
      ${astat('Geodesic distances',
        `<div class="adist-row">${distPillsHTML || '<span class="astat-val dim">—</span>'}</div>`,
        'All pairwise shortest distances on the pitch-class circle, shown as distance × count')}
      ${astat('Regression evenness', `${evenness.toFixed(3)}`,
        'Sum of |position − ideal position| where ideal = equally spaced. 0 = maximally even.')}
      ${astat('Rhythmic oddity', `${oddity}`,
        'Number of note pairs exactly mod/2 steps apart (diametrically opposite). 0 = no antipodal pairs.')}
    </div>

    <div class="asection">Binary string</div>
    <div class="astat-grid">
      ${astat('Shannon entropy',
        `${entropy.toFixed(4)} <span style="font-size:11px;color:var(--paper-dim)">bits</span>`,
        'Entropy of the length-mod binary string (1 = note present, 0 = absent). Max 1 bit when k = mod/2.')}
      ${astat('Transition complexity', `${txc}`,
        '0↔1 transitions in the binary string. Equals 2k for a scale with no adjacent notes; lower means clustering.')}
      ${astat('Longest run', `${lseq}`,
        'Longest unbroken block of identical bits (0s or 1s).')}
    </div>

    <div class="asection">Symmetry</div>
    <div class="astat-grid">
      ${astat('Rotational axes',
        rotAxes.length ? rotAxes.join(', ') : '<span class="dim">—</span>',
        'Transpositions t (1 ≤ t < mod) under which the scale maps onto itself')}
      ${astat('Reflective axes',
        `<span class="astat-val blue">${refAxes.length ? fmtAxes(refAxes) : '<span class="dim">—</span>'}</span>`,
        'Axes of mirror symmetry on the pitch-class circle. Half-integer axes fall between steps.')}
    </div>

    <div class="asection">Generation</div>
    <div class="astat-grid">
      ${astat('Generator',
        gen !== null
          ? `m = <span style="color:var(--amber)">${gen}</span>`
          : `<span class="dim">—</span>`,
        gen !== null
          ? `{0, ${gen}, ${2*gen%mod}, …} mod ${mod} — all k notes are multiples of ${gen}`
          : 'No integer m produces this scale as {i·m mod ' + mod + '}')}
      ${astat('Aksak (mod)',
        aksak,
        'Aksak rhythms have an odd period. Prime = authentic aksak; odd composite = quasi-aksak; even = pseudo-aksak (not true aksak).')}
    </div>

    <div class="asection">Distribution spectra</div>
    <div class="astat-hint" style="margin-bottom:8px">
      Row &lt;j&gt; lists the specific interval sizes that span exactly j scale steps. w = max−min.
      w=0: strictly proper (one size per generic interval). w=1: Myhill property.
    </div>
    <div class="astat full" style="padding-top:0">
      <div class="astat-label" style="margin-bottom:4px">
        Variation = ${variation.toFixed(4)} <span style="font-weight:normal;text-transform:none;letter-spacing:0">(mean width)</span>
      </div>
      <table class="spectra-table">
        <tbody>${spectraRows}</tbody>
      </table>
    </div>
  `;

  body.innerHTML = html;
}

function updateScaleLab() {
  const mod = currentScaleMod();
  const steps = currentStepsForMod(mod);
  if (steps.length === 0) {
    scaleReadout.innerHTML = `<span class="label">no valid steps</span>`;
    updateHelix({ mod, scalePositions: [], chordPositions: [], anchorNote: null });
    return;
  }

  const scale = new Scale(new IntervalVector(steps, 0, mod), {});
  let posData = scale.toPositions().getData();

  // Run the draggable transform chain, in the user's chosen order.
  for (const op of scaleChainState.stepOrder) {
    if (!scaleChainEnabled[op]) continue;
    switch (op) {
      case 'mode': {
        const k = getNum('scale-tx-mode');
        const iv = positionsToIntervals(new PositionVector(posData, mod));
        posData = intervalsToPositions(iv.rotate(k)).getData();
        break;
      }
      case 'degree': {
        const d = getNum('scale-tx-degree');
        posData = new PositionVector(posData, mod).rotoTranslate(d).getData();
        break;
      }
      case 'root': {
        // Originally this was an unconditional intervals.setOffset(root) applied
        // first, before mode/invert/mirror. Now that Root is a draggable, toggleable
        // step like any other, a hard set would silently undo whatever offset
        // earlier steps in the chain produced — so this shifts by `r` instead of
        // replacing the offset outright, keeping the chain composable regardless
        // of where Root sits in the order.
        const r = getNum('scale-tx-root');
        const iv = positionsToIntervals(new PositionVector(posData, mod));
        iv.setOffset(iv.getOffset() + r);
        posData = intervalsToPositions(iv).getData();
        break;
      }
      case 'invert': {
        const ax = getNum('scale-tx-axis');
        const iv = positionsToIntervals(new PositionVector(posData, mod));
        posData = intervalsToPositions(iv.inversion(ax)).getData();
        break;
      }
      case 'opmirror': {
        posData = opMirror(posData, 0);
        break;
      }
      case 'negative': {
        const root = getNum('scale-tx-root');
        posData = opNegative(posData, root, mod);
        break;
      }
    }
  }

  const positions = new PositionVector(posData, mod);
  const intervals = positionsToIntervals(positions);

  lastScalePositions = posData;
  _lastScaleMod = mod;

  // Analysis uses a version of the scale that ignores root, degree, and invert
  // transforms — those just transpose or rotate without changing interval content.
  // Mode, mirror, and negative do change the interval structure, so they're kept.
  let analysisPosData = scale.toPositions().getData();
  for (const op of scaleChainState.stepOrder) {
    if (!scaleChainEnabled[op]) continue;
    switch (op) {
      case 'mode': {
        const k = getNum('scale-tx-mode');
        const iv = positionsToIntervals(new PositionVector(analysisPosData, mod));
        analysisPosData = intervalsToPositions(iv.rotate(k)).getData();
        break;
      }
      case 'opmirror': {
        analysisPosData = opMirror(analysisPosData, 0);
        break;
      }
      case 'negative': {
        const root = getNum('scale-tx-root');
        analysisPosData = opNegative(analysisPosData, root, mod);
        break;
      }
      // root, degree, invert intentionally omitted
    }
  }
  // Normalise: shift so the lowest pitch class is 0
  const minPc = Math.min(...analysisPosData.map(v => ((v % mod) + mod) % mod));
  analysisPosData = analysisPosData.map(v => (((v % mod) + mod) % mod - minPc + mod) % mod).sort((a, b) => a - b);

  updateScaleAnalysis(analysisPosData, mod);

  const negAxisNote = scaleChainEnabled.negative
    ? ` · axis ${negativeHarmonyAxis(getNum('scale-tx-root'), mod)}`
    : '';

  scaleReadout.innerHTML = `
    <span class="label">intervals</span> <span class="val blue">${fmtList(intervals.getData())}</span> <span style="color:var(--paper-dim)">offset ${intervals.getOffset()}</span><br>
    <span class="label">positions</span> <span class="val">${fmtList(posData)}</span><span style="color:var(--paper-dim)">${negAxisNote}</span>
  `;

  // Cascade: rebuild degree chips if scale size changed, then update chord builder
  if (typeof buildDegreeChips === 'function' && chordChainEnabled !== null) {
    buildDegreeChips();
    updateChordBuilder(); // this also drives updateHelix() with the chord in view
  } else {
    // Chord builder not initialized yet (first paint) — show scale alone.
    updateHelix({ mod, scalePositions: posData, chordPositions: [], anchorNote: null });
  }
}

// ============================================================
// SCALE GENERATORS — JS ports of Euclidean, Clough-Douthett, Deep
// ============================================================

/** Euclidean: returns interval array */
function genEuclidean(steps, events) {
  if (events <= 0 || steps <= 0) return [];
  function eucl(n, k) {
    if (k === 0) return [];
    const { quotient, remainder } = euclideanDivision(n, k);
    if (remainder === 0) {
      const out = [];
      for (let i = 0; i < k; i++) out.push(quotient);
      return out;
    }
    const sub = eucl(k, remainder);
    const out = [];
    for (let i = 0; i < remainder; i++) {
      for (let j = 0; j < sub[i] - 1; j++) out.push(quotient);
      out.push(quotient + 1);
    }
    return out;
  }
  return eucl(steps, events);
}

/** Convert Euclidean intervals + offset → position array (mod steps) */
function euclideanToPositions(steps, events, offset) {
  const ivals = genEuclidean(steps, events);
  if (ivals.length === 0) return [];
  const positions = [];
  let pos = ((offset % steps) + steps) % steps;
  for (const iv of ivals) {
    positions.push(pos);
    pos = (pos + iv) % steps;
  }
  return positions;
}

/** Clough-Douthett: returns sorted position array */
function genCloughDouthett(steps, events, offset) {
  if (events <= 0 || steps <= 0) return [];
  const positions = [];
  for (let i = 0; i < events; i++) {
    positions.push((Math.floor(i * steps / events) + offset) % steps);
  }
  positions.sort((a, b) => a - b);
  return positions;
}

/** Deep Rhythm: returns sorted, deduplicated position array */
function genDeepRhythm(steps, events, multiplicity, offset) {
  if (events <= 0 || steps <= 0) return [];
  const raw = [];
  for (let i = 0; i < events; i++) {
    raw.push(((i * multiplicity) + offset) % steps);
  }
  // Deduplicate and sort (as noted in the C++ docs)
  const unique = [...new Set(raw)];
  unique.sort((a, b) => a - b);
  return unique;
}

// GENERATOR UI
// ============================================================
// Tracks what last set the scale: 'generator', 'picker', or 'custom'.
// Used by the mod-change handler to decide whether to re-run the generator.
let _scaleLastSetBy = 'picker'; // default matches initial state (scale DB pill active)

let runGenerator; // declared here so it can be called after chain init below
{
  let activeGen = 'euclidean';

  // Tab switching
  document.querySelectorAll('.gen-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.gen-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.gen-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      activeGen = tab.dataset.gen;
      document.getElementById('gen-panel-' + activeGen).classList.add('active');
      runGenerator();
    });
  });

  function getInt(id, fallback = 0) {
    const el = document.getElementById(id);
    if (!el) return fallback;
    const v = parseInt(el.value, 10);
    return isNaN(v) ? fallback : v;
  }

  runGenerator = function() {
    const readout = document.getElementById('gen-readout');
    const steps = currentScaleMod();
    let positions = [];
    try {
      if (activeGen === 'euclidean') {
        const events = getInt('gen-eu-events', 7);
        if (events > steps) throw new Error('events must be ≤ mod');
        if (events < 1)     throw new Error('events must be ≥ 1');
        positions = euclideanToPositions(steps, events, 0);
      } else if (activeGen === 'cloughdouthett') {
        const events = getInt('gen-cd-events', 7);
        if (events > steps) throw new Error('events must be ≤ mod');
        if (events < 1)     throw new Error('events must be ≥ 1');
        positions = genCloughDouthett(steps, events, 0);
      } else {
        const events = getInt('gen-dr-events', 7);
        const mult   = getInt('gen-dr-mult', 7);
        if (events < 1) throw new Error('events must be ≥ 1');
        positions = genDeepRhythm(steps, events, mult, 0);
      }
      readout.innerHTML = `<span class="val">${positions.join(', ')}</span>`;
    } catch(e) {
      readout.innerHTML = `<span style="color:var(--red)">${e.message}</span>`;
      return;
    }
    // Push directly into the custom input and update the scale
    const customInput = document.getElementById('scale-custom');
    customInput.value = positions.join(',');
    customInput.dataset.dirty = '1';
    document.querySelectorAll('.scale-pill.active').forEach(p => p.classList.remove('active'));
    _scaleLastSetBy = 'generator';
    updateScaleLab();
  };

  // Wire all generator inputs to re-run
  ['gen-eu-events',
   'gen-cd-events',
   'gen-dr-events','gen-dr-mult'
  ].forEach(id => {
    document.getElementById(id).addEventListener('input', runGenerator);
  });
}

scaleChainEnabled = initTransformChain('scale-', 'scale-chain-wrap', SCALE_CHAIN_STEPS, scaleChainState.stepOrder, updateScaleLab);

buildScaleFolders(() => { scaleCustomInput.dataset.dirty = '0'; _scaleLastSetBy = 'picker'; updateScaleLab(); });
initScaleSearch();

scaleModInput.addEventListener('input', () => {
  if (_scaleLastSetBy === 'generator') {
    // Generator was last — re-run it with the new mod so the scale stays live.
    runGenerator();
  } else {
    // Scale was set via the picker or the custom input — leave it alone.
    updateScaleLab();
  }
});
scaleCustomInput.addEventListener('input', () => { scaleCustomInput.dataset.dirty = '1'; _scaleLastSetBy = 'custom'; updateScaleLab(); });

const chordRotation = document.getElementById('chord-rotation');
const chordPrevoices = document.getElementById('chord-prevoices');
const chordReadout = document.getElementById('chord-readout');
const chordOctave = document.getElementById('chord-octave');
const chordOctaveVal = document.getElementById('chord-octave-val');

let _criterionMode = 'position'; // 'position' or 'interval'
let selectedDegrees = new Set([0, 2, 4]); // kept for compat; actually read from criterionPositionInput
let lastChordResult = [];
let lastChordResultHeard = [];

const chordChainState = {
  stepOrder: ['degree', 'root', 'mode', 'invert', 'opmirror', 'negative'],
};

const CHORD_CHAIN_STEPS = [
  { op: 'degree', name: 'Position', defaultOn: true,
    hint: 'Shifts the starting index into the chord tones (voicing / inversion). Changes which chord tone sits at the bottom without reordering intervals.',
    fields: [{ id: 'tx-degree', value: 0, step: 1, title: 'Index of the chord tone to start from.' }] },
  { op: 'root', name: 'Offset',
    hint: 'Transposes the chord by shifting the interval-vector offset. Value is added to the current offset, so it composes with other steps.',
    fields: [{ id: 'tx-root', value: 0, step: 1, title: 'Semitones to transpose.' }] },
  { op: 'mode', name: 'Mode',
    hint: 'Rotates the interval pattern of the chord tones. Equivalent to a cyclic permutation of the voicing intervals.',
    fields: [{ id: 'tx-mode', value: 0, step: 1, title: 'Rotation amount.' }] },
  { op: 'invert', name: 'Invert',
    hint: 'Reflects each tone around an axis position, then sorts ascending. Classic chord inversion when axis = 0.',
    fields: [{ id: 'tx-axis', value: 0, step: 1, title: 'Position to reflect around.' }] },
  { op: 'opmirror', name: 'Mirror',
    hint: 'Reflects positions and re-anchors so the lowest pitch stays fixed.' },
  { op: 'negative', name: 'Negative',
    hint: 'Negative harmony: negates the scale and folds the shift degree before selecting. The reflection axis is taken from the Offset step root value.',
    fields: [] },
];

function criterionType() {
  return _criterionMode;
}

function syncCriterionModeVisibility() {
  const isInterval = _criterionMode === 'interval';
  criterionPositionInput.style.display = isInterval ? 'none' : '';
  criterionIntervalSteps.style.display = isInterval ? '' : 'none';
  // Update toggle button states
  criterionTypePosition.classList.toggle('active', !isInterval);
  criterionTypeInterval.classList.toggle('active', isInterval);
}

function buildDegreeChips() {
  // No-op: chips replaced by text input. selectedDegrees is now read from criterionPositionInput.
}

function parseDegrees(str) {
  return str.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !Number.isNaN(n) && n >= 0);
}

// foldDegree: mirrors a degree back through 0 using modular fold
function foldDegree(degree, modulo) {
  const r = degree % modulo;
  return degree - 2 * r;
}

function updateChordBuilder() {
  if (!chordChainEnabled) return;
  // Use the scale lab's live output directly — same modulus, same positions.
  const mod = currentScaleMod();
  const scalePositions = new PositionVector(lastScalePositions, mod);
  const scaleSize = lastScalePositions.length;
  if (scaleSize === 0) {
    updateHelix({ mod, scalePositions: [], chordPositions: [], anchorNote: null });
    return;
  }

  let criterion;
  let criterionLabel;

  let anchorDegree = 0; // 0-indexed scale degree that anchors/defines the chord (criterion root)

  if (criterionType() === 'position') {
    const degrees = parseDegrees(criterionPositionInput.value).sort((a, b) => a - b);
    if (degrees.length === 0) {
      chordReadout.innerHTML = `<span class="label">enter at least one degree</span>`;
      updateHelix({ mod, scalePositions: lastScalePositions, chordPositions: [], anchorNote: null });
      return;
    }
    criterion = new PositionVector(degrees, scaleSize);
    criterionLabel = `degrees ${fmtList(degrees)}`;
    anchorDegree = degrees[0] + (parseInt(chordShift.value, 10) || 0);
  } else {
    const intervalSteps = parseSteps(criterionIntervalSteps.value);
    if (intervalSteps.length === 0) {
      chordReadout.innerHTML = `<span class="label">enter at least one step</span>`;
      updateHelix({ mod, scalePositions: lastScalePositions, chordPositions: [], anchorNote: null });
      return;
    }
    criterion = new IntervalVector(intervalSteps, 0, scaleSize);
    criterionLabel = `steps ${fmtList(intervalSteps)} from degree ${parseInt(chordShift.value, 10) || 0}`;
    anchorDegree = parseInt(chordShift.value, 10) || 0;
  }

  const params = {
    shift: parseInt(chordShift.value, 10) || 0,
    rotationOrRototrans: parseInt(chordRotation.value, 10) || 0,
    preVoices: parseInt(chordPrevoices.value, 10) || 0,
    position: 0,   // position handled in the chain now
    invert: false,
    axis: 0,
    negativeOrMirror: false,
    negativeOrMirrorPos: 0,
  };

  // If negative is enabled in the chain, apply it pre-selection:
  //   1. opNegative on the scale positions
  //   2. foldDegree on the shift param (the "shift degrees by" offset)
  //   Then select from the negated scale using the same criterion degrees but folded shift.
  let effectiveScalePositions = scalePositions;
  let effectiveParams = params;

  if (chordChainEnabled.negative) {
    const negRoot = getNum('scale-tx-root');

    // 1. Negate the scale
    const negatedScaleArr = opNegative(lastScalePositions, negRoot, mod);
    effectiveScalePositions = new PositionVector(negatedScaleArr, mod);

    // 2. Fold the shift
    const foldedShift = foldDegree(params.shift, scaleSize);
    effectiveParams = { ...params, shift: foldedShift };
  }

  let result;
  try {
    const c = new Chord(effectiveScalePositions, criterion, effectiveParams);
    result = c.toPositions().getData();
  } catch (e) {
    chordReadout.innerHTML = `<span class="label" style="color:var(--red)">error: ${e.message}</span>`;
    return;
  }

  // Run the draggable post-transform chain (excluding 'negative' which was pre-applied above).
  for (const op of chordChainState.stepOrder) {
    if (!chordChainEnabled[op]) continue;
    switch (op) {
      case 'mode': {
        const k = getNum('chord-tx-mode');
        const iv = positionsToIntervals(new PositionVector(result, mod));
        result = intervalsToPositions(iv.rotate(k)).getData();
        break;
      }
      case 'degree': {
        const d = getNum('chord-tx-degree');
        result = new PositionVector(result, mod).rotoTranslate(d).getData();
        break;
      }
      case 'root': {
        const r = getNum('chord-tx-root');
        const iv = positionsToIntervals(new PositionVector(result, mod));
        iv.setOffset(iv.getOffset() + r);
        result = intervalsToPositions(iv).getData();
        break;
      }
      case 'invert': {
        const ax = getNum('chord-tx-axis');
        result = new PositionVector(result, mod).inversion(ax, true).getData();
        break;
      }
      case 'opmirror': {
        result = opMirror(result, 0);
        break;
      }
      case 'negative': {
        // Already applied pre-selection above; skip here.
        break;
      }
    }
  }

  lastChordResult = result;

  const negAxisNote = chordChainEnabled.negative
    ? ` · neg axis ${negativeHarmonyAxis(getNum('scale-tx-root'), mod)}`
    : '';

  chordReadout.innerHTML = `
    <span class="label">criterion</span> <span class="val blue">${criterionLabel}</span><br>
    <span class="label">chord</span> <span class="val">${fmtList(result)}</span><span style="color:var(--paper-dim)">${negAxisNote}</span>
  `;

  // When negative harmony is active, the helix should reflect the transformed state:
  //   - scale dots show the negated scale (effectiveScalePositions)
  //   - anchor is looked up on the negated scale at the folded degree
  // Without negative, everything uses the original scale as before.
  const helixScalePositions = chordChainEnabled.negative
    ? effectiveScalePositions.getData()
    : lastScalePositions;

  // anchorDegree may be negative or exceed scaleSize-1 (shift can push it out of range);
  // PositionVector.element() handles arbitrary indices by cycling through ranges,
  // which is exactly the scale-extension behaviour we want for an "anchor note".
  // When negative is active, the anchor degree must mirror the shift the same way
  // the chord selection does: fold just the shift component, then re-add degrees[0]
  // (for position criterion) or use foldedShift alone (for interval criterion).
  // foldDegree is only applied to the shift, not to the full anchorDegree, because
  // degrees[0] is a selector index that doesn't change under negation.
  const effectiveAnchorDegree = chordChainEnabled.negative
    ? foldDegree(params.shift, scaleSize) + (criterionType() === 'position'
        ? (parseDegrees(criterionPositionInput.value).sort((a, b) => a - b)[0] ?? 0)
        : 0)
    : anchorDegree;
  const anchorNote = ((new PositionVector(helixScalePositions, mod).element(effectiveAnchorDegree)) % mod + mod) % mod;

  // Octave is a purely perceptual offset — never folded back into the math result.
  // Chord tones are shifted for audio and helix placement.
  // Root and anchor stay at their natural (octave-0) positions so they always
  // appear on the bottom ring — showing the abstract pitch-class, not a register choice.
  const octSemis = chordOctaveSemis();
  lastChordResultHeard = transposeByOctave(result, mod, octSemis);

  updateHelix({ mod, scalePositions: helixScalePositions, chordPositions: lastChordResultHeard, anchorNote });
}

// Octave control: maps the slider integer to a step offset.
// One octave = mod steps, so octave +1 always doubles frequency regardless of edo.
function chordOctaveSemis() {
  const octaves = parseInt(chordOctave.value, 10) || 0;
  const mod = currentScaleMod();
  return Math.round(octaves * mod);
}

function transposeByOctave(arr, mod, semis) {
  return arr.map(n => n + semis);
}

chordChainEnabled = initTransformChain('chord-', 'chord-chain-wrap', CHORD_CHAIN_STEPS, chordChainState.stepOrder, updateChordBuilder);

// Criterion toggle buttons
criterionTypePosition.addEventListener('click', () => { _criterionMode = 'position'; syncCriterionModeVisibility(); updateChordBuilder(); });
criterionTypeInterval.addEventListener('click', () => { _criterionMode = 'interval'; syncCriterionModeVisibility(); updateChordBuilder(); });
criterionPositionInput.addEventListener('input', updateChordBuilder);
criterionIntervalSteps.addEventListener('input', updateChordBuilder);
chordShift.addEventListener('input', () => { chordShiftVal.textContent = chordShift.value; updateChordBuilder(); });
chordRotation.addEventListener('input', updateChordBuilder);
chordPrevoices.addEventListener('input', updateChordBuilder);
chordOctave.addEventListener('input', () => {
  const v = parseInt(chordOctave.value, 10) || 0;
  chordOctaveVal.textContent = (v >= 0 ? '+' : '') + v;
  updateChordBuilder();
});

document.getElementById('chord-play').addEventListener('click', () => playChordTones(lastChordResultHeard, currentScaleMod()));
document.getElementById('chord-play-arp').addEventListener('click', () => playSequence(lastChordResultHeard, currentScaleMod(), { gap: 0.24, dur: 0.3 }));


syncCriterionModeVisibility();
buildDegreeChips();
updateChordBuilder();

// ============================================================
// TOOLTIP — JS-driven replacement for the CSS ::after approach.
//
// Why: CSS ::after / ::before pseudo-elements are not rendered on
// replaced / void elements like <input>, so all number spinners,
// range sliders, and text fields silently dropped their tooltips.
// Also, position:absolute tooltips are clipped inside .helix-card
// (overflow:hidden).  A position:fixed div appended to <body> fixes
// both problems.
//
// Usage: read from [title] attribute.  On first hover the title is
// moved to [data-tip] to suppress the browser's native tooltip box.
// ============================================================
(function () {
  // Create the shared tooltip element
  const tip = document.createElement('div');
  tip.style.cssText = [
    'position:fixed',
    'background:#0d0f13',
    'color:#f2efe9',
    'font-family:"IBM Plex Mono",monospace',
    'font-size:11px',
    'line-height:1.45',
    'padding:6px 9px',
    'border-radius:5px',
    'border:1px solid #2a2e37',
    'white-space:pre-wrap',
    'max-width:240px',
    'width:max-content',
    'pointer-events:none',
    'z-index:9999',
    'display:none',
    'box-shadow:0 2px 10px rgba(0,0,0,.55)',
  ].join(';');
  document.body.appendChild(tip);

  let curX = 0, curY = 0, activeEl = null, leaveCleanup = null;

  function positionTip(x, y) {
    const w = tip.offsetWidth, h = tip.offsetHeight;
    const margin = 8;
    const vw = window.innerWidth, vh = window.innerHeight;
    let left = x - w / 2;
    let top  = y - h - 14;          // default: above cursor
    if (top < margin) top = y + 18; // flip below if too close to top
    left = Math.max(margin, Math.min(left, vw - w - margin));
    top  = Math.max(margin, Math.min(top,  vh - h - margin));
    tip.style.left = left + 'px';
    tip.style.top  = top  + 'px';
  }

  function hideTip() {
    tip.style.display = 'none';
    activeEl = null;
  }

  // Track cursor globally so we can position the tooltip immediately on show
  document.addEventListener('mousemove', function (e) {
    curX = e.clientX; curY = e.clientY;
    if (tip.style.display !== 'none') positionTip(curX, curY);
  });

  // Show tooltip when entering any element that carries title / data-tip
  document.addEventListener('mouseover', function (e) {
    // Walk up from the hovered element to find the nearest titled ancestor
    let el = e.target;
    while (el && el !== document.body) {
      const text = el.getAttribute('data-tip') || el.getAttribute('title');
      if (text) {
        if (el === activeEl) return; // already showing for this element

        // Detach previous leave-handler if switching targets
        if (activeEl && leaveCleanup) {
          activeEl.removeEventListener('mouseleave', leaveCleanup);
          leaveCleanup = null;
        }

        // Move title → data-tip once so the native browser tooltip never fires
        if (el.hasAttribute('title')) {
          el.setAttribute('data-tip', el.getAttribute('title'));
          el.removeAttribute('title');
        }

        activeEl = el;
        tip.textContent = text;
        tip.style.display = 'block';
        positionTip(curX, curY);

        // Hide when the mouse leaves this element
        leaveCleanup = function () { hideTip(); leaveCleanup = null; };
        el.addEventListener('mouseleave', leaveCleanup, { once: true });
        return;
      }
      el = el.parentElement;
    }

    // Moved onto an element with no tooltip — hide
    if (activeEl && leaveCleanup) {
      activeEl.removeEventListener('mouseleave', leaveCleanup);
      leaveCleanup = null;
    }
    hideTip();
  });
})();

</script>
</body>
