      const z = ringRadius * Math.sin(angle);

      const geometry = new THREE.SphereGeometry(sphereSize, segments, segments);
      const material = new THREE.MeshStandardMaterial({
        color: COLOR.idle, emissive: 0x000000, emissiveIntensity: 0,
      });
      const sphere = new THREE.Mesh(geometry, material);
      sphere.position.set(x, y, z);
      sphere.userData.number = n;
      scene.add(sphere);
      spheres.push(sphere);
    }

    for (let layer = 0; layer <= maxLayer; layer++) {
      const ringGeo = new THREE.RingGeometry(ringRadius - 0.04, ringRadius + 0.04, 64);
      const ringMat = new THREE.MeshBasicMaterial({
        color: COLOR.ring, side: THREE.DoubleSide, transparent: true, opacity: 0.07,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.y = layer * layerHeight;
      ring.userData.isRing = true;
      scene.add(ring);
    }
  }

  function clearHighlights() {
    chordLines.forEach(l => scene.remove(l));
    chordLines = [];
    spheres.forEach(s => {
      s.material.color.setHex(COLOR.idle);
      s.material.emissive.setHex(0x000000);
      s.material.emissiveIntensity = 0;
      s.scale.set(1, 1, 1);
    });
  }

  // state: { mod, scalePositions: number[], chordPositions: number[], anchorNote: number|null }
  // scalePositions/chordPositions/anchorNote are raw absolute pitch numbers
  // (not pitch-classes) — chord tones in particular are placed at their
  // *actual* octave on the helix, exactly as produced by the transform
  // chain, rather than folded back to a single ring.
  function render(state) {
    if (!ready) return;
    const { scalePositions, chordPositions, anchorNote } = state;
    const newMod = Math.max(1, state.mod || 12);

    if (newMod !== mod) {
      buildLattice(newMod);
      // Do not reset the camera here — the user's orbit angle and zoom are
      // preserved across mod changes, exactly like any other parameter change.
    }

    clearHighlights();

    const scaleSet = new Set(scalePositions.map(n => ((n % mod) + mod) % mod));
    const scaleRoot = scalePositions.length ? scalePositions[0] : null;
    const chordSet = new Set(chordPositions);
    const chordSpheresForLine = [];

    spheres.forEach(sphere => {
      const n = sphere.userData.number;
      let touched = false;

      if (scaleSet.has(((n % mod) + mod) % mod)) {
        sphere.material.color.setHex(COLOR.scale);
        sphere.material.emissive.setHex(COLOR.scale);
        sphere.material.emissiveIntensity = 0.28;
        touched = true;
      }
      if (scaleRoot !== null && n === scaleRoot) {
        sphere.material.color.setHex(COLOR.root);
        sphere.material.emissive.setHex(COLOR.root);
        sphere.material.emissiveIntensity = 0.55;
        sphere.scale.set(1.5, 1.5, 1.5);
        touched = true;
      }
      if (chordSet.has(n)) {
        sphere.material.color.setHex(COLOR.chord);
        sphere.material.emissive.setHex(COLOR.chord);
        sphere.material.emissiveIntensity = 0.5;
        sphere.scale.set(1.55, 1.55, 1.55);
        chordSpheresForLine.push(sphere);
        touched = true;
      }
      if (anchorNote !== null && n === anchorNote) {
        sphere.material.color.setHex(COLOR.anchor);
        sphere.material.emissive.setHex(COLOR.anchor);
        sphere.material.emissiveIntensity = 0.8;
        sphere.scale.set(1.6, 1.6, 1.6);
        touched = true;
      }
      if (!touched) {
        sphere.material.emissiveIntensity = 0;
      }
    });

    // Connect chord tones from lowest to highest number, then close the loop
    // only if the first and last dots sit on the same octave ring.
    if (chordSpheresForLine.length > 1) {
      chordSpheresForLine.sort((a, b) => a.userData.number - b.userData.number);
      const first = chordSpheresForLine[0];
      const last  = chordSpheresForLine[chordSpheresForLine.length - 1];
      // Octave is measured relative to the lowest note so the closing criterion
      // is unaffected by the octave slider shifting all notes by the same offset.
      const base = first.userData.number;
      const sameRing = Math.floor((last.userData.number - base) / mod) === 0;
      const count = sameRing ? chordSpheresForLine.length : chordSpheresForLine.length - 1;
      for (let i = 0; i < count; i++) {
        const next = (i + 1) % chordSpheresForLine.length;
        const geom = new THREE.BufferGeometry().setFromPoints([
          chordSpheresForLine[i].position, chordSpheresForLine[next].position,
        ]);
        const mat = new THREE.LineBasicMaterial({ color: COLOR.chord, transparent: true, opacity: 0.55 });
        const line = new THREE.Line(geom, mat);
        scene.add(line);
        chordLines.push(line);
      }
    }

    const caption = document.getElementById('helix-caption');
    if (caption) {
      const parts = [];
      parts.push(`<span class="val">${scalePositions.length}</span> scale tones`);
      if (chordPositions.length) parts.push(`<span class="val">${chordPositions.length}</span> chord tones`);
      parts.push(`mod <span class="val">${mod}</span>`);
      caption.innerHTML = parts.join(' · ');
    }
  }

  function setupControls() {
    let dragging = false;
    let prev = { x: 0, y: 0 };
    let pinchDist = 0;

    function markInteraction() { lastInteraction = performance.now(); }

    container.addEventListener('mousedown', e => {
      dragging = true; prev = { x: e.clientX, y: e.clientY }; markInteraction();
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      rotate(e.clientX - prev.x, e.clientY - prev.y);
      prev = { x: e.clientX, y: e.clientY }; markInteraction();
    });
    window.addEventListener('mouseup', () => { dragging = false; });

    container.addEventListener('wheel', e => {
      e.preventDefault();
      zoom(e.deltaY); markInteraction();
    }, { passive: false });

    container.addEventListener('touchstart', e => {
      e.preventDefault(); markInteraction();
      if (e.touches.length === 1) {
        dragging = true; prev = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      } else if (e.touches.length === 2) {
        dragging = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        pinchDist = Math.sqrt(dx * dx + dy * dy);
      }
    }, { passive: false });

    container.addEventListener('touchmove', e => {
      e.preventDefault(); markInteraction();
      if (e.touches.length === 1 && dragging) {
        rotate((e.touches[0].clientX - prev.x) * 1.4, (e.touches[0].clientY - prev.y) * 1.4);
        prev = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        zoom((pinchDist - dist) * 2);
        pinchDist = dist;
      }
    }, { passive: false });

    container.addEventListener('touchend', e => {
      e.preventDefault(); dragging = false; pinchDist = 0;
    }, { passive: false });
  }

  // Horizontal drag = yaw around world Y, composed onto the current
  // orientation (not replacing it) — this spins the view left/right the
  // same way regardless of how far it's already tilted.
  // Vertical drag = pitch around the camera's OWN current local-X axis,
  // also composed on, not a separate clamped angle. Composing rotations
  // this way has no pole: dragging straight up through what used to be
  // "top dead center" just keeps composing the same small pitch step,
  // carrying the view smoothly past vertical and out the other side
  // upside down, then back around again on the way back — exactly the
  // continuous motion a trackball gives you, with no flip/snap anywhere.
  function rotate(dx, dy) {
    const yaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), dx * 0.005);
    const localX = new THREE.Vector3(1, 0, 0).applyQuaternion(orbit.quaternion);
    const pitch = new THREE.Quaternion().setFromAxisAngle(localX, dy * 0.005);
    // Order matters: apply pitch first (in the frame before this drag),
    // then yaw, so a pure horizontal drag never picks up unwanted roll.
    orbit.quaternion = yaw.multiply(pitch).multiply(orbit.quaternion);
    orbit.quaternion.normalize(); // guards against float drift accumulating over many frames
    applyOrbit();
  }

  function zoom(delta) {
    const speed = isMobile ? 0.05 : 0.1;
    const minDistance = ringRadius * 0.6;
    const maxDistance = ringRadius * 12;
    orbit.distance = Math.max(minDistance, Math.min(maxDistance, orbit.distance + delta * speed * 0.01));
    applyOrbit();
  }

  function animate() {
    requestAnimationFrame(animate);
    // Gentle ambient orbit when idle — pauses for a few seconds after any
    // drag/zoom so it doesn't fight manual control, and when user paused it.
    if (!userPaused && autoRotate && performance.now() - lastInteraction > 2500) {
      const spin = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), -0.0009 * rotationSpeed);
      orbit.quaternion = spin.multiply(orbit.quaternion);
      applyOrbit();
    }
    if (renderer) renderer.render(scene, camera);
  }

  return { init, render, setPaused(v) { userPaused = v; }, setRotationSpeed(v) { rotationSpeed = v; } };
})();

function updateHelix(state) {
  Helix.render(state);
}

Helix.init();

// Helix animation controls
(function () {
  const playBtn = document.getElementById('helix-play-btn');
  const speedSlider = document.getElementById('helix-speed');
  let paused = false;

  playBtn.addEventListener('click', () => {
    paused = !paused;
    playBtn.textContent = paused ? '▶' : '⏸';
    playBtn.title = paused ? 'Resume rotation' : 'Pause rotation';
    Helix.setPaused(paused);
  });

  speedSlider.addEventListener('input', () => {
    Helix.setRotationSpeed(parseFloat(speedSlider.value));
  });
})();

// ============================================================
// Shared helpers
// ============================================================
function parseSteps(str) {
  return str.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !Number.isNaN(n));
}

// Parse a scale definition which may be:
//   "pos:0,2,4,5,7,9,11"  → positions, convert to intervals for the given mod
//   "2,2,1,2,2,2,1"       → already intervals (legacy / custom)
// Returns an array of interval steps.
function parseScaleValue(val, mod) {
  if (val.startsWith('pos:')) {
    const positions = val.slice(4).split(',').map(s => parseInt(s.trim(), 10)).filter(n => !Number.isNaN(n));
    return positionsToIntervalSteps(positions, mod);
  }
  return parseSteps(val);
}

// Convert 0-based positions defined in chromatic-12 space to interval steps
// in `mod`-edo, by mapping each position to its nearest step via ratio.
//
// Each position p in 12-edo maps to round(p * mod / 12) in the target tuning,
// the step that best approximates the same point in the octave.
// Consecutive positions that round to the same step are deduplicated.
//
// e.g. [0,2,4,5,7,9,11] mod 12 -> [2,2,1,2,2,2,1]
// e.g. [0,2,4,5,7,9,11] mod 24 -> [0,4,8,10,14,18,22] -> [4,4,2,4,4,4,2]
// e.g. [0,2,4,5,7,9,11] mod 31 -> [0,5,10,13,18,23,28] -> [5,5,3,5,5,5,3]
// e.g. [0,2,4,5,7,9,11] mod 53 -> [0,9,17,22,31,40,48] -> [9,8,5,9,9,8,5]
// e.g. [0,2,4,7,9]       mod 31 -> [0,5,10,18,23]       -> [5,5,8,5,8]
function positionsToIntervalSteps(positions, mod) {
  if (positions.length === 0) return [];
  if (positions.length === 1) return [mod];
  // Map each 12-edo position to the nearest step in the target mod
  const mapped = positions.map(p => Math.round(p * mod / 12));
  // Deduplicate consecutive identical steps (keep first of any clash)
  const unique = [mapped[0]];
  for (let i = 1; i < mapped.length; i++) {
    if (mapped[i] !== unique[unique.length - 1]) unique.push(mapped[i]);
  }
  // Derive intervals; last interval wraps back to mod
  const steps = [];
  for (let i = 0; i < unique.length; i++) {
    const curr = unique[i];
    const next = i < unique.length - 1 ? unique[i + 1] : mod + unique[0];
    steps.push(next - curr);
  }
  return steps;
}

// Convert positions that are already in native mod space (e.g. from the
// generator) directly to interval steps, with no 12-edo remapping.
// Consecutive duplicates are deduplicated; the last interval wraps to mod.
function nativePositionsToIntervalSteps(positions, mod) {
  if (positions.length === 0) return [];
  if (positions.length === 1) return [mod];
  const unique = [positions[0]];
  for (let i = 1; i < positions.length; i++) {
    if (positions[i] !== unique[unique.length - 1]) unique.push(positions[i]);
  }
  const steps = [];
  for (let i = 0; i < unique.length; i++) {
    const curr = unique[i];
    const next = i < unique.length - 1 ? unique[i + 1] : mod + unique[0];
    steps.push(next - curr);
  }
  return steps;
}

// Given interval steps defined for baseMod, rescale them to newMod via LCM.
// e.g. steps=[2,2,1,2,2,2,1] baseMod=12 newMod=24 → [4,4,2,4,4,4,2]
function rescaleStepsToMod(steps, baseMod, newMod) {
  if (baseMod === newMod || baseMod === 0) return steps;
  const l = lcm([baseMod, newMod]);
  const factor = l / baseMod;
  return steps.map(s => s * factor);
}

// ============================================================
// Position-array operations (work on plain number arrays)
// ============================================================

// Reflect each pitch around axis: 2*axis - v, then sort ascending
function opInvert(arr, ax = 0) {
  return arr.map(v => 2 * ax - v).sort((a, b) => a - b);
}

// Mirror: reflect then shift so the lowest pitch stays the same
function opMirror(arr, ax = 0) {
  if (!arr.length) return [];
  const sorted = [...arr].sort((a, b) => a - b);
  const firstVal = sorted[0];
  const inverted = opInvert(sorted, ax);
  const diff = firstVal - inverted[0];
  return inverted.map(v => v + diff);
}

// Find the best equal-temperament fifth generator for a given modulus:
// the integer g COPRIME to modulo that is closest to modulo * log2(num/den).
// Coprimality is required here because this value is used as a cyclic
// generator — iterating it must visit every step before wrapping.
// NOTE: do NOT use this for negative harmony; see bestFifthStep below.
function fifthGenerator(modulo, num = 3, den = 2) {
  const ideal = modulo * Math.log2(num / den);
  let best = 1, bestDist = 1e18;
  for (let g = 1; g < modulo; ++g) {
    if (gcd(g, modulo) !== 1) continue;
    const d = Math.abs(g - ideal);
    if (d < bestDist) { bestDist = d; best = g; }
  }
  return best;
}

// Best integer approximation of a perfect fifth (3:2) in a given EDO,
// WITHOUT the coprimality constraint.  Coprimality is only needed when
// the fifth is used as a cyclic scale generator; for negative harmony we
// simply need the closest step to the 3:2 frequency ratio.
//
// Example of why the distinction matters:
//   mod 24 — ideal fifth = 14.04 steps
//   gcd(14, 24) = 2, so fifthGenerator rejects 14 and returns 13 instead.
//   Using 13 shifts the reflection axis by a quartertone, producing pitches
//   between the EDO steps.  bestFifthStep correctly returns 14, which makes
//   mod-24 negative harmony identical to mod-12 (just doubled positions).
function bestFifthStep(modulo, num = 3, den = 2) {
  return Math.round(modulo * Math.log2(num / den));
}

function pmod(x, m) { return ((x % m) + m) % m; }

// Reflect a single pitch through axis in pitch-class space (mod modulo),
// preserving octave offset
function negativeHarmonyPitch(pitch, axis, modulo) {
  const pc = pmod(pitch, modulo);
  const reflectedPc = pmod(axis - pc, modulo);
  const octaveBase = pitch - pc;
  return octaveBase + reflectedPc;
}

// Negative harmony: reflect all pitches through the root+fifth axis in mod
// space, sort ascending.  axis = root*2 + fifth (mod modulo), where "fifth"
// is the best integer approximation of the 3:2 ratio in this EDO.
// The reflection pmod(axis - pc, mod) is equivalent to mirroring around
// the midpoint axis/2 — i.e. halfway between the root and its fifth.
//
// Uses bestFifthStep (not fifthGenerator) so the fifth is the nearest EDO
// step to 3:2, regardless of whether it shares a factor with the modulus.
function negativeHarmonyAxis(root, modulo) {
  return pmod(root * 2 + bestFifthStep(modulo), modulo);
}

function opNegative(arr, root, modulo) {
  if (!arr.length) return [];
  const axis = negativeHarmonyAxis(root, modulo);
  return arr.map(p => negativeHarmonyPitch(p, axis, modulo)).sort((a, b) => a - b);
}

function fmtList(arr) {
  return `[${arr.join(', ')}]`;
}

// ============================================================
// TRANSFORM CHAIN — generic draggable, reorderable, toggleable
// step list. Shared between Scale Lab and Chord Builder so both
// get the same drag-to-reorder UX (ported from the harmonic-eq
// transform chain).
//
// A "chain" is described by an array of step specs:
//   { op, name, hint, fields: [{id, type, value, ...}], onChange }
// initTransformChain() renders them into a #<prefix>chain-wrap container,
// wires toggle/drag/input events, and calls onUpdate() (passing the
// live enabled-ops-in-order list) whenever anything changes.
// ============================================================
function buildChainStepHTML(prefix, step) {
  const on = !!step.defaultOn;
  const fieldsHTML = (step.fields || []).map(f => {
    if (f.type === 'checkbox') {
      return `<label class="inline-check">
        <input type="checkbox" id="${prefix}${f.id}" ${f.checked ? 'checked' : ''}>${f.label}
      </label>`;
    }
    return `<input type="number" id="${prefix}${f.id}" value="${f.value}" ${f.step !== undefined ? `step="${f.step}"` : ''} title="${f.title || ''}">`;
  }).join('\n      ');
  return `
    <div class="chain-step ${on ? 'on' : 'off'}" id="${prefix}card-${step.op}" data-op="${step.op}">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <button class="op-toggle ${on ? 'on' : 'off'}" data-op="${step.op}" title="Toggle on/off">${on ? 'on' : 'off'}</button>
      <span class="step-name" title="${step.hint || ''}">${step.name}</span>
      ${fieldsHTML}
    </div>`;
}

// steps: array of step specs (see above). stepOrderRef: a mutable array
// (e.g. a property on a state object) holding op names in current order —
// initTransformChain reorders it in place when the user drags. onUpdate is
// called after any toggle/drag/field change.
function initTransformChain(prefix, wrapId, steps, stepOrderRef, onUpdate) {
  const wrap = document.getElementById(wrapId);
  wrap.innerHTML = steps.map(s => buildChainStepHTML(prefix, s)).join('');

  const enabled = {};
  steps.forEach(s => { enabled[s.op] = !!s.defaultOn; });

  wrap.querySelectorAll('.op-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const op = btn.dataset.op;
      enabled[op] = !enabled[op];
      const card = btn.closest('.chain-step');
      btn.textContent = enabled[op] ? 'on' : 'off';
      btn.className = 'op-toggle ' + (enabled[op] ? 'on' : 'off');
      card.className = 'chain-step ' + (enabled[op] ? 'on' : 'off');
      onUpdate();
    });
  });

  steps.forEach(s => {
    (s.fields || []).forEach(f => {
      const el = document.getElementById(prefix + f.id);
      if (!el) return;
      el.addEventListener(f.type === 'checkbox' ? 'change' : 'input', onUpdate);
    });
  });

  // Drag reorder (pointer-based, mirrors the harmonic-eq chain UI)
  let dragSrc = null, dragOver = null;
  wrap.querySelectorAll('.chain-step').forEach(step => {
    const h = step.querySelector('.drag-handle');
    if (!h) return;
    h.addEventListener('pointerdown', e => {
      e.preventDefault();
      h.setPointerCapture(e.pointerId);
      dragSrc = step;
      step.classList.add('is-dragging');
    });
    h.addEventListener('pointermove', e => {
      if (!dragSrc) return;
      e.preventDefault();
      wrap.querySelectorAll('.chain-step').forEach(s => s.classList.remove('drag-over'));
      const others = [...wrap.querySelectorAll('.chain-step:not(.is-dragging)')];
      dragOver = null;
      if (others.length) {
        const firstR = others[0].getBoundingClientRect();
        const lastR = others[others.length - 1].getBoundingClientRect();
        if (e.clientY <= firstR.bottom) dragOver = others[0];
        else if (e.clientY >= lastR.top) dragOver = others[others.length - 1];
        else dragOver = others.find(s => {
          const r = s.getBoundingClientRect();
          return e.clientY >= r.top && e.clientY <= r.bottom;
        }) || null;
      }
      if (dragOver) dragOver.classList.add('drag-over');
    });
    function commitDrop() {
      if (dragSrc && dragOver && dragSrc !== dragOver) {
        const si = stepOrderRef.indexOf(dragSrc.dataset.op);
        const ti = stepOrderRef.indexOf(dragOver.dataset.op);
        if (si !== -1 && ti !== -1) {
          stepOrderRef.splice(si, 1);
          stepOrderRef.splice(ti, 0, dragSrc.dataset.op);
          for (const op of stepOrderRef) {
            const el = document.getElementById(prefix + 'card-' + op);
            if (el) wrap.appendChild(el);
          }
          onUpdate();
        }
      }
      if (dragSrc) dragSrc.classList.remove('is-dragging');
      wrap.querySelectorAll('.chain-step').forEach(s => s.classList.remove('drag-over'));
      dragSrc = null; dragOver = null;
    }
    h.addEventListener('pointerup', commitDrop);
    h.addEventListener('pointercancel', commitDrop);
  });

  return enabled; // live map of op -> boolean, mutated by the toggle buttons
}

    });
    const body = document.createElement('div');
    body.className = 'scale-folder-body';

function initScaleSearch() {
  const input = document.getElementById('scale-search');
  const container = document.getElementById('scale-folders');
  let preSearchOpenStates = null;
  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) {
      container.classList.remove('searching');
      document.querySelectorAll('.scale-folder').forEach(f => f.classList.remove('search-hidden'));
      document.querySelectorAll('.scale-pill').forEach(p => p.classList.remove('search-hidden', 'search-match'));
      if (preSearchOpenStates) {
        document.querySelectorAll('.scale-folder').forEach(f => {
          f.classList.toggle('open', !!preSearchOpenStates[f.dataset.gi]);
        });
        preSearchOpenStates = null;
      }
      return;
    }
    if (!preSearchOpenStates) {
      preSearchOpenStates = {};
      document.querySelectorAll('.scale-folder').forEach(f => {
        preSearchOpenStates[f.dataset.gi] = f.classList.contains('open');
      });
    }
    container.classList.add('searching');
    document.querySelectorAll('.scale-folder').forEach(folder => {
      const pills = folder.querySelectorAll('.scale-pill');
      let anyMatch = false;
      pills.forEach(pill => {
        const match = pill.dataset.name.toLowerCase().includes(q);
        pill.classList.toggle('search-hidden', !match);
        pill.classList.toggle('search-match', match);
        if (match) anyMatch = true;
      });
      folder.classList.toggle('search-hidden', !anyMatch);
    });
  });
}

// ============================================================
// SCALE ANALYSIS — JS ports of the C++ analysis functions
// ============================================================

/** Sequential differences of a plain array */
function differences(arr) {
  if (arr.length < 2) return [];
  const out = [];
  for (let i = 1; i < arr.length; i++) out.push(arr[i] - arr[i - 1]);
  return out;
}

/** Geodesic (wrap-around) distance between a and b */
function geodesicDistance(a, b, mod) {
  let d = ((b - a) % mod + mod) % mod;
  if (d > mod / 2) d = mod - d;
  return d;
}

/** All pairwise geodesic distances */
function geodesicDistances(posData, mod) {
  const out = [];
  for (let i = 0; i < posData.length; i++)
    for (let j = i + 1; j < posData.length; j++)
      out.push(geodesicDistance(posData[i], posData[j], mod));
  return out;
}

/** Map value → count */
function calculateOccurrences(arr) {
  const map = {};
  for (const v of arr) map[v] = (map[v] || 0) + 1;
  return map;
}

/** Winograd-deep: each distance 1..(k-1) appears with a unique count */
function isWinogradDeep(occurrences, k) {
  const seen = new Set();
  for (let i = 1; i < k; i++) {
    if (!(i in occurrences)) return false;
    if (seen.has(occurrences[i])) return false;
    seen.add(occurrences[i]);
  }
  return true;
}

/** Erdős-deep: every occurring distance has a unique count */
function isErdosDeep(occurrences) {
  const seen = new Set();
  for (const cnt of Object.values(occurrences)) {
    if (seen.has(cnt)) return false;
    seen.add(cnt);
  }
  return true;
}

/** Euclidean / Björklund string check via interval rotation */
function isEuclidean(posData, mod) {
  if (posData.length === 0) return false;
  const pv = new PositionVector(posData, mod);
  const iv = positionsToIntervals(pv);
  const ivals = iv.getData();
  const n = ivals.length;
  if (n === 0) return false;
  const temp = [...ivals];
  const temp2 = [...ivals];
  temp[0]++;
  temp[n - 1]--;
  for (let i = 0; i < n; i++) {
    temp.push(temp.shift()); // rotate left
    if (temp.join(',') === temp2.join(',')) return true;
  }
  return false;
}

/** Regression evenness: sum of absolute deviations from ideal uniform positions */
function calculateRegressionEvenness(posData, mod) {
  const k = posData.length;
  const ideal = mod / k;
  let sum = 0;
  for (let i = 0; i < k; i++) sum += Math.abs(posData[i] - i * ideal);
  return sum;
}

/** Rhythmic oddity: count of antipodal pairs (exactly mod/2 apart) */
function calculateRhythmicOddity(posData, mod) {
  let count = 0;
  for (let i = 0; i < posData.length; i++)
    for (let j = i + 1; j < posData.length; j++) {
      const d = ((posData[j] - posData[i]) % mod + mod) % mod;
      if (d === mod - d) count++;
    }
  return count;
}

/** Transition complexity: 0/1 flip count in the binary pitch-class string */
function computeTransitionComplexity(posData, mod) {
  const bin = new Array(mod).fill(0);
  for (const p of posData) bin[((p % mod) + mod) % mod] = 1;
  let c = 0;
  for (let i = 1; i < mod; i++) if (bin[i] !== bin[i - 1]) c++;
  return c;
}

/** Shannon entropy of the binary pitch-class vector (bits) */
function computeEntropy(posData, mod) {
  const bin = new Array(mod).fill(0);
  for (const p of posData) bin[((p % mod) + mod) % mod] = 1;
  // count frequencies of 0 and 1
  const freq = {};
  for (const b of bin) freq[b] = (freq[b] || 0) + 1;
  let entropy = 0;
  for (const cnt of Object.values(freq)) {
    const p = cnt / mod;
    entropy -= p * Math.log2(p);
  }
  return entropy;
}

/** Longest run of identical bits in the binary pitch-class vector */
function computeLongestSubsequence(posData, mod) {
  const bin = new Array(mod).fill(0);
  for (const p of posData) bin[((p % mod) + mod) % mod] = 1;
  let longest = 1, cur = 1;
  for (let i = 1; i < mod; i++) {
    if (bin[i] === bin[i - 1]) { cur++; if (cur > longest) longest = cur; }
    else cur = 1;
  }
  return longest;
}

/** Distribution spectra: for each generic interval j, the set of specific intervals */
function calculateDistributionSpectra(posData, mod) {
  const n = posData.length;
  const spectra = Array.from({ length: n - 1 }, () => new Set());
  for (let i = 0; i < n; i++)
    for (let j = 1; j < n; j++) {
      const specific = ((posData[(i + j) % n] - posData[i]) % mod + mod) % mod;
      spectra[j - 1].add(specific);
    }
  return spectra;
}

/** Width of each spectrum entry: max − min */
function calculateSpectrumWidths(spectra) {
  return spectra.map(s => {
    if (s.size === 0) return 0;
    const arr = [...s];
    return Math.max(...arr) - Math.min(...arr);
  });
}

/** Spectrum variation = mean width across all generic intervals */
function calculateSpectrumVariation(widths) {
  if (widths.length === 0) return 0;
  return widths.reduce((a, b) => a + b, 0) / widths.length;
}

/** Rotational symmetry: transpositions that map the scale onto itself */
function findRotationalSymmetryAxes(posData, mod) {
  const sorted = [...posData].sort((a, b) => a - b).map(v => ((v % mod) + mod) % mod).sort((a, b) => a - b);
  const key = sorted.join(',');
  const axes = [];
  for (let t = 1; t < mod; t++) {
    const trans = sorted.map(v => (v + t) % mod).sort((a, b) => a - b).join(',');
    if (trans === key) axes.push(t);
  }
  return axes;
}

/** Reflective symmetry: axes (including half-integer) where reflecting maps scale onto itself */
function findReflectiveSymmetryAxes(posData, mod) {
  const sorted = [...posData].map(v => ((v % mod) + mod) % mod).sort((a, b) => a - b);
  const sortedSet = new Set(sorted);
  const axes = [];
  for (let ad = 0; ad < 2 * mod; ad++) {
    const axis = ad / 2;
    let ok = true;
    for (const note of sorted) {
      const reflected = ((Math.round(2 * axis - note) % mod) + mod) % mod;
      if (!sortedSet.has(reflected)) { ok = false; break; }
    }
    if (ok) axes.push(axis);
  }
  return axes;
}

/** Palindrome = has a reflective axis at 0 */
function isPalindromeScale(posData, mod) {
  return findReflectiveSymmetryAxes(posData, mod).some(a => a === 0);
}

/** Chiral = mirror image cannot be superimposed by any transposition */
function isChiral(posData, mod) {
  const sorted = [...posData].map(v => ((v % mod) + mod) % mod).sort((a, b) => a - b);
  const key = sorted.join(',');
  const mirrored = sorted.map(v => (mod - v) % mod).sort((a, b) => a - b);
  if (mirrored.join(',') === key) return false;
  for (let t = 0; t < mod; t++) {
    const trans = mirrored.map(v => (v + t) % mod).sort((a, b) => a - b).join(',');
    if (trans === key) return false;
  }
  return true;
}

/** Balanced = centre of mass lies at the origin of the pitch-class circle */
function isBalanced(posData, mod) {
  let x = 0, y = 0;
  for (const p of posData) {
    const a = (((p % mod) + mod) % mod / mod) * 2 * Math.PI;
    x += Math.cos(a); y += Math.sin(a);
  }
  return Math.abs(x) < 1e-6 && Math.abs(y) < 1e-6;
}

/** Aksak classification based on modulus */
function isPrimeNum(n) {
  if (n < 2) return false;
  for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false;
  return true;
}
function classifyAksak(mod) {
  if (isPrimeNum(mod)) return 'Authentic aksak';
  if (mod % 2 !== 0) return 'Quasi-aksak';
  return 'Pseudo-aksak';
}

/** Generator: find m such that {i*m mod n | i=0..k-1} = scale, or null */
function findGenerator(posData, mod) {
  const sorted = [...posData].map(v => ((v % mod) + mod) % mod).sort((a, b) => a - b);
  const key = sorted.join(',');
  const k = sorted.length;
  for (let m = 1; m < mod; m++) {
    const gen = Array.from({ length: k }, (_, i) => (i * m) % mod).sort((a, b) => a - b).join(',');
    if (gen === key) return m;
  }
  return null;
}

// ---- render ----

function astat(label, valHTML, hint, full) {
  return `<div class="astat${full ? ' full' : ''}">
    <div class="astat-label">${label}</div>
    <div class="astat-val">${valHTML}</div>
    ${hint ? `<div class="astat-hint">${hint}</div>` : ''}
  </div>`;
}

function badge(label, on, title) {
  return `<span class="abadge ${on ? 'on' : 'off'}" title="${title || label}">${label}</span>`;
}

function updateScaleAnalysis(posData, mod) {
  const body = document.getElementById('analysis-body');
  if (!body) return;
  if (!posData || posData.length < 2) {
    body.innerHTML = `<div class="astat full"><div class="astat-label">Note</div><div class="astat-val dim">Need ≥ 2 positions for analysis.</div></div>`;
    return;
  }

  const k = posData.length;

  // Normalise to pitch classes for all calculations
  const pcs = posData.map(v => ((v % mod) + mod) % mod);

  // --- compute ---
  const distances  = geodesicDistances(pcs, mod);
  const occ        = calculateOccurrences(distances);
  const winDeep    = isWinogradDeep(occ, k);
  const erdDeep    = isErdosDeep(occ);
  const eucl       = isEuclidean(pcs, mod);
  const evenness   = calculateRegressionEvenness(posData, mod);
  const oddity     = calculateRhythmicOddity(pcs, mod);
  const entropy    = computeEntropy(pcs, mod);
  const txc        = computeTransitionComplexity(pcs, mod);
  const lseq       = computeLongestSubsequence(pcs, mod);
  const spectra    = calculateDistributionSpectra(pcs, mod);
  const widths     = calculateSpectrumWidths(spectra);
  const variation  = calculateSpectrumVariation(widths);
  const rotAxes    = findRotationalSymmetryAxes(pcs, mod);
  const refAxes    = findReflectiveSymmetryAxes(pcs, mod);
  const palindrome = isPalindromeScale(pcs, mod);
  const chiral     = isChiral(pcs, mod);
  const balanced   = isBalanced(pcs, mod);
  const aksak      = classifyAksak(mod);
  const gen        = findGenerator(pcs, mod);

  const fmtAxes = arr => arr.length
    ? arr.map(a => a % 1 ? a.toFixed(1) : String(a)).join(', ')
    : '—';

  // Geodesic distance pills
  const distPillsHTML = Object.entries(occ)
    .sort((a, b) => +a[0] - +b[0])
    .map(([d, c]) =>
      `<span class="adist-pill"><span class="dp-dist">${d}</span><span class="dp-x">×</span><span class="dp-cnt">${c}</span></span>`
    ).join('');

  // Spectra table
  // Myhill property: every generic interval has exactly 2 specific sizes (width 1).
  // Strictly proper: every generic interval has exactly 1 specific size (width 0).
  const spectraRows = spectra.map((s, i) => {
    const vals = [...s].sort((a, b) => a - b).join(', ');
    const w = widths[i];
    const mark = w === 0
      ? `<span class="st-myhill">strict</span>`
      : w === 1
        ? `<span class="st-myhill" style="color:var(--blue)">Myhill</span>`
        : '';
    return `<tr>
      <td>&lt;${i + 1}&gt;</td>
      <td><span class="st-set">{${vals}}</span><span class="st-w">w=${w}</span>${mark}</td>
    </tr>`;
  }).join('');

  const html = `
    <div class="asection">Properties</div>
    <div class="abadge-row">
      ${badge('Euclidean', eucl, 'Notes spread as evenly as possible')}
      ${badge('Winograd-deep', winDeep, 'Every distance appears a different number of times')}
      ${badge('Erdős-deep', erdDeep, 'No two distances appear equally often')}
      ${badge('Palindrome', palindrome, 'Reads the same forwards and backwards')}
      ${badge('Balanced', balanced, 'Pitch classes pull evenly in all directions')}
      ${badge('Chiral', chiral, 'Not the same as its own mirror image')}
    </div>

    <div class="asection">Distances</div>
    <div class="astat-grid">
      ${astat('Geodesic distances',
        `<div class="adist-row">${distPillsHTML || '<span class="astat-val dim">—</span>'}</div>`,
        'Pairwise distances between notes, as distance × count')}
      ${astat('Regression evenness', `${evenness.toFixed(3)}`,
        'How far from evenly spaced. 0 = maximally even.')}
      ${astat('Rhythmic oddity', `${oddity}`,
        'Note pairs directly opposite each other')}
    </div>

    <div class="asection">Binary string</div>
    <div class="astat-grid">
      ${astat('Shannon entropy',
        `${entropy.toFixed(4)} <span style="font-size:11px;color:var(--paper-dim)">bits</span>`,
        'Unpredictability of the note pattern')}
      ${astat('Transition complexity', `${txc}`,
        'Note/gap switches — lower means more clustering')}
      ${astat('Longest run', `${lseq}`,
        'Longest stretch of consecutive notes or gaps')}
    </div>

    <div class="asection">Symmetry</div>
    <div class="astat-grid">
      ${astat('Rotational axes',
        rotAxes.length ? rotAxes.join(', ') : '<span class="dim">—</span>',
        'Transpositions that map the scale onto itself')}
      ${astat('Reflective axes',
        `<span class="astat-val blue">${refAxes.length ? fmtAxes(refAxes) : '<span class="dim">—</span>'}</span>`,
        'Points of mirror symmetry')}
    </div>

    <div class="asection">Generation</div>
    <div class="astat-grid">
      ${astat('Generator',
        gen !== null
          ? `m = <span style="color:var(--amber)">${gen}</span>`
          : `<span class="dim">—</span>`,
        gen !== null
          ? `All notes are multiples of ${gen}`
          : 'No single step size produces this scale')}
      ${astat('Aksak (mod)',
        aksak,
        'Prime = true aksak, odd = quasi-aksak, even = pseudo-aksak')}
    </div>

    <div class="asection">Distribution spectra</div>
    <div class="astat-hint" style="margin-bottom:8px">
      Interval sizes spanning j scale steps. w=0: one size per interval. w=1: Myhill property.
    </div>
    <div class="astat full" style="padding-top:0">
      <div class="astat-label" style="margin-bottom:4px">

function updateScaleLab() {
  const mod = currentScaleMod();
  const steps = currentStepsForMod(mod);
  if (steps.length === 0) {
    scaleReadout.innerHTML = `<span class="label">no valid steps</span>`;
    updateHelix({ mod, scalePositions: [], chordPositions: [], anchorNote: null });
    return;
  }

  const scale = new Scale(new IntervalVector(steps, 0, mod), {});
  let posData = scale.toPositions().getData();

  // Run the draggable transform chain, in the user's chosen order.
  for (const op of scaleChainState.stepOrder) {
    if (!scaleChainEnabled[op]) continue;
    switch (op) {
      case 'mode': {
        const k = getNum('scale-tx-mode');
        const iv = positionsToIntervals(new PositionVector(posData, mod));
        posData = intervalsToPositions(iv.rotate(k)).getData();
        break;
      }
      case 'degree': {
        const d = getNum('scale-tx-degree');
        posData = new PositionVector(posData, mod).rotoTranslate(d).getData();
        break;
      }
      case 'root': {
        // Originally this was an unconditional intervals.setOffset(root) applied
        // first, before mode/invert/mirror. Now that Root is a draggable, toggleable
        // step like any other, a hard set would silently undo whatever offset
        // earlier steps in the chain produced — so this shifts by `r` instead of
        // replacing the offset outright, keeping the chain composable regardless
        // of where Root sits in the order.
        const r = getNum('scale-tx-root');
        const iv = positionsToIntervals(new PositionVector(posData, mod));
        iv.setOffset(iv.getOffset() + r);
        posData = intervalsToPositions(iv).getData();
        break;
      }
      case 'invert': {
        const ax = getNum('scale-tx-axis');
        const iv = positionsToIntervals(new PositionVector(posData, mod));
        posData = intervalsToPositions(iv.inversion(ax)).getData();
        break;
      }
      case 'opmirror': {
        posData = opMirror(posData, 0);
        break;
      }
      case 'negative': {
        const root = getNum('scale-tx-root');
        posData = opNegative(posData, root, mod);
        break;
      }
    }
  }

  const positions = new PositionVector(posData, mod);
  const intervals = positionsToIntervals(positions);

  lastScalePositions = posData;
  _lastScaleMod = mod;

  // Analysis uses a version of the scale that ignores root, degree, and invert
  // transforms — those just transpose or rotate without changing interval content.
  // Mode, mirror, and negative do change the interval structure, so they're kept.
  let analysisPosData = scale.toPositions().getData();
  for (const op of scaleChainState.stepOrder) {
    if (!scaleChainEnabled[op]) continue;
    switch (op) {
      case 'mode': {
        const k = getNum('scale-tx-mode');
        const iv = positionsToIntervals(new PositionVector(analysisPosData, mod));
        analysisPosData = intervalsToPositions(iv.rotate(k)).getData();
        break;
      }
      case 'opmirror': {
        analysisPosData = opMirror(analysisPosData, 0);
        break;
      }
      case 'negative': {
        const root = getNum('scale-tx-root');
        analysisPosData = opNegative(analysisPosData, root, mod);
        break;
      }
      // root, degree, invert intentionally omitted
    }
  }
  // Normalise: shift so the lowest pitch class is 0
  const minPc = Math.min(...analysisPosData.map(v => ((v % mod) + mod) % mod));
  analysisPosData = analysisPosData.map(v => (((v % mod) + mod) % mod - minPc + mod) % mod).sort((a, b) => a - b);

  updateScaleAnalysis(analysisPosData, mod);

  const negAxisNote = scaleChainEnabled.negative
    ? ` · axis ${negativeHarmonyAxis(getNum('scale-tx-root'), mod)}`
    : '';

  scaleReadout.innerHTML = `
    <span class="label">intervals</span> <span class="val blue">${fmtList(intervals.getData())}</span> <span style="color:var(--paper-dim)">offset ${intervals.getOffset()}</span><br>
    <span class="label">positions</span> <span class="val">${fmtList(posData)}</span><span style="color:var(--paper-dim)">${negAxisNote}</span>
  `;

  // Keyboard visualizer: rebuild if mod, root pitch-class (label position
  // only — window itself is always C-anchored), OR chord-octave slider
  // changed. Otherwise just repaint colors (cheap, called on every nudge).
  const _kbvizRootPc = (mod === 12) ? kbvizRootPitchClass() : null;
  const _kbvizOctaveSliderVal = document.getElementById('chord-octave') ? parseInt(document.getElementById('chord-octave').value, 10) : 5;
  if (mod !== _kbvizLastMod || _kbvizRootPc !== _kbvizLastRootPc || _kbvizOctaveSliderVal !== _kbvizLastOctaveSlider) {
    _kbvizLastMod = mod;
    _kbvizLastRootPc = _kbvizRootPc;
    _kbvizLastOctaveSlider = _kbvizOctaveSliderVal;
    buildKeyboardViz();
  } else {
    refreshKeyboardViz();
  }

  // Degree slider range: spans 3 octaves of degrees relative to the
  // current scale length N — one octave below 0 and two above, i.e.
  // min=-N, max=2N. Recomputed any time the scale length changes; the
  // slider's current value is clamped into the new range if needed
  // (dispatching input so anything listening stays in sync).
  syncChordShiftRange();

  // Cascade: rebuild degree chips if scale size changed, then update chord builder
  if (typeof buildDegreeChips === 'function' && chordChainEnabled !== null) {
    buildDegreeChips();
    updateChordBuilder(); // this also drives updateHelix() with the chord in view
  } else {
    // Chord builder not initialized yet (first paint) — show scale alone.
    updateHelix({ mod, scalePositions: posData, chordPositions: [], anchorNote: null });
  }
}

// Keeps the chord-shift slider's min/max at [-N, 2N] where N is the
// current scale length. Called whenever the scale changes. If the
// slider's current value falls outside the new range, it's clamped
// and an input event is dispatched so dependents (the chord builder,
// the readout span) recompute against the corrected value.
let _chordShiftLastN = null;
function syncChordShiftRange() {
  const slider = document.getElementById('chord-shift');
  if (!slider) return;
  const n = Math.max(0, lastScalePositions.length);
  if (n === _chordShiftLastN) return; // no change since last sync
  _chordShiftLastN = n;
  const newMin = -n;
  const newMax = 2 * n;
  slider.min = String(newMin);
  slider.max = String(newMax);
  const current = parseInt(slider.value, 10) || 0;
  const clamped = Math.max(newMin, Math.min(newMax, current));
  if (clamped !== current) {
    slider.value = clamped;
    slider.dispatchEvent(new Event('input', { bubbles: true }));
  }
}


function getNum(id) {
  const el = document.getElementById(id);
  return el ? (parseInt(el.value, 10) || 0) : 0;

// ============================================================
// SCALE GENERATORS — JS ports of Euclidean, Clough-Douthett, Deep
// ============================================================

/** Euclidean: returns interval array */
function genEuclidean(steps, events) {
  if (events <= 0 || steps <= 0) return [];
  function eucl(n, k) {
    if (k === 0) return [];
    const { quotient, remainder } = euclideanDivision(n, k);
    if (remainder === 0) {
      const out = [];
      for (let i = 0; i < k; i++) out.push(quotient);
      return out;
    }
    const sub = eucl(k, remainder);
    const out = [];
    for (let i = 0; i < remainder; i++) {
      for (let j = 0; j < sub[i] - 1; j++) out.push(quotient);
      out.push(quotient + 1);
    }
    return out;
  }
  return eucl(steps, events);
}

/** Convert Euclidean intervals + offset → position array (mod steps) */
function euclideanToPositions(steps, events, offset) {
  const ivals = genEuclidean(steps, events);
  if (ivals.length === 0) return [];
  const positions = [];
  let pos = ((offset % steps) + steps) % steps;
  for (const iv of ivals) {
    positions.push(pos);
    pos = (pos + iv) % steps;
  }
  return positions;
}

/** Clough-Douthett: returns sorted position array */
function genCloughDouthett(steps, events, offset) {
  if (events <= 0 || steps <= 0) return [];
  const positions = [];
  for (let i = 0; i < events; i++) {
    positions.push((Math.floor(i * steps / events) + offset) % steps);
  }
  positions.sort((a, b) => a - b);
  return positions;
}

/** Deep Rhythm: returns sorted, deduplicated position array */
function genDeepRhythm(steps, events, multiplicity, offset) {
  if (events <= 0 || steps <= 0) return [];
  const raw = [];
  for (let i = 0; i < events; i++) {
    raw.push(((i * multiplicity) + offset) % steps);
  }
  // Deduplicate and sort (as noted in the C++ docs)
  const unique = [...new Set(raw)];
  unique.sort((a, b) => a - b);
  return unique;
}

{

const degreeChips = document.getElementById('degree-chips'); // kept for compat, hidden
const criterionTypePosition = document.getElementById('criterion-type-position'); // now a button
const criterionTypeInterval = document.getElementById('criterion-type-interval'); // now a button
const criterionPositionMode = document.getElementById('criterion-position-mode'); // hidden stub
const criterionIntervalMode = document.getElementById('criterion-interval-mode'); // hidden stub
const criterionIntervalSteps = document.getElementById('criterion-interval-steps');
const criterionPositionInput = document.getElementById('criterion-position-input');
const chordShift = document.getElementById('chord-shift');
const chordShiftVal = document.getElementById('chord-shift-val');
const chordRotation = document.getElementById('chord-rotation');
const chordPrevoices = document.getElementById('chord-prevoices');
const chordReadout = document.getElementById('chord-readout');
const chordOctave = document.getElementById('chord-octave');
const chordOctaveVal = document.getElementById('chord-octave-val');

let _criterionMode = 'position'; // 'position' or 'interval'
let selectedDegrees = new Set([0, 2, 4]); // kept for compat; actually read from criterionPositionInput

const chordChainState = {
  stepOrder: ['degree', 'root', 'mode', 'invert', 'opmirror', 'negative'],
};

const CHORD_CHAIN_STEPS = [
  { op: 'degree', name: 'Position', defaultOn: true,
    hint: 'Changes which chord tone sits at the bottom (voicing)',
    fields: [{ id: 'tx-degree', value: 0, step: 1, title: 'Chord tone to start from' }] },
  { op: 'root', name: 'Offset',
    hint: 'Transposes the chord',
    fields: [{ id: 'tx-root', value: 0, step: 1, title: 'Semitones to transpose' }] },
  { op: 'mode', name: 'Mode',
    hint: 'Rotates the chord\'s voicing intervals',
    fields: [{ id: 'tx-mode', value: 0, step: 1, title: 'Rotation amount' }] },
  { op: 'invert', name: 'Invert',
    hint: 'Classic chord inversion around an axis',
    fields: [{ id: 'tx-axis', value: 0, step: 1, title: 'Axis to reflect around' }] },
  { op: 'opmirror', name: 'Mirror',
    hint: 'Reflects the chord, keeping the lowest note fixed' },
  { op: 'negative', name: 'Negative',
    hint: 'Negative harmony applied to the chord',
    fields: [] },
];

function criterionType() {
  return _criterionMode;
}

function syncCriterionModeVisibility() {
  const isInterval = _criterionMode === 'interval';
  criterionPositionInput.style.display = isInterval ? 'none' : '';
  criterionIntervalSteps.style.display = isInterval ? '' : 'none';
  // Update toggle button states
  criterionTypePosition.classList.toggle('active', !isInterval);
  criterionTypeInterval.classList.toggle('active', isInterval);
}

function buildDegreeChips() {
  // No-op: chips replaced by text input. selectedDegrees is now read from criterionPositionInput.
}

function parseDegrees(str) {
  return str.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !Number.isNaN(n) && n >= 0);
}

// foldDegree: mirrors a degree back through 0 using modular fold
function foldDegree(degree, modulo) {
  const r = degree % modulo;
  return degree - 2 * r;
}

function updateChordBuilder() {
  if (!chordChainEnabled) return;
  // Use the scale lab's live output directly — same modulus, same positions.
  const mod = currentScaleMod();
  const scalePositions = new PositionVector(lastScalePositions, mod);
  const scaleSize = lastScalePositions.length;
  if (scaleSize === 0) {
    lastChordResultHeard = [];
    updateHelix({ mod, scalePositions: [], chordPositions: [], anchorNote: null });
    refreshKeyboardViz();
    return;
  }

  let criterion;
  let criterionLabel;

  let anchorDegree = 0; // 0-indexed scale degree that anchors/defines the chord (criterion root)

  if (criterionType() === 'position') {
    const degrees = parseDegrees(criterionPositionInput.value).sort((a, b) => a - b);
    if (degrees.length === 0) {
      chordReadout.innerHTML = `<span class="label">enter at least one degree</span>`;
      lastChordResultHeard = [];
      updateHelix({ mod, scalePositions: lastScalePositions, chordPositions: [], anchorNote: null });
      refreshKeyboardViz();
      return;
    }
    criterion = new PositionVector(degrees, scaleSize);
    criterionLabel = `degrees ${fmtList(degrees)}`;
    anchorDegree = degrees[0] + (parseInt(chordShift.value, 10) || 0);
  } else {
    const intervalSteps = parseSteps(criterionIntervalSteps.value);
    if (intervalSteps.length === 0) {
      chordReadout.innerHTML = `<span class="label">enter at least one step</span>`;
      lastChordResultHeard = [];
      updateHelix({ mod, scalePositions: lastScalePositions, chordPositions: [], anchorNote: null });
      refreshKeyboardViz();
      return;
    }
    criterion = new IntervalVector(intervalSteps, 0, scaleSize);
    criterionLabel = `steps ${fmtList(intervalSteps)} from degree ${parseInt(chordShift.value, 10) || 0}`;
    anchorDegree = parseInt(chordShift.value, 10) || 0;
  }

  const params = {
    shift: parseInt(chordShift.value, 10) || 0,
    rotationOrRototrans: parseInt(chordRotation.value, 10) || 0,
    preVoices: parseInt(chordPrevoices.value, 10) || 0,
    position: 0,   // position handled in the chain now
    invert: false,
    axis: 0,
    negativeOrMirror: false,
    negativeOrMirrorPos: 0,
  };

  // If negative is enabled in the chain, apply it pre-selection:
  //   1. opNegative on the scale positions
  //   2. foldDegree on the shift param (the "shift degrees by" offset)
  //   Then select from the negated scale using the same criterion degrees but folded shift.
  let effectiveScalePositions = scalePositions;
  let effectiveParams = params;

  if (chordChainEnabled.negative) {
    const negRoot = getNum('scale-tx-root');

    // 1. Negate the scale
    const negatedScaleArr = opNegative(lastScalePositions, negRoot, mod);
    effectiveScalePositions = new PositionVector(negatedScaleArr, mod);

    // 2. Fold the shift
    const foldedShift = foldDegree(params.shift, scaleSize);
    effectiveParams = { ...params, shift: foldedShift };
  }

  let result;
  try {
    const c = new Chord(effectiveScalePositions, criterion, effectiveParams);
    result = c.toPositions().getData();
  } catch (e) {
    chordReadout.innerHTML = `<span class="label" style="color:var(--red)">error: ${e.message}</span>`;
    return;
  }

  // Run the draggable post-transform chain (excluding 'negative' which was pre-applied above).
  for (const op of chordChainState.stepOrder) {
    if (!chordChainEnabled[op]) continue;
    switch (op) {
      case 'mode': {
        const k = getNum('chord-tx-mode');
        const iv = positionsToIntervals(new PositionVector(result, mod));
        result = intervalsToPositions(iv.rotate(k)).getData();
        break;
      }
      case 'degree': {
        const d = getNum('chord-tx-degree');
        result = new PositionVector(result, mod).rotoTranslate(d).getData();
        break;
      }
      case 'root': {
        const r = getNum('chord-tx-root');
        const iv = positionsToIntervals(new PositionVector(result, mod));
        iv.setOffset(iv.getOffset() + r);
        result = intervalsToPositions(iv).getData();
        break;
      }
      case 'invert': {
        const ax = getNum('chord-tx-axis');
        result = new PositionVector(result, mod).inversion(ax, true).getData();
        break;
      }
      case 'opmirror': {
        result = opMirror(result, 0);
        break;
      }
      case 'negative': {
        // Already applied pre-selection above; skip here.
        break;
      }
    }
  }

  lastChordResult = result;

  const negAxisNote = chordChainEnabled.negative
    ? ` · neg axis ${negativeHarmonyAxis(getNum('scale-tx-root'), mod)}`
    : '';

  chordReadout.innerHTML = `
    <span class="label">criterion</span> <span class="val blue">${criterionLabel}</span><br>
    <span class="label">chord</span> <span class="val">${fmtList(result)}</span><span style="color:var(--paper-dim)">${negAxisNote}</span>
  `;

  // When negative harmony is active, the helix should reflect the transformed state:
  //   - scale dots show the negated scale (effectiveScalePositions)
  //   - anchor is looked up on the negated scale at the folded degree
  // Without negative, everything uses the original scale as before.
  const helixScalePositions = chordChainEnabled.negative
    ? effectiveScalePositions.getData()
    : lastScalePositions;

  // anchorDegree may be negative or exceed scaleSize-1 (shift can push it out of range);
  // PositionVector.element() handles arbitrary indices by cycling through ranges,
  // which is exactly the scale-extension behaviour we want for an "anchor note".
  // When negative is active, the anchor degree must mirror the shift the same way
  // the chord selection does: fold just the shift component, then re-add degrees[0]
  // (for position criterion) or use foldedShift alone (for interval criterion).
  // foldDegree is only applied to the shift, not to the full anchorDegree, because
  // degrees[0] is a selector index that doesn't change under negation.
  const effectiveAnchorDegree = chordChainEnabled.negative
    ? foldDegree(params.shift, scaleSize) + (criterionType() === 'position'
        ? (parseDegrees(criterionPositionInput.value).sort((a, b) => a - b)[0] ?? 0)
        : 0)
    : anchorDegree;
  const anchorNote = ((new PositionVector(helixScalePositions, mod).element(effectiveAnchorDegree)) % mod + mod) % mod;

  // Octave is a purely perceptual offset — never folded back into the math result.
  // Chord tones are shifted for audio and helix placement.
  // Root and anchor stay at their natural (octave-0) positions so they always
  // appear on the bottom ring — showing the abstract pitch-class, not a register choice.
  const octSemis = chordOctaveSemis();
  lastChordResultHeard = transposeByOctave(result, mod, octSemis);

  updateHelix({ mod, scalePositions: helixScalePositions, chordPositions: lastChordResultHeard, anchorNote });
  refreshKeyboardViz();
}

// Octave control: maps the slider integer to a step offset.
// One octave = mod steps, so octave +1 always doubles frequency regardless of edo.
function chordOctaveSemis() {
  const octaves = parseInt(chordOctave.value, 10) || 0;
  const mod = currentScaleMod();
  return Math.round(octaves * mod);
}

function transposeByOctave(arr, mod, semis) {
  return arr.map(n => n + semis);
}

chordChainEnabled = initTransformChain('chord-', 'chord-chain-wrap', CHORD_CHAIN_STEPS, chordChainState.stepOrder, updateChordBuilder);

// MIDI access is requested automatically on load (no Enable button) —
// the browser's native permission prompt appears immediately.
InputEngine.enableMidi();
document.getElementById('midi-device-select').addEventListener('change', (e) => InputEngine.selectMidiInput(e.target.value));

// PC keyboard: on by default, toggled via the pill switch in the input card.
InputEngine.setupPcKeyboard();
const pckeysToggle = document.getElementById('pckeys-toggle');
const pckeysToggleLabel = document.getElementById('pckeys-toggle-label');
const pckeysToggleText = document.getElementById('pckeys-toggle-text');
pckeysToggle.addEventListener('change', () => {
  const on = pckeysToggle.checked;
  InputEngine.setPcKeyboardEnabled(on);
  pckeysToggleLabel.classList.toggle('on', on);
  pckeysToggleText.textContent = on ? 'On' : 'Off';
});

// Keyboard visualizer octave nav: +/- shift the visible 3-octave window
// by one octave at a time. View-only — does not move the scale root,
// transpose anything, or affect audio. The offset persists across scale
// edits (see kbvizOctaveOffset / buildKeyboardViz's header comment).
document.getElementById('kbviz-nav-down').addEventListener('click', () => {
  kbvizOctaveOffset -= 1;
  buildKeyboardViz();
});
document.getElementById('kbviz-nav-up').addEventListener('click', () => {
  kbvizOctaveOffset += 1;
  buildKeyboardViz();
});

// ============================================================
// TOOLTIP — JS-driven replacement for the CSS ::after approach.
//
// Why: CSS ::after / ::before pseudo-elements are not rendered on
// replaced / void elements like <input>, so all number spinners,
// range sliders, and text fields silently dropped their tooltips.
// Also, position:absolute tooltips are clipped inside .helix-card
// (overflow:hidden).  A position:fixed div appended to <body> fixes
// both problems.
//
// Usage: read from [title] attribute.  On first hover the title is
// moved to [data-tip] to suppress the browser's native tooltip box.
// ============================================================
(function () {
  // Create the shared tooltip element
  const tip = document.createElement('div');
  tip.style.cssText = [
    'position:fixed',
    'background:#0d0f13',
    'color:#f2efe9',
    'font-family:"IBM Plex Mono",monospace',
    'font-size:11px',
    'line-height:1.45',
    'padding:6px 9px',
    'border-radius:5px',
    'border:1px solid #2a2e37',
    'white-space:pre-wrap',
    'max-width:240px',
    'width:max-content',
    'pointer-events:none',
    'z-index:9999',
    'display:none',
    'box-shadow:0 2px 10px rgba(0,0,0,.55)',
  ].join(';');
  document.body.appendChild(tip);

  let curX = 0, curY = 0, activeEl = null, leaveCleanup = null;

  function positionTip(x, y) {
    const w = tip.offsetWidth, h = tip.offsetHeight;
    const margin = 8;
    const vw = window.innerWidth, vh = window.innerHeight;
    let left = x - w / 2;
    let top  = y - h - 14;          // default: above cursor
    if (top < margin) top = y + 18; // flip below if too close to top
    left = Math.max(margin, Math.min(left, vw - w - margin));
    top  = Math.max(margin, Math.min(top,  vh - h - margin));
    tip.style.left = left + 'px';
    tip.style.top  = top  + 'px';
  }

  function hideTip() {
    tip.style.display = 'none';
    activeEl = null;
  }

  // Track cursor globally so we can position the tooltip immediately on show
  document.addEventListener('mousemove', function (e) {
    curX = e.clientX; curY = e.clientY;
    if (tip.style.display !== 'none') positionTip(curX, curY);
  });

  // Show tooltip when entering any element that carries title / data-tip
  document.addEventListener('mouseover', function (e) {
    // Walk up from the hovered element to find the nearest titled ancestor
    let el = e.target;
    while (el && el !== document.body) {
      const text = el.getAttribute('data-tip') || el.getAttribute('title');
      if (text) {
        if (el === activeEl) return; // already showing for this element

        // Detach previous leave-handler if switching targets
        if (activeEl && leaveCleanup) {
          activeEl.removeEventListener('mouseleave', leaveCleanup);
          leaveCleanup = null;
        }

        // Move title → data-tip once so the native browser tooltip never fires
        if (el.hasAttribute('title')) {
          el.setAttribute('data-tip', el.getAttribute('title'));
          el.removeAttribute('title');
        }

        activeEl = el;
        tip.textContent = text;
        tip.style.display = 'block';
        positionTip(curX, curY);

        // Hide when the mouse leaves this element
        leaveCleanup = function () { hideTip(); leaveCleanup = null; };
        el.addEventListener('mouseleave', leaveCleanup, { once: true });
        return;
      }
      el = el.parentElement;
    }

    // Moved onto an element with no tooltip — hide
    if (activeEl && leaveCleanup) {
      activeEl.removeEventListener('mouseleave', leaveCleanup);
      leaveCleanup = null;
    }
    hideTip();
  });
})();

</script>
</body>
</html>
