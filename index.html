<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pitchweel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #15171c;
    --ink-raised: #1c1f26;
    --ink-line: #2a2e37;
    --paper: #f2efe9;
    --paper-dim: #9a9a93;
    --amber: #d98e48;
    --amber-dim: #6b4f2e;
    --blue: #5b8db8;
    --blue-dim: #2e3f4d;
    --chrome: #3a3f4b;
    --red: #b85b5b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 1080px;
    margin: 0 auto;
    padding: 20px 24px 40px;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .wordmark {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--paper);
  }
  .wordmark span { color: var(--amber); }

  .subtitle {
    font-size: 13px;
    color: var(--paper-dim);
    font-family: var(--mono);
  }

  /* ---------- Unified two-column layout ---------- */
  .unified-lab {
    display: grid;
    grid-template-columns: 1fr 2px 1fr;
    align-items: start;
    gap: 0;
  }
  .unified-col:first-child { padding-right: 22px; }
  .unified-col:last-child  { padding-left:  22px; }
  .unified-divider {
    background: var(--ink-line);
    align-self: stretch;
    min-height: 200px;
    width: 2px;
  }
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--ink-line);
  }
  @media (max-width: 900px) {
    .unified-lab { grid-template-columns: 1fr; }
    .unified-divider { display: none; }
    .unified-col:first-child { padding-right: 0; }
    .unified-col:last-child  { padding-left: 0; }
  }

  .card {
    background: var(--ink-raised);
    border: 1px solid var(--ink-line);
    border-radius: 10px;
    padding: 14px 18px;
  }
  .card + .card { margin-top: 12px; }

  .card h3 {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--paper-dim);
    margin: 0 0 12px 0;
    font-weight: 500;
  }

  /* ---------- Form controls ---------- */
  .field {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
    min-width: 0;
  }
  .field label {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--paper);
    flex-shrink: 0;
  }
  .field .hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--paper-dim);
    display: block;
    margin-top: 1px;
  }

  input[type="text"], input[type="number"], select {
    background: var(--ink);
    border: 1px solid var(--chrome);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 10px;
    border-radius: 6px;
    width: 140px;
    transition: border-color 0.15s ease;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    outline: none;
    border-color: var(--amber);
  }
  input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--amber);
  }

  input[type="range"] {
    flex: 1 1 0;
    min-width: 60px;
    max-width: 180px;
    accent-color: var(--amber);
  }

  .range-row { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .range-val {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--amber);
    width: 28px;
    text-align: right;
  }

  button.go, button.action {
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: 0.03em;
    background: var(--amber);
    color: var(--ink);
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  button.go:hover, button.action:hover { filter: brightness(1.1); }
  button.go:active, button.action:active { transform: scale(0.97); }

  button.ghost {
    font-family: var(--mono);
    font-size: 12px;
    background: transparent;
    border: 1px solid var(--chrome);
    color: var(--paper-dim);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  button.ghost:hover { border-color: var(--paper-dim); color: var(--paper); }

  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* ---------- Data readout ---------- */
  .readout {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--paper);
    background: var(--ink);
    border: 1px solid var(--ink-line);
    border-radius: 8px;
    padding: 12px 14px;
    word-break: break-word;
    line-height: 1.6;
  }
  .readout .label { color: var(--paper-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .readout .val { color: var(--amber); }
  .readout .val.blue { color: var(--blue); }

  /* ---------- degree chips (chord builder) ---------- */
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .chip {
    font-family: var(--mono);
    font-size: 12.5px;
    background: var(--ink);
    border: 1px solid var(--chrome);
    color: var(--paper-dim);
    padding: 5px 10px;
    border-radius: 14px;
    cursor: pointer;
    user-select: none;
    transition: all 0.12s ease;
  }
  .chip.active {
    background: var(--amber-dim);
    border-color: var(--amber);
    color: var(--amber);
  }

  .footnote {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--paper-dim);
    margin-top: 18px;
    line-height: 1.5;
  }

  /* ---------- Transform chain (drag-reorder) ---------- */
  .chain-wrap { display: flex; flex-direction: column; gap: 5px; position: relative; }
  .chain-step {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--ink); border: 1px solid var(--ink-line);
    border-left: 3px solid transparent; border-radius: 6px;
    padding: 9px 12px; transition: border-left-color .15s, background .15s, opacity .15s;
  }
  .chain-step.off { opacity: .55; }
  .chain-step.on  { border-color: var(--ink-line); border-left-color: var(--amber); background: var(--amber-light, #2a2113); }
  .chain-step.drag-over { background: var(--blue-dim); border-color: var(--blue); }
  .chain-step.is-dragging { opacity: .25; border-style: dashed; }
  .drag-handle {
    color: var(--paper-dim); cursor: grab; font-size: 14px; padding: 0 2px;
    touch-action: none; flex-shrink: 0; user-select: none;
  }
  .drag-handle:hover { color: var(--paper); }
  .drag-handle:active { cursor: grabbing; }
  .op-toggle {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
    padding: 4px 10px; border-radius: 4px; min-width: 36px; text-align: center;
    flex-shrink: 0; text-transform: uppercase; border: 1px solid var(--chrome);
    background: transparent; color: var(--paper-dim); cursor: pointer;
  }
  .op-toggle.on { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
  .chain-step .step-name {
    font-family: var(--mono);
    font-size: 13px; color: var(--paper); flex: 1 1 auto; min-width: 90px;
  }
  .chain-step input[type="number"] { width: 60px; padding: 5px 8px; flex-shrink: 0; }
  .chain-step label.inline-check {
    display: flex; align-items: center; gap: 4px; font-family: var(--mono);
    font-size: 10px; color: var(--paper-dim); white-space: nowrap; cursor: pointer; user-select: none;
  }

  /* ---------- Scale folders / search ---------- */
  .scale-search-wrap { position: relative; margin-bottom: 10px; }
  .scale-search {
    font-family: var(--mono); font-size: 12.5px; width: 100%;
    background: var(--ink); border: 1px solid var(--chrome); color: var(--paper);
    border-radius: 6px; padding: 7px 10px;
  }
  .scale-search:focus { outline: none; border-color: var(--amber); }
  .scale-search::placeholder { color: var(--paper-dim); }
  .scale-folders { display: flex; flex-direction: column; gap: 3px; }
  .scale-folder-hdr {
    display: flex; align-items: center; gap: 7px; padding: 7px 10px; cursor: pointer;
    border-radius: 6px; user-select: none; background: var(--ink);
    border: 1px solid var(--ink-line); transition: background .1s, border-color .1s;
  }
  .scale-folder-hdr:hover { background: var(--blue-dim); border-color: var(--blue); }
  .scale-folder.open .scale-folder-hdr {
    background: var(--blue-dim); border-color: var(--blue); border-radius: 6px 6px 0 0; border-bottom: none;
  }
  .folder-arrow { font-family: var(--mono); font-size: 9px; color: var(--paper-dim); transition: transform .18s; display: inline-block; flex-shrink: 0; }
  .scale-folder.open .folder-arrow { transform: rotate(90deg); }
  .folder-name { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--paper); letter-spacing: .03em; flex: 1; }
  .scale-folder.open .folder-name { color: var(--blue); }
  .folder-count {
    font-family: var(--mono); font-size: 9px; color: var(--paper-dim);
    background: var(--ink-raised); border: 1px solid var(--chrome);
    border-radius: 10px; padding: 1px 6px; flex-shrink: 0;
  }
  .scale-folder.open .folder-count { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
  .scale-folder-body {
    display: none; flex-wrap: wrap; gap: 5px; padding: 9px 10px 11px;
    background: var(--blue-dim); border: 1px solid var(--blue); border-top: none; border-radius: 0 0 6px 6px;
  }
  .scale-folder.open .scale-folder-body { display: flex; }
  .scale-folders.searching .scale-folder:not(.search-hidden) .scale-folder-body { display: flex; }
  .scale-folder.search-hidden { display: none; }
  .scale-pill {
    font-family: var(--mono); font-size: 11px; letter-spacing: .02em;
    padding: 5px 10px; border-radius: 14px; cursor: pointer;
    border: 1px solid var(--chrome); background: var(--ink-raised); color: var(--paper-dim);
    transition: all .1s; white-space: nowrap;
  }
  .scale-pill:hover { border-color: var(--blue); color: var(--blue); }
  .scale-pill.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
  .scale-pill.search-match { border-color: var(--blue); color: var(--blue); }
  .scale-pill.active.search-match { color: var(--amber); }
  .scale-pill.search-hidden { display: none; }


  /* ---------- Criterion toggle ---------- */
  .criterion-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .criterion-toggle {
    display: flex;
    background: var(--ink);
    border: 1px solid var(--chrome);
    border-radius: 6px;
    padding: 2px;
    flex-shrink: 0;
  }
  .ctab {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    background: transparent;
    border: none;
    color: var(--paper-dim);
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .ctab.active {
    background: var(--amber-dim);
    color: var(--amber);
  }
  .ctab:not(.active):hover {
    color: var(--paper);
  }
  .criterion-input-field input {
    width: 100% !important;
  }
  ::selection { background: var(--amber-dim); }

  /* ---------- Helix (3D comprehensive view) ---------- */
  .helix-section {
    margin-bottom: 20px;
  }
  .helix-card {
    background: var(--ink-raised);
    border: 1px solid var(--ink-line);
    border-radius: 10px;
    overflow: hidden;
  }
  .helix-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 9px 16px;
    border-bottom: 1px solid var(--ink-line);
  }
  .helix-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .helix-controls input[type="range"] {
    width: 80px;
    min-width: unset;
    max-width: unset;
    flex: none;
  }
  .helix-speed-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--paper-dim);
    white-space: nowrap;
  }
  .helix-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--paper-dim);
  }
  .helix-legend span { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .helix-swatch { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .helix-swatch.root { background: #f2b66b; box-shadow: 0 0 6px #f2b66b; }
  .helix-swatch.scale { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
  .helix-swatch.chord { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .helix-swatch.anchor { background: var(--red); box-shadow: 0 0 6px var(--red); }

  #helix-container {
    width: 100%;
    height: 480px;
    touch-action: none;
    cursor: grab;
    position: relative;
  }
  #helix-container:active { cursor: grabbing; }
  #helix-container canvas { display: block; }

  .helix-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 16px 10px;
  }
  .helix-caption {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--paper-dim);
  }
  .helix-caption .val { color: var(--paper); }
  .helix-hint {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--paper-dim);
    opacity: 0.7;
  }

  @media (max-width: 640px) {
    #helix-container { height: 380px; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="wordmark">pitch<span>wheel</span></div>
    <div class="subtitle">exploring the scale/chord relationship</div>
  </header>

  <!-- ============ HELIX — comprehensive 3D readout ============ -->
  <div class="helix-section">
    <div class="helix-card">
      <div class="helix-head">
        <div class="helix-legend">
          <span><span class="helix-swatch root"></span>root</span>
          <span><span class="helix-swatch scale"></span>scale</span>
          <span><span class="helix-swatch anchor"></span>degree</span>
          <span><span class="helix-swatch chord"></span>chord</span>
        </div>
        <div class="helix-controls">
          <button class="ghost" id="helix-play-btn" title="Pause rotation">⏸</button>
          <span class="helix-speed-label">speed</span>
          <input type="range" id="helix-speed" min="0.1" max="5" step="0.1" value="1" title="Rotation speed">
        </div>
      </div>
      <div id="helix-container"></div>
      <div class="helix-foot">
        <div class="helix-caption" id="helix-caption">—</div>
      </div>
    </div>
  </div>

  <!-- ============ UNIFIED LAB ============ -->
  <div class="unified-lab">

    <!-- ---- LEFT COLUMN: Scale Lab ---- -->
    <div class="unified-col">
      <div class="section-label">Scale</div>

      <div class="card">
        <h3>Scale Database</h3>
        <div class="field">
          <label for="scale-mod">Mod</label>
          <input type="number" id="scale-mod" value="12" min="1" max="96">
        </div>
        <div class="scale-search-wrap">
          <input class="scale-search" id="scale-search" type="text" placeholder="Search scales…">
        </div>
        <div class="scale-folders" id="scale-folders"></div>
        <div class="field" id="custom-steps-field" style="margin-top:12px;">
          <label for="scale-custom">Positions</label>
          <input type="text" id="scale-custom" value="0,2,4,5,7,9,11">
        </div>
      </div>

      <div class="card">
        <h3>Scale transform</h3>
        <div class="chain-wrap" id="scale-chain-wrap"></div>
      </div>

      <div class="card">
        <div class="readout" id="scale-readout">—</div>
        <div class="row" style="margin-top:12px;">
          <button class="action" id="scale-play">▶ Play ascending</button>
          <button class="ghost" id="scale-play-chord">▶ Play as chord</button>
        </div>
      </div>
    </div>

    <!-- ---- DIVIDER ---- -->
    <div class="unified-divider"></div>

    <!-- ---- RIGHT COLUMN: Chord Builder ---- -->
    <div class="unified-col">
      <div class="section-label">Chord</div>

      <div class="card">
        <div class="field" style="margin-bottom:0;">
          <label for="chord-octave">Octave</label>
          <div class="range-row">
            <input type="range" id="chord-octave" min="0" max="9" value="5">
            <span class="range-val" id="chord-octave-val">+5</span>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Criterion</h3>
        <div class="criterion-row">
          <div class="criterion-toggle" id="criterion-toggle">
            <button class="ctab active" id="criterion-type-position" data-value="position">pos</button>
            <button class="ctab" id="criterion-type-interval" data-value="interval">int</button>
          </div>
          <div class="field criterion-input-field" style="margin-bottom:0; flex:1; min-width:0;">
            <input type="text" id="criterion-position-input" value="0,2,4" placeholder="0,2,4" style="width:100%;">
            <input type="text" id="criterion-interval-steps" value="2,2,3" placeholder="2,2,3" style="width:100%; display:none;">
          </div>
        </div>

        <!-- hidden radio inputs kept for JS compat -->
        <input type="radio" name="criterion-type-hidden" id="criterion-type-position-hidden" value="position" checked style="display:none;">
        <input type="radio" name="criterion-type-hidden" id="criterion-type-interval-hidden" value="interval" style="display:none;">
        <!-- legacy chip container kept for JS compat, hidden -->
        <div id="degree-chips" style="display:none;"></div>
        <div id="criterion-position-mode" style="display:none;"></div>
        <div id="criterion-interval-mode" style="display:none;"></div>

        <div class="field" style="margin-top:10px;">
          <label for="chord-shift">Degree</label>
          <div class="range-row">
            <input type="range" id="chord-shift" min="-14" max="14" value="0">
            <span class="range-val" id="chord-shift-val">0</span>
          </div>
        </div>
        <div class="field">
          <label for="chord-rotation">Rotation</label>
          <input type="number" id="chord-rotation" value="0" style="width:65px;">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label for="chord-prevoices">Voices</label>
          <input type="number" id="chord-prevoices" value="0" style="width:65px;">
        </div>
      </div>

      <div class="card">
        <h3>Chord transform</h3>
        <div class="chain-wrap" id="chord-chain-wrap"></div>
      </div>

      <div class="card">
        <div class="readout" id="chord-readout">—</div>
        <div class="row" style="margin-top:12px;">
          <button class="action" id="chord-play">▶ Play as chord</button>
          <button class="ghost" id="chord-play-arp">▶ Play arpeggio</button>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// music++ - Porting from C++ primitives
// PositionVector: absolute cyclic positions (e.g. pitch classes)
// IntervalVector: cyclic interval/step sequences with an offset
// select(): generic scale-degree lookup across both representations
// Scale / Chord: parameterized builders on top of the above
// ============================================================

function euclideanDivision(dividend, divisor) {
  let quotient = Math.trunc(dividend / divisor);
  let remainder = dividend - quotient * divisor;
  if (remainder < 0) {
    quotient -= 1;
    remainder += divisor;
  }
  return { quotient, remainder };
}

function gcd(a, b) {
  a = Math.abs(a);
  b = Math.abs(b);
  while (b !== 0) {
    [a, b] = [b, a % b];
  }
  return a;
}

function lcm(values) {
  if (values.length === 0) return 1;
  if (values.length === 1) return Math.abs(values[0]);
  let result = Math.abs(values[0]);
  for (let i = 1; i < values.length; i++) {
    const g = gcd(result, values[i]);
    result = (result * Math.abs(values[i])) / g;
  }
  return result;
}

// ------------------------------------------------------------
// Scale library — used by the searchable scale-folders UI.
// Each scale's positions are 0-based in chromatic-12 space; they get
// remapped to the active modulus via positionsToIntervalSteps().
// ------------------------------------------------------------
const SCALE_LIBRARY = [
  { cat: "Major and minor", scales: [
    ["Ionian (Major)",        [0,2,4,5,7,9,11]],
    ["Dorian",                [0,2,3,5,7,9,10]],
    ["Phrygian",              [0,1,3,5,7,8,10]],
    ["Lydian",                [0,2,4,6,7,9,11]],
    ["Mixolydian",            [0,2,4,5,7,9,10]],

// ------------------------------------------------------------
// PositionVector
// ------------------------------------------------------------
class PositionVector {
  constructor(data = [0], mod = 12, userRange = 0, rangeUpdate = true, user = false) {
    this.data = [...data];
    this.mod = mod;
    this.userRange = userRange > 0 ? userRange : mod;
    this.rangeUpdate = rangeUpdate;
    this.user = user;
    this.range = 0;
    this.range = this._initializeRange();
  }

  _rangeCalculation() {
    const modulo = this.user ? this.userRange : this.mod;
    if (this.data.length === 0) return modulo;
    const maxValue = Math.max(...this.data);
    const minValue = Math.min(...this.data);
    const span = maxValue - minValue;
    const { quotient } = euclideanDivision(span, modulo);
    return modulo * (quotient + 1);
  }

  _initializeRange() {
    return this.rangeUpdate ? this._rangeCalculation() : (this.user ? this.userRange : this.mod);
  }

  _updateRangeIfNeeded() {
    if (this.rangeUpdate) this.range = this._rangeCalculation();
  }

  size() { return this.data.length; }
  getData() { return [...this.data]; }
  getMod() { return this.mod; }
  getUserRange() { return this.userRange; }
  getRange() { return this.range; }
  getRangeUpdate() { return this.rangeUpdate; }
  getUser() { return this.user; }

  setMod(m) { this.mod = m; this._updateRangeIfNeeded(); }
  setUserRange(r) { this.userRange = r; this._updateRangeIfNeeded(); }
  setRange(r) { this.range = r; }
  setRangeUpdate(b) { this.rangeUpdate = b; this._updateRangeIfNeeded(); }
  setUser(b) { this.user = b; this._updateRangeIfNeeded(); }

  element(index) {
    const size = this.data.length;
    if (size === 0) return 0;
    const div = euclideanDivision(index, size);
    const cycles = (index - div.remainder) / size;
    const effectiveRange = this.getRange();
    return this.data[div.remainder] + Math.abs(effectiveRange) * cycles;
  }

  get(index) { return this.element(index); }

  // operator+ / operator- with a scalar: shift every element
  plusScalar(n) {
    return new PositionVector(this.data.map(v => v + n), this.mod, this.userRange, this.rangeUpdate, this.user);
  }
  minusScalar(n) {
    return this.plusScalar(-n);
  }

  rotoTranslate(startOffset, length = 0) {
    const outLength = length === 0 ? this.data.length : Math.abs(length);
    const newData = new Array(outLength);
    for (let i = 0; i < outLength; i++) newData[i] = this.element(startOffset + i);
    return new PositionVector(newData, this.mod, this.userRange, this.rangeUpdate, this.user);
  }

  complement() {
    const effectiveRange = this.getRange();
    if (this.data.length === 0) {
      const universe = [];
      for (let i = 0; i < effectiveRange; i++) universe.push(i);
      return new PositionVector(universe, this.mod, this.userRange, this.rangeUpdate, this.user);
    }
    const minValue = Math.min(...this.data);
    const normalized = this.minusScalar(minValue);
    const normalizedSet = new Set(normalized.data);
    const complementData = [];
    for (let i = 0; i < effectiveRange; i++) {
      if (!normalizedSet.has(i)) complementData.push(i);
    }
    return new PositionVector(complementData, this.mod, this.userRange, this.rangeUpdate, this.user).plusScalar(minValue);
  }

  inversion(axisIndex, sortOutput = true) {
    if (this.data.length === 0) return this;
    const size = this.data.length;
    const normalizedAxisIndex = euclideanDivision(axisIndex, size).remainder;
    const axisValue = this.data[normalizedAxisIndex];
    let invertedData = this.data.map(v => 2 * axisValue - v);
    if (sortOutput) invertedData = [...invertedData].sort((a, b) => a - b);
    return new PositionVector(invertedData, this.mod, this.userRange, this.rangeUpdate, this.user);
  }

  // "negative" — reflection through an axis position without the forced sort,
  // used by Chord transforms as a distinct option from inversion.
  negative(axisIndex = 0) {
    return this.inversion(axisIndex, false);
  }

  static adaptToLCM(vectors) {
    if (vectors.length === 0) return [];
    const uniqueModulos = [...new Set(vectors.map(v => v.mod))];
    if (uniqueModulos.length === 1) return vectors;
    const l = lcm(uniqueModulos);
    return vectors.map(pv => {
      const scaleFactor = l / pv.mod;
      const scaledData = pv.data.map(v => v * scaleFactor);
      const scaledUserRange = pv.userRange * scaleFactor;
      const scaledRange = pv.range * scaleFactor;
      const adapted = new PositionVector(scaledData, l, scaledUserRange, false, pv.user);
      adapted.setRange(scaledRange);
      return adapted;
    });
  }
}

// ------------------------------------------------------------
// IntervalVector
// ------------------------------------------------------------
class IntervalVector {
  constructor(data = [0], offset = 0, mod = 12) {
    this.data = [...data];
    this.offset = offset;
    this.mod = mod;
  }

  size() { return this.data.length; }
  getData() { return [...this.data]; }
  getOffset() { return this.offset; }
  getMod() { return this.mod; }
  setOffset(o) { this.offset = o; }
  setMod(m) { this.mod = m; }

  element(i) {
    if (this.data.length === 0) return 0;
    const size = this.data.length;
    const div = euclideanDivision(i, size);
    return this.data[div.remainder];
  }

  get(index) { return this.element(index); }

  rotate(r, n = 0) {
    n = Math.abs(n);
    if (n === 0) n = this.data.length;
    const out = new Array(n);
    for (let i = 0; i < n; i++) out[i] = this.element(r + i);
    return new IntervalVector(out, this.offset, this.mod);
  }

  rotoTranslate(r, n = 0) {
    n = Math.abs(n);
    const dataSize = this.data.length;
    if (n === 0) n = dataSize;
    const out = new Array(n);
    for (let i = 0; i < n; i++) out[i] = this.element(r + i);

    let sum = 0;
    if (Math.abs(r) < dataSize) {
      if (r >= 0) {
        for (let i = 0; i < r; i++) sum += this.element(i);
      } else {
        for (let i = 0; i < -r; i++) sum -= this.element(dataSize - 1 - i);
      }
    } else {
      const div = euclideanDivision(r, dataSize);
      if (r >= 0) {
        for (let i = 0; i < dataSize; i++) {
          const mult = i < div.remainder ? div.quotient + 1 : div.quotient;
          sum += this.element(i) * mult;
        }
      } else {
        const thresh = dataSize + div.remainder;
        for (let i = 0; i < dataSize; i++) {
          const mult = i >= thresh ? div.quotient - 1 : div.quotient;
          sum += this.element(i) * mult;
        }
      }
    }
    return new IntervalVector(out, this.offset + sum, this.mod);
  }

  reverse() {
    const out = new Array(this.data.length);
    for (let i = 0; i < this.data.length; i++) out[i] = this.data[this.data.length - 1 - i];
    return new IntervalVector(out, this.offset, this.mod);
  }

  inversion(axisIndex = 0) {
    if (this.data.length === 0) return this;
    const size = this.data.length;
    const div = euclideanDivision(axisIndex, size + 1);
    const normalizedAxis = div.remainder;
    const result = [...this.data];

    for (let i = 0; i < Math.floor(normalizedAxis / 2); i++) {
      [result[i], result[normalizedAxis - 1 - i]] = [result[normalizedAxis - 1 - i], result[i]];
    }
    const start = normalizedAxis;
    const end = size;
    const len = end - start;
    for (let i = 0; i < Math.floor(len / 2); i++) {
      [result[start + i], result[end - 1 - i]] = [result[end - 1 - i], result[start + i]];
    }
    return new IntervalVector(result, this.offset, this.mod);
  }

  singleMirror(position, left) {
    const out = [...this.data];
    const length = out.length;
    if (position < 0 || position > length) return this;

    if (left) {
      for (let i = 0; i < Math.floor(position / 2); i++) {
        [out[i], out[position - 1 - i]] = [out[position - 1 - i], out[i]];
      }
    } else {
      const end = position + Math.floor((length - position) / 2);
      for (let i = position; i < end; i++) {
        [out[i], out[length - 1 - (i - position)]] = [out[length - 1 - (i - position)], out[i]];
      }
    }
    return new IntervalVector(out, this.offset, this.mod);
  }

  static adaptToLCM(vectors) {
    if (vectors.length === 0) return [];
    const uniqueModulos = [...new Set(vectors.map(v => v.mod).filter(m => m !== 0))];
    if (uniqueModulos.length === 0 || uniqueModulos.length === 1) return vectors;
    const l = lcm(uniqueModulos);
    return vectors.map(iv => {
      if (iv.mod === 0) return iv;
      const scaleFactor = l / iv.mod;
      const scaledData = iv.data.map(v => v * scaleFactor);
      const scaledOffset = iv.offset * scaleFactor;
      return new IntervalVector(scaledData, scaledOffset, l);
    });
  }
}

// ------------------------------------------------------------
// Conversions between positions and intervals
// ------------------------------------------------------------
function positionsToIntervals(positions) {
  const mod = positions.getMod();
  if (positions.size() === 0) return new IntervalVector([], 0, mod);
  const posData = positions.getData();
  const intervalData = [];
  if (posData.length > 1) {
    for (let i = 0; i < posData.length; i++) {
      intervalData.push(positions.get(i + 1) - positions.get(i));
    }
  }
  return new IntervalVector(intervalData, positions.get(0), mod);
}

function intervalsToPositions(intervals) {
  const mod = intervals.getMod();
  const intervalData = intervals.getData();
  if (intervalData.length === 0) return new PositionVector([0], mod, 0, true, false);

  const posData = [];
  let currentPos = intervals.getOffset();
  posData.push(currentPos);
  for (let i = 0; i < intervalData.length - 1; i++) {
    currentPos += intervalData[i];
    posData.push(currentPos);
  }
  return new PositionVector(posData, mod, 0, true, false);
}

// ------------------------------------------------------------
// select() — 4 overloads dispatched by argument type
// ------------------------------------------------------------
function selectPosPos(source, criterion, criterionRotation = 0, voices = 0) {
  const sourceData = source.getData();
  const criterionModulo = sourceData.length;
  const actualCriterion = new PositionVector(criterion.getData(), criterionModulo);
  actualCriterion.setMod(source.size());
  const rotatedCriterion = criterionRotation !== 0
    ? actualCriterion.rotoTranslate(criterionRotation, voices)
    : actualCriterion;

  const outLength = voices > 0 ? voices : rotatedCriterion.size();
  const result = new Array(outLength);
  for (let k = 0; k < outLength; k++) result[k] = source.get(rotatedCriterion.get(k));

  return new PositionVector(result, source.getMod(), source.getUserRange(), source.getRangeUpdate(), source.getUser());
}

function selectPosInt(source, criterion, criterionRotation = 0, voices = 0) {
  let actualCriterion = criterion;
  actualCriterion.setMod(source.size());
  const rotatedCriterion = criterionRotation !== 0
    ? actualCriterion.rotate(criterionRotation, voices)
    : actualCriterion;

  const outLength = voices > 0 ? voices : rotatedCriterion.size();
  const result = new Array(outLength);
  let cumulativePosition = rotatedCriterion.getOffset();
  for (let k = 0; k < outLength; k++) {
    result[k] = source.get(cumulativePosition);
    cumulativePosition += rotatedCriterion.get(k);
  }

  return new PositionVector(result, source.getMod(), source.getUserRange(), source.getRangeUpdate(), source.getUser());
}

function selectIntInt(source, indices, criterionRotation = 0, voices = 0) {
  let actualCriterion = indices;
  actualCriterion.setMod(source.size());
  const rotatedCriterion = criterionRotation !== 0
    ? actualCriterion.rotate(criterionRotation, voices)
    : actualCriterion;

  const sourceOffset = source.getOffset();
  const criterionOffset = rotatedCriterion.getOffset();

  let sOut = sourceOffset;
  for (let j = 0; j < criterionOffset; j++) sOut += source.get(j);

  const outLength = voices > 0 ? voices : rotatedCriterion.size();
  const result = new Array(outLength);
  let cumulativeIndex = criterionOffset;
  for (let k = 0; k < outLength; k++) {
    let sum = 0;
    const spanLength = rotatedCriterion.get(k);
    for (let j = 0; j < spanLength; j++) sum += source.get(cumulativeIndex + j);
    result[k] = sum;
    cumulativeIndex += spanLength;
  }

  return new IntervalVector(result, sOut, source.getMod());
}

function selectIntPos(source, criterion, criterionRotation = 0, voices = 0) {
  const off = source.getOffset();
  const criterionModulo = source.getData().length;
  let actualCriterion = criterion;
  actualCriterion.setMod(source.size());
  const rotatedCriterion = criterionRotation !== 0
    ? actualCriterion.rotoTranslate(criterionRotation, voices)
    : actualCriterion;

  if (rotatedCriterion.size() === 0) return new IntervalVector([], source.getOffset(), source.getMod());

  const outLength = voices > 0 ? voices : rotatedCriterion.size();
  const result = new Array(outLength);
  const n = source.size();

  for (let k = 0; k < outLength; k++) {
    const p_k = rotatedCriterion.get(k);
    const p_next = rotatedCriterion.get(k + 1);
    let delta_k = p_next - p_k;
    if (delta_k <= 0) delta_k += n;
    let sum = 0;
    for (let j = 0; j < delta_k; j++) sum += source.get(p_k + j);
    result[k] = sum;
  }

  let sOut = off;
  if (criterion.get(0) >= 0) {
    for (let j = 0; j < criterion.get(0); j++) sOut += source.get(j);
  } else {
    for (let j = criterion.get(0); j < 0; j++) sOut -= source.get(j);
  }

  return new IntervalVector(result, sOut, source.getMod());
}

// Generic dispatcher mirroring the C++ overload resolution
function select(source, criterion, criterionRotation = 0, voices = 0) {
  const srcIsPos = source instanceof PositionVector;
  const critIsPos = criterion instanceof PositionVector;
  if (srcIsPos && critIsPos) return selectPosPos(source, criterion, criterionRotation, voices);
  if (srcIsPos && !critIsPos) return selectPosInt(source, criterion, criterionRotation, voices);
  if (!srcIsPos && critIsPos) return selectIntPos(source, criterion, criterionRotation, voices);
  return selectIntInt(source, criterion, criterionRotation, voices);
}

// ------------------------------------------------------------
// Scale
// ------------------------------------------------------------
class Scale {
  constructor(generator, params = {}) {
    this.params = {
      root: 0, mode: 0, degree: 0,
      invert: false, inversionAxis: 0,
      mirror: false, mirrorAxis: 0,
      ...params,
    };
    if (generator instanceof PositionVector) {
      this.generator = positionsToIntervals(generator);
      this.isFromPositions = true;
    } else {
      this.generator = generator;
      this.isFromPositions = false;
    }
    this._applyTransformations();
  }

  _applyTransformations() {
    let intervals = new IntervalVector(this.generator.getData(), this.generator.getOffset(), this.generator.getMod());
    intervals.setOffset(this.params.root);
    intervals = intervals.rotate(this.params.mode);
    if (this.params.invert) intervals = intervals.inversion(this.params.inversionAxis);
    if (this.params.mirror) intervals = intervals.singleMirror(this.params.mirrorAxis, true);
    this.intervals = intervals;
  }

  toPositions() { return intervalsToPositions(this.intervals); }
  toIntervals() { return this.intervals; }
  getGenerator() { return this.generator; }
  getGeneratorAsPositions() { return intervalsToPositions(this.generator); }

  setParams(newParams) {
    this.params = { ...this.params, ...newParams };
    this._applyTransformations();
  }
}

// ------------------------------------------------------------
// Chord
// ------------------------------------------------------------
class Chord {
  constructor(scale, criterion, params = {}) {
    this.params = {
      shift: 0, rotationOrRototrans: 0, preVoices: 0, position: 0,
      invert: false, axis: 0, negativeOrMirror: false, negativeOrMirrorPos: 0,
      ...params,
    };
    this.scaleIsPositions = scale instanceof PositionVector;
    this.criterionIsPositions = criterion instanceof PositionVector;
    this.scale = scale;
    this.criterion = criterion;
    this._generate();
  }

  _generate() {
    const p = this.params;
    if (this.scaleIsPositions && this.criterionIsPositions) {
      const offsetDegrees = this.criterion.plusScalar(p.shift);
      let result = select(this.scale, offsetDegrees, p.rotationOrRototrans, p.preVoices);
      if (p.invert) result = result.inversion(p.axis, true);
      if (p.negativeOrMirror) result = result.negative(p.negativeOrMirrorPos);
      result = result.rotoTranslate(p.position);
      this.isResultPositions = true;
      this.resultPositions = result;
    } else if (this.scaleIsPositions && !this.criterionIsPositions) {
      const offsetIntervals = new IntervalVector(this.criterion.getData(), p.shift, this.criterion.getMod());
      let result = select(this.scale, offsetIntervals, p.rotationOrRototrans, p.preVoices);
      if (p.invert) result = result.inversion(p.axis, true);
      if (p.negativeOrMirror) result = result.negative(p.negativeOrMirrorPos);
      result = result.rotoTranslate(p.position);
      this.isResultPositions = true;
      this.resultPositions = result;
    } else if (!this.scaleIsPositions && this.criterionIsPositions) {
      const offsetDegrees = this.criterion.plusScalar(p.shift);
      let tempResult = select(this.scale, offsetDegrees, p.rotationOrRototrans, p.preVoices);
      let result = tempResult.rotoTranslate(p.position);
      if (p.invert) result = result.inversion(p.axis);
      if (p.negativeOrMirror) result = result.singleMirror(p.negativeOrMirrorPos, true);
      this.isResultPositions = false;
      this.resultIntervals = result;
    } else {
      const off = this.criterion.getOffset();
      const offsetIntervals = new IntervalVector(this.criterion.getData(), p.shift + off, this.criterion.getMod());
      let tempResult = select(this.scale, offsetIntervals, p.rotationOrRototrans, p.preVoices);
      let result = tempResult.rotoTranslate(p.position);
      if (p.invert) result = result.inversion(p.axis);
      if (p.negativeOrMirror) result = result.singleMirror(p.negativeOrMirrorPos, true);
      this.isResultPositions = false;
      this.resultIntervals = result;
    }
  }

  toPositions() {
    return this.isResultPositions ? this.resultPositions : intervalsToPositions(this.resultIntervals);
  }
  toIntervals() {
    return this.isResultPositions ? positionsToIntervals(this.resultPositions) : this.resultIntervals;
  }

  setParams(newParams) {
    this.params = { ...this.params, ...newParams };
    this._generate();
  }
}

// Standalone functional chord() helper, mirroring the free functions
function chord(scale, criterion, opts = {}) {
  const c = new Chord(scale, criterion, {
    shift: opts.shift ?? 0,
    rotationOrRototrans: opts.rotation ?? opts.rototranslation ?? 0,
    preVoices: opts.preVoices ?? 0,
    position: opts.position ?? 0,
    invert: opts.invert ?? false,
    axis: opts.axis ?? 0,
    negativeOrMirror: opts.negative ?? opts.mirror ?? false,
    negativeOrMirrorPos: opts.negativePos ?? opts.mirrorPos ?? 0,
  });
  return scale instanceof PositionVector ? c.toPositions() : c.toIntervals();
}
